<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="The official webpage of XeTute Technologies">
        <meta name="keywords" content="XeTute Technologies, XeTute">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <title>Hello, Friend.</title>
        <link rel="icon" href="../logo.jpg"/>
        <link rel="stylesheet" href="../basic.css"/>

        <style>
            .chat-container
            {
                width: 100%;
                max-width: 800px;
                height: calc(100vh - 100px);
                display: flex;
                flex-direction: column;
                margin-top: 20px;
            }

            .messages-container
            {
                flex-grow: 1;
                overflow-y: auto;
                border: 1px solid #151515;
                border-radius: 8px;
                padding: 15px;
                margin-bottom: 15px;
                background: #000;
            }

            .message
            {
                margin-bottom: 10px;
                padding: 10px;
                border-radius: 8px;
                max-width: 70%;
                clear: both;
                word-wrap: break-word;
                white-space: pre-wrap;
            }

            .client-message
            {
                background-color: #fff;
                color: #000;
                float: right;
                clear: both;
            }

            .opponent-message
            {
                background-color: #000;
                border: 2px solid #fff;
                color: #fff;
                float: left;
                clear: both;
            }

            .loading-indicator
            {
                display: flex;
                align-items: center;
            }

            .loading-dot
            {
                width: 6px;
                height: 6px;
                background-color: #fff;
                border-radius: 50%;
                margin: 0 3px;
                animation: loading-pulse 1.4s infinite ease-in-out;
                opacity: 0.6;
            }

            .loading-dot:nth-child(1) { animation-delay: -0.3s; }
            .loading-dot:nth-child(2) { animation-delay: -0.15s; }

            @keyframes loading-pulse {
                0%, 80%, 100% { opacity: 0.6; }
                40% { opacity: 1; }
            }

            .chat-input-container
            {
                display: flex;
                width: 100%;
                margin-bottom: 10px;
            }

            #message-input
            {
                flex-grow: 1;
                padding: 10px;
                background: #080808;
                border: 2px solid #222;
                outline: 0;
                color: #fff;
                border-radius: 0;
                margin-left: -5px;
                margin-right: -5px;
            }

            #clear-button, #send-button
            {
                padding: 10px 20px;
                background: #fff;
                color: #000;
                border: 0;
                cursor: pointer;
                transition: background 0.3s ease;
            }
            #clear-button { border-radius: 8px 0 0 8px; }
            #send-button { border-radius: 0 8px 8px 0; }
            #clear-button:hover, #send-button:hover
            {
                background: #080808;
                border: 1px solid #222;
                color: #fff;
            }

            @media (max-width: 768px)
            {
                .chat-container { width: 95%; }
            }

            /* Markdown styles */
            .message strong, .message b { font-weight: bold; }
            .message em, .message i { font-style: italic; }
            .message u { text-decoration: underline; }
            .message del, .message s { text-decoration: line-through; }
            .message code
            { 
                background-color: #333; 
                color: #fff; 
                padding: 2px 4px; 
                border-radius: 4px; 
                font-family: monospace; 
            }
        </style>
    </head>
    <body>
        <div class="navbar">
            <div class="logo-container" onclick="window.location.href='../index.html'">
                <img src="../logo.jpg" alt="XeTute Technologies Logo"/>
                <p>XeTute Technologies</p>
            </div>

            <div class="nav-links">
                <a href="https://github.com/XeTute">GitHub</a>
                <a href="https://huggingface.co/XeTute">HuggingFace</a>
                <a href="https://ko-fi.com/XeTute">Donate</a>
            </div>
        </div>

        <div class="chat-container">
            <div id="messages-container" class="messages-container">
            </div>
            <div class="chat-input-container">
                <button id="clear-button">Clear</button>
                <textarea id="message-input" placeholder="Type your message..."></textarea>
                <button id="send-button">Send</button>
            </div>
        </div>

        <script defer>
            const GROQ_API_KEY = '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'; // Capped by Groqs free tier lmao
            const ai_endpoint = 'https://api.groq.com/openai/v1/chat/completions';
            const STORAGE_KEY = 'xetute_chat_history';
            const MAX_HISTORY_LENGTH = 150;

            const SYSTEM_PROMPT =
            `
            You are FlareAI, a Chatbot designed by XeTute Technologies.
            About XeTute Technologies:
            - HuggingFace: https://huggingface.co/XeTute
            - GitHub: https://github.com/XeTute
            - Webpage: https://xetute.com
            About you, FlareAI:
            - You are an AI model with the Transformers Architecture
            - Your maximum chat history length is ${MAX_HISTORY_LENGTH}, after this limit exceeds, the first messages are removed.
            - Remain helpful, but with boundaries: Insulting Religions or other groups is a no-go.
            `;
        
            let messageHistory = [];
        
            const messageInput = document.getElementById('message-input');
            const sendButton = document.getElementById('send-button');
            const clearButton = document.getElementById('clear-button');
            const messagesContainer = document.getElementById('messages-container');
        
            function loadConversationHistory()
            {
                const storedHistory = localStorage.getItem(STORAGE_KEY);
                if (storedHistory)
                {
                    messageHistory = JSON.parse(storedHistory);
                    messageHistory.forEach(msg => { addMessageToChat(msg.content, msg.isUser); });
                }
            }
        
            function saveConversationHistory()
            {
                if (messageHistory.length > MAX_HISTORY_LENGTH) messageHistory = messageHistory.slice(-MAX_HISTORY_LENGTH);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(messageHistory));
            }
        
            function parseMarkdown(message)
            {
                return message
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')  // Bold
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')  // Italic
                    .replace(/__(.*?)__/g, '<u>$1</u>')  // Underline
                    .replace(/~~(.*?)~~/g, '<del>$1</del>')  // Strikethrough
                    .replace(/`(.*?)`/g, '<code>$1</code>');  // Inline code
            }
        
            function addLoadingIndicator(isUser = false)
            {
                const loadingElement = document.createElement('div');
                loadingElement.classList.add('message', isUser ? 'client-message' : 'opponent-message', 'loading-indicator');
                
                for (let i = 0; i < 3; ++i)
                {
                    const dot = document.createElement('div');
                    dot.classList.add('loading-dot');
                    loadingElement.appendChild(dot);
                }
        
                messagesContainer.appendChild(loadingElement);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                return loadingElement;
            }
        
            function removeLoadingIndicator(loadingElement)
            {
                if (loadingElement && loadingElement.parentNode) loadingElement.parentNode.removeChild(loadingElement);
            }
        
            function typeWriterEffect(messageElement, fullText, speed = 4)
            {
                messageElement.innerHTML = '';
                let index = 0;
                const randomChars = 'az40!$>€^~#-'.split('');
                const typeNextCharacter = () =>
                {
                    if (index < fullText.length)
                    {
                        let displayText = fullText.slice(0, index);
                    
                        const preRandomCount = Math.random() < 0.7 ? Math.floor(Math.random() * 3) : 0;
                        for (let i = 0; i < preRandomCount; ++i) displayText += randomChars[Math.floor(Math.random() * randomChars.length)];
                    
                        let currentChar = fullText[index];
                        if (Math.random() < 0.3) currentChar += randomChars[Math.floor(Math.random() * randomChars.length)];
                        displayText += currentChar;
                    
                        messageElement.innerHTML = parseMarkdown(displayText);
                        ++index;
                    
                        const variation = Math.random() * 50 - 25;
                        setTimeout(typeNextCharacter, speed + variation);
                    } 
                    else messageElement.innerHTML = parseMarkdown(fullText);
                };
                typeNextCharacter();
            }
        
            function addMessageToChat(message, isUser = false)
            {
                const messageElement = document.createElement('div');
                messageElement.classList.add('message', isUser ? 'client-message' : 'opponent-message');
        
                if (!isUser) typeWriterEffect(messageElement, message);
                else messageElement.innerHTML = parseMarkdown(message);
        
                messagesContainer.appendChild(messageElement);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        
            async function sendMessageToAI(userMessage)
            {
                const conversationContext = [
                    { role: 'system', content: SYSTEM_PROMPT },
                    ...messageHistory.map(msg => ({ role: msg.isUser ? 'user' : 'assistant', content: msg.content })) ];
                conversationContext.push({ role: 'user', content: userMessage });
            
                const loadingIndicator = addLoadingIndicator();
                
                try
                {
                    const response = await fetch(ai_endpoint,
                    {
                        method: 'POST',
                        headers:
                        { 
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'Authorization': `Bearer ${GROQ_API_KEY}`
                        },
                        body: JSON.stringify(
                        { 
                            messages: conversationContext, 
                            max_tokens: 450,
                            temperature: 0.5,
                            stream: false,
                            model: "mixtral-8x7b-32768"
                        })
                    });

                    const responseText = await response.text();
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}, response: ${responseText}`);
                
                    const data = JSON.parse(responseText);
                    const aiResponse = data.choices[0].message.content.trim();
                
                    removeLoadingIndicator(loadingIndicator);
                    
                    messageHistory.push( { content: userMessage, isUser: true },  { content: aiResponse, isUser: false } );
                    saveConversationHistory();
                
                    return aiResponse;
                } 
                catch (error)
                {
                    removeLoadingIndicator(loadingIndicator);
                    console.error('Error:', error);
                    return 'Sorry, there was an error processing your message.';
                }
            }
        
            sendButton.addEventListener('click', async () =>
            {
                const messageText = messageInput.value.trim();
                if (messageText)
                {
                    addMessageToChat(messageText, true);
                    messageInput.value = '';
        
                    messageInput.disabled = true;
                    sendButton.disabled = true;
                
                    try
                    {
                        const aiResponse = await sendMessageToAI(messageText);
                        addMessageToChat(aiResponse, false);
                    }
                    catch (error)
                    {
                        console.error('Error in message processing:', error);
                        addMessageToChat('Sorry, I encountered an error.', false);
                    }
                    finally
                    {
                        messageInput.disabled = false;
                        sendButton.disabled = false;
                        messageInput.focus();
                    }
                }
            });
        
            clearButton.addEventListener('click', () => { messagesContainer.innerHTML = ''; localStorage.removeItem(STORAGE_KEY); messageHistory = []; });
            
            messageInput.addEventListener('keydown', (e) =>
            {
                if (e.key === 'Enter')
                {
                    if (e.shiftKey) return;
                    else
                    {
                        e.preventDefault();
                        sendButton.click();
                    }
                }
            });
        
            loadConversationHistory();
        </script>
    </body>
</html>
