<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <meta name="keywords" content="XeTute, XeTute Technologies, Technologies, AI, Auth, Authentication"/>
        <meta name="description" content="Authentication Services for & by XeTute Technologies"/>

        <title>Authentication \\ XeTute Technologies</title>

        <link rel="stylesheet" href="../basic.css"/>
        <link rel="icon" href="../logo.jpg"/>
        <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    </head>
    <style>
        .si, .sn { font-size: 18px; } 
        h2 { font-weight: 200; }

        .header
        {
            display: flex;
            flex-direction: row;

            width: 25%;
            justify-content: center;
            align-items: center;

            position: absolute;
            top: 10px;
        }
        .header > img
        {
            max-width: 48px;
            max-height: 48px;

            border-radius: 50%;
            margin: 10px;
        }

        .formcontainer
        {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        #form-signin, #form-signup
        {
            display: flex;
            flex-direction: column;

            justify-content: center;
            align-items: center;

            justify-self: center;
            align-self: center;
        }
        #form-signup { display: none; }

        .inp { width: 80%; max-width: 50px; }
    </style>
    <body id="main" style="display: none;">
        <a class="header card sb" href="../index.html">
            <img src="../logo.jpg"/>
            <p id="header-text" style="margin: 0;">XeTute Technologies</p>
        </a>

        <div class="formcontainer">
            <div id="form-signin" class="card">
                <h2 id="signin-title">Sign-In</h2>
    
                <div class="inp">
                    <input class="si" placeholder="E-Mail"   type="email"    id="signin-email" autocomplete="off"/>
                    <input class="si" placeholder="Password" type="password" id="signin-password"/>
                    <strong class="sb" style="color: rgb(255, 150, 150);" id="signin-error"></strong>
                </div>
                
                <button onclick="signIn()" class="sb" id="signin-btn">Sign In</button>
            </div>
    
            <div id="form-signup" class="card">
                <h2 id="signup-title">Sign-Up</h2>
    
                <div class="inp">
                    <input class="si" placeholder="E-Mail"           type="email"    id="signup-email" autocomplete="off"/>
                    <input class="si" placeholder="Password"         type="password" id="signup-password0"/>
                    <input class="si" placeholder="Confrm. Password" type="password" id="signup-password1"/>
                    <strong class="sb" style="color: rgb(255, 150, 150);" id="signup-error"></strong>
                </div>
                
                <button onclick="signUp()" class="sb" id="signup-btn">Sign Up</button>
            </div>
        </div>

        <div class="card">
            <em id="or-text">or</em>
            <button class="sb" id="cfBtn" onclick="changeForm()"><span id="cfBtn-text">Create an Account</span></button>
        </div>
    </body>
    <script src="../pocketbase.umd.js"></script>
    <script defer>
        const pb = new PocketBase('https://db.xetute.com');

        async function autoAuth()
        {
            try
            {
                await pb.collection('accounts').authRefresh();
                window.location.href = window.location.search.substr(1);
            }
            catch { document.getElementById('main').style.display = 'flex'; }
        }
        autoAuth();

        const fsi = document.getElementById('form-signin'); // form sign in
        const fsu = document.getElementById('form-signup'); // form sign up
        const fcb = document.getElementById('cfBtn'); // form change button
        const fcbt = document.getElementById('cfBtn-text');

        const sie = document.getElementById('signin-email');
        const sip = document.getElementById('signin-password');
        const sue = document.getElementById('signup-email');
        const sup = [ document.getElementById('signup-password0'), document.getElementById('signup-password1') ];

        function changeForm()
        {
            if (!fsi.style.display) fsi.style.display = 'flex';
            if (fsi.style.display === 'flex')
            {
                fsi.style.display = 'none';
                fsu.style.display = 'flex';
                fcbt.innerHTML = trns.cfBtnTextExisting;
            }
            else
            {
                fsi.style.display = 'flex';
                fsu.style.display = 'none';
                fcbt.innerHTML = trns.cfBtnTextCreate;
            }
        }

        async function signIn()
        {
            try
            {
                await pb.collection('accounts').authWithPassword(sie.value, sip.value);

                const link = window.location.search.substr(1);
                if (link) { window.location.href = link; }
                else { window.location.href = '../'; }
            }
            catch { document.getElementById('signin-error').textContent = 'An unexpected error occurred. We\'re sorry.'; }
        }

        async function signUp()
        {
            const txtnotif = document.getElementById('signup-error');
            try
            {
                const record = await pb.collection('accounts').create
                ({
                    "email": sue.value,
                    "password": sup[0].value,
                    "passwordConfirm": sup[1].value,
                    "data": { username: 'Friend' }
                });
                try { await pb.collection('accounts').requestVerification(sue.value); }
                catch
                {
                    txtnotif.textContent = `Failed to sent instructions to ${sue.value}. We're sorry.`;
                    await pb.collection('accounts').delete(record.id);
                }

                let link;
                try
                {
                    link = window.location.search.substr(1);
                    if (!link) link = '../'; // Browsers are very different with JS lmao
                }
                catch { link = '../'; }

                try
                {
                    txtnotif.innerHTML = `<p style="color: green;">Further instructions sent to ${sue.value}. After completion, please <a class="sb" style="border: 0; background: transparent; padding: 0;" href="${link}">click here</a>.</p>`;
                }
                catch { alert(`Further instructions sent to ${sue.value}. After completion, please reload this page to automatically refer.`); }
            }
            catch { txtnotif.textContent = 'An unexpected error occurred. We\'re sorry.'; }
            txtnotif.style.color = 'red';
        }

        // Translation ur zh en
        const translations =
        {
            en:
            {
                headerText: "XeTute Technologies",
                signinTitle: "Sign-In",
                signinBtn: "Sign In",
                signupTitle: "Sign-Up",
                signupBtn: "Sign Up",
                orText: "or",
                cfBtnTextCreate: "Create an Account",
                cfBtnTextExisting: "I already have an Account",
                signinEmailPlaceholder: "E-Mail",
                signinPasswordPlaceholder: "Password",
                signupEmailPlaceholder: "E-Mail",
                signupPasswordPlaceholder: "Password",
                signupConfirmPasswordPlaceholder: "Confirm Password"
            },
            zh:
            {
                headerText: "XeTute 技术公司",
                signinTitle: "登录",
                signinBtn: "登录",
                signupTitle: "注册",
                signupBtn: "注册",
                orText: "或者",
                cfBtnTextCreate: "创建账户",
                cfBtnTextExisting: "我已有账户",
                signinEmailPlaceholder: "电子邮件",
                signinPasswordPlaceholder: "密码",
                signupEmailPlaceholder: "电子邮件",
                signupPasswordPlaceholder: "密码",
                signupConfirmPasswordPlaceholder: "确认密码"
            },
            ur:
            {
                headerText: "زے ٹیوٹ ٹیکنالوجیز",
                signinTitle: "سائن ان کریں",
                signinBtn: "سائن ان کریں",
                signupTitle: "سائن اپ کریں",
                signupBtn: "سائن اپ کریں",
                orText: "یا",
                cfBtnTextCreate: "اکاؤنٹ بنائیں",
                cfBtnTextExisting: "میرے پاس پہلے سے اکاؤنٹ ہے",
                signinEmailPlaceholder: "ای میل",
                signinPasswordPlaceholder: "پاس ورڈ",
                signupEmailPlaceholder: "ای میل",
                signupPasswordPlaceholder: "پاس ورڈ",
                signupConfirmPasswordPlaceholder: "پاس ورڈ کی تصدیق کریں"
            }
        };

        const userLang = navigator.language.slice(0, 2);
        const lang = translations[userLang] ? userLang : 'en';
        const trns = translations[lang];

        document.getElementById('header-text').textContent = trns.headerText;
        document.getElementById('signin-title').textContent = trns.signinTitle;
        document.getElementById('signin-btn').textContent = trns.signinBtn;
        document.getElementById('signup-title').textContent = trns.signupTitle;
        document.getElementById('signup-btn').textContent = trns.signupBtn;
        document.getElementById('or-text').textContent = trns.orText;
        fcbt.textContent = trns.cfBtnTextCreate;
        document.getElementById('signin-email').placeholder = trns.signinEmailPlaceholder;
        document.getElementById('signin-password').placeholder = trns.signinPasswordPlaceholder;
        document.getElementById('signup-email').placeholder = trns.signupEmailPlaceholder;
        document.getElementById('signup-password0').placeholder = trns.signupPasswordPlaceholder;
        document.getElementById('signup-password1').placeholder = trns.signupConfirmPasswordPlaceholder;
    </script>
</html>
