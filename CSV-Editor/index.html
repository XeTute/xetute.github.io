<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="CSV Data Management Tool">
        <meta name="keywords" content="CSV, data, import, export, management">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">

        <title>CSV Data Manager</title>
        <link rel="icon" href="../logo.jpg"/>

        <style>
            body, html
            {
                background: #000;
                color: #fff;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
                overflow-x: hidden;
                overflow-y: auto;
                font-family: "Advent Pro", sans-serif;
            }
            
            .navbar
            {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                width: 100%;
                padding: 15px 30px;
                box-sizing: border-box;
                background: rgba(0,0,0,0.7);
            }

            .logo-container
            {
                display: flex;
                align-items: center;
                cursor: pointer;
            }

            .logo-container img
            {
                max-width: 35px;
                max-height: 35px;
                margin-right: 10px;
                transition: transform 0.3s ease;
            }
            .logo-container img:hover { transform: scale(1.1); }

            .logo-container p
            {
                font-size: 1.3rem;
                margin: 0;
                font-weight: 500;
            }

            .nav-links
            {
                display: flex;
                align-items: center;
            }
            
            a
            {
                font-size: 1.15rem;
                border: 1px solid #fff;
                color: #fff;
                text-decoration: none;
                padding: 6px 12px;
                margin: 0 8px;
                transition: 0.35s ease-in-out;
                border-radius: 4px;
            }
            a:hover
            {
                color: #000;
                background: #fff;
            }

            .csv-container
            {
                width: 100%;
                max-width: 900px;
                display: flex;
                flex-direction: column;
                margin-top: 20px;
                padding: 0 15px;
            }

            .file-input-container
            {
                display: flex;
                margin-bottom: 15px;
                gap: 10px;
                align-items: center;
            }

            .file-input-wrapper {
                position: relative;
                overflow: hidden;
                display: inline-block;
            }

            .file-input-wrapper input[type=file] {
                font-size: 100px;
                position: absolute;
                left: 0;
                top: 0;
                opacity: 0;
                cursor: pointer;
            }

            .file-input-wrapper label {
                border: 1px solid #fff;
                display: inline-block;
                padding: 10px 20px;
                cursor: pointer;
                background: #000;
                color: #fff;
                transition: 0.35s ease-in-out;
                border-radius: 4px;
            }

            .file-input-wrapper label:hover {
                background: #fff;
                color: #000;
            }

            #file-chosen {
                margin-left: 10px;
                color: #888;
            }

            #import-button, #export-button, #create-button
            {
                padding: 10px 20px;
                background: #fff;
                color: #000;
                border: 0;
                cursor: pointer;
                transition: background 0.3s ease;
                border-radius: 4px;
            }

            #import-button:hover, #export-button:hover, #create-button:hover
            {
                background: #080808;
                border: 1px solid #222;
                color: #fff;
            }

            #data-table
            {
                width: 100%;
                border-collapse: collapse;
                margin-top: 15px;
            }

            #data-table th, #data-table td
            {
                border: 1px solid #222;
                padding: 8px;
                text-align: left;
                background: #080808;
            }

            #data-table th
            {
                background: #111;
                font-weight: bold;
            }

            #data-table input {
                width: 100%;
                background: transparent;
                color: #fff;
                border: 1px solid #222;
                padding: 4px;
            }

            @media (max-width: 768px)
            {
                .navbar
                {
                    flex-direction: column;
                    padding: 15px 10px;
                }

                .nav-links
                {
                    margin-top: 10px;
                    flex-wrap: wrap;
                    justify-content: center;
                }

                a { margin: 5px; }
                .csv-container { width: 95%; }
            }
        </style>
    </head>
    <body>
        <div class="navbar">
            <div class="logo-container" onclick="window.location.href='index.html'">
                <img src="../logo.jpg" alt="CSV Manager Logo"/>
                <p>CSV Data Manager</p>
            </div>

            <div class="nav-links">
                <a href="https://github.com/YourUsername">GitHub</a>
                <a href="https://yourwebsite.com">Website</a>
                <a href="https://donate.com">Donate</a>
            </div>
        </div>

        <div class="csv-container">
            <div class="file-input-container">
                <div class="file-input-wrapper">
                    <input type="file" id="csv-file" accept=".csv" />
                    <label for="csv-file">Choose File</label>
                </div>
                <span id="file-chosen">No file chosen</span>
                <button id="import-button">Import CSV</button>
                <button id="export-button">Export CSV</button>
                <button id="create-button">Create CSV</button>
            </div>

            <table id="data-table">
                <thead>
                    <tr>
                        <!-- Dynamic headers will be added here -->
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic data will be added here -->
                </tbody>
            </table>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
        <script>
            const csvFileInput = document.getElementById('csv-file');
            const fileChosen = document.getElementById('file-chosen');
            const importButton = document.getElementById('import-button');
            const exportButton = document.getElementById('export-button');
            const createButton = document.getElementById('create-button');
            const dataTable = document.getElementById('data-table');
            const tableHead = dataTable.querySelector('thead');
            const tableBody = dataTable.querySelector('tbody');

            let parsedData = [];
            let headers = ['input', 'output'];

            csvFileInput.addEventListener('change', function() { fileChosen.textContent = this.files[0] ? this.files[0].name : 'No file chosen'; });
            importButton.addEventListener('click', () =>
            {
                const file = csvFileInput.files[0];
                if (file) {
                    Papa.parse(file,
                    {
                        header: true,
                        complete: function(results)
                        {
                            parsedData = results.data;
                            headers = results.meta.fields;
                            renderTable(results);
                        },
                        error: function(error)
                        {
                            console.error('CSV Parsing Error:', error);
                            alert('Error parsing CSV file.');
                        }
                    });
                } else alert('Please select a CSV file first.');
            });

            // Export CSV functionality
            exportButton.addEventListener('click', () =>
            {
                if (parsedData.length === 0)
                {
                    alert('No data to export. Please import or create a CSV file first.');
                    return;
                }

                const csv = Papa.unparse(parsedData);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                
                link.setAttribute('href', url);
                link.setAttribute('download', 'exported_data.csv');
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });

            createButton.addEventListener('click', () =>
            {
                parsedData = [{ input: '', output: '' }];
                renderTable({ 
                    meta: { fields: headers }, 
                    data: parsedData 
                });
            });

            function renderTable(results)
            {
                tableHead.innerHTML = '';
                tableBody.innerHTML = '';

                const headerRow = document.createElement('tr');
                results.meta.fields.forEach(header =>
                {
                    const th = document.createElement('th');
                    th.textContent = header;
                    headerRow.appendChild(th);
                });
                tableHead.appendChild(headerRow);

                results.data.forEach((row, rowIndex) =>
                {
                    const tr = document.createElement('tr');
                    results.meta.fields.forEach(field => {
                        const td = document.createElement('td');
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.value = row[field];
                        input.addEventListener('change', (e) => { parsedData[rowIndex][field] = e.target.value; });
                        
                        const addRowButton = document.createElement('button');
                        addRowButton.textContent = '+';
                        addRowButton.style.marginLeft = '5px';
                        addRowButton.addEventListener('click', () =>
                        {
                            const newRow = {...parsedData[rowIndex]};
                            parsedData.splice(rowIndex + 1, 0, newRow);
                            renderTable({ meta: { fields: results.meta.fields }, data: parsedData });
                        });

                        if (rowIndex === results.data.length - 1)
                        {
                            td.appendChild(input);
                            td.appendChild(addRowButton);
                        }
                        else td.appendChild(input);
                        
                        tr.appendChild(td);
                    });
                    tableBody.appendChild(tr);
                });
            }
        </script>
    </body>
</html>
