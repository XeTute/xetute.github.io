<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="CYE by XeTute Technologies">
        <meta name="keywords" content="XeTute Technologies, XeTute, Cook, your, exams, exam, Cook Your Exams, Study, Academic">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <title>CYE by XeTute Technologies</title>
        <link rel="icon" href="../logo.jpg"/>
        <link rel="stylesheet" href="../basic.css"/>
        
        <style>
            div
            {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            header
            {
                margin: 20px;
                padding: 0;
                top: 0;
                position: sticky;

                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);

                width: 100%;
                padding: 20px;
                border: 1px solid #000;
                border-radius: 5px;

                z-index: 10;
            }

            #feed
            {
                width: 60%;
                min-width: 300px;
                max-width: 550px;
                justify-content: flex-start;

                background: rgba(0, 0, 0, 0.4);
                border-radius: 15px;
                border: 2px solid #222;
            }

            .feedelem
            {
                backdrop-filter: blur(18px);
                -webkit-backdrop-filter: blur(18px);

                flex-direction: row;
                width: 90%;
                max-width: 600px;
                min-height: 150px;
                max-height: 250px;
                margin: 20px;

                border: 2px solid #666;
                border-radius: 8px;

                transition: 0.4s ease-in-out;
            }
            .feedelem:hover
            {
                background: #fff;
                color: #000;
            }

            .feedelem h3, .feedelem p
            {
                margin: 5px;
                padding: 0;
            }

            .feedelem-border
            {
                height: 90%;
                width: 2px;
                background: #fff;
                margin: 3%;
                border-radius: 100%;
            }
        </style>
    </head>
    <body>
        <header>
            <div>
                <h1 style="margin: 0;">CYE</h1>
                <div style="width: 125px; background: #fff; height: 2px; border-radius: 8px; margin: 12px; padding: 0;"></div>
                <div style="flex-direction: row;">
                    <a href="./feed.html" style="background: #fff; color: #000;">Feed</a>
                    <a href="./profile.html">Profile</a>
                    <a href="./newpost.html">Post</a>
                </div>
            </div>
        </header>

        <div id="feed">

        </div>
        <p style="display: none;" id="Auth-Refer">../auth.html?CYE/feed.html</p>
    </body>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js';

        const firebaseConfig =
        {
          apiKey: "AIzaSyBDz4iOz98Us7RaNgOTAZ6PGsemBFW7k_A",
          authDomain: "xetuteauth.firebaseapp.com",
          projectId: "xetuteauth",
          storageBucket: "xetuteauth.firebasestorage.app",
          messagingSenderId: "500556520913",
          appId: "1:500556520913:web:381dc486949b1ae84694f0",
          measurementId: "G-VJFMP5F975"
        };

        onAuthStateChanged(getAuth(initializeApp(firebaseConfig)), (user) =>
        {
            const refer = document.getElementById('Auth-Refer');
            if (window.location.search.substr(1)) refer.textContent = window.location.search.substr(1);
            if (!user) window.location.href = refer.textContent;
        });
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script defer>
        firebase.initializeApp
        (
            {
                apiKey: "AIzaSyBDz4iOz98Us7RaNgOTAZ6PGsemBFW7k_A",
                authDomain: "xetuteauth.firebaseapp.com",
                projectId: "xetuteauth",
                storageBucket: "xetuteauth.firebasestorage.app",
                messagingSenderId: "500556520913",
                appId: "1:500556520913:web:381dc486949b1ae84694f0",
                measurementId: "G-VJFMP5F975"
            }
        );

        let db = firebase.firestore();
        db.enablePersistence();

        function formatLikes(x)
        {
            if (x >= (10 ** 6)) return `${x / (10 ** 6)}`.substr(0, 3) + 'M';
            if (x >= (10 ** 3)) return `${x / (10 ** 3)}`.substr(0, 3) + 'k';
            else return x;
        }

        function feedelem(post)
        {
            const feedelem =
            `
            <div class="feedelem">
                <div style="width: 12.5%;"></div>
                <div style="max-width: 50%; ">
                    <h3>${post.Header}</h3>
                    <p>${post.Description}</p>
                    <p>${post.Level}</p>
                </div>
                <div style="width: 25%;"></div>
                <div style="max-width: 50%;">
                    <p>${post.Likes} ❤</p>
                    <p style="flex-direction: row;">—${post.Author}</p>
                </div>
                <div style="width: 12.5%;"></div>
            </div>
            `;
            return feedelem;
        }

        db.collection('CYE-Post').get().then
        ( (qs) =>
            {
                qs.forEach((doc) => { document.getElementById('feed').innerHTML += feedelem(doc.data()); } ) 
            }
        )
        .catch((e) => { console.log(e); } )
    </script>
</html>
