<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="CYE by XeTute Technologies">
        <meta name="keywords" content="XeTute Technologies, XeTute, Cook, your, exams, exam, Cook Your Exams, Study, Academic">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <title>CYE by XeTute Technologies</title>
        <link rel="icon" href="../logo.jpg"/>
        <link rel="stylesheet" href="../basic.css"/>
        
        <style>
            div
            {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            header
            {
                margin: 20px;
                padding: 0;
                top: 0;
                position: sticky;

                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);

                width: 100%;
                padding: 20px;
                border: 1px solid #000;
                border-radius: 5px;

                z-index: 10;
            }

            #feed
            {
                width: 60%;
                min-width: 300px;
                max-width: 550px;
                justify-content: flex-start;

                background: rgba(0, 0, 0, 0.4);
                border-radius: 15px;
                border: 2px solid #222;
            }

            .feedelem
            {
                backdrop-filter: blur(18px);
                -webkit-backdrop-filter: blur(18px);

                flex-direction: row;
                width: 90%;
                max-width: 600px;
                min-height: 150px;
                max-height: 250px;
                margin: 20px;

                border: 2px solid #666;
                border-radius: 8px;

                transition: 0.4s ease-in-out;
            }
            .feedelem:hover
            {
                background: #fff;
                color: #000;
            }

            .feedelem h3, .feedelem p
            {
                margin: 5px;
                padding: 0;
            }

            .feedelem-border
            {
                height: 90%;
                width: 2px;
                background: #fff;
                margin: 3%;
                border-radius: 100%;
            }
        </style>
    </head>
    <body>
        <header>
            <div>
                <h1 style="margin: 0;">CYE</h1>
                <div style="width: 125px; background: #fff; height: 2px; border-radius: 8px; margin: 12px; padding: 0;"></div>
                <div style="flex-direction: row;">
                    <a href="./feed.html" style="background: #fff; color: #000;">Feed</a>
                    <a href="./profile.html">Profile</a>
                    <a href="./newpost.html">Post</a>
                </div>
            </div>
        </header>

        <div id="feed">

        </div>
    </body>
    <script type="module" src="../firebase.js"></script>
    <script defer>
        function formatLikes(x)
        {
            if (x >= (10 ** 6)) return `${x / (10 ** 6)}`.substr(0, 3) + 'M';
            if (x >= (10 ** 3)) return `${x / (10 ** 3)}`.substr(0, 3) + 'k';
            else return x;
        }

        const feedelem =
        `
        <div class="feedelem">
            <div style="width: 12.5%;"></div>
            <div style="max-width: 50%; ">
                <h3>${'Title'}</h3>
                <p>${'Description'}</p>
                <p>${'Easy / Medium / Hard'}</p>
            </div>
            <div style="width: 25%;"></div>
            <div style="max-width: 50%;">
                <p>${formatLikes(5235)}❤</p>
                <p>${'Author Alias'}</p>
            </div>
            <div style="width: 12.5%;"></div>
        </div>
        `;

        for (let i = 0; i < 30; ++i) document.getElementById('feed').innerHTML += feedelem;
    </script>
</html>
