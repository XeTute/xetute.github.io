<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="XeTute Technologies, XeTute, LLM Chat, AI Chat, ChatGPT">
    <title>Chat \\ Xetute Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Pinstripe:ital@0;1&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="basic.css">
    <script>
      function updateVh()
      {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }
      updateVh();
      window.addEventListener('resize', updateVh);
    </script>
    <style>
        html, body
        {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
            background: #1a1a1a;
        }
        
        #chat-interface
        {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
        }
        
        #sidebar
        {
            background: #202020;
            width: 260px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: fixed;
            left: -260px;
            transition: left 0.3s ease-in-out;
            z-index: 1000;
        }
        #sidebar.active { left: 0; }
        
        #main-content
        {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }
        
        @media (min-width: 769px)
        {
            #sidebar
            {
                position: relative;
                left: 0;
                height: 100%;
            }
            
            #menu-toggle { display: none; }
            
            #main-content
            {
                margin-left: 260px;
                height: 100vh;
            }
            
            #chat-container
            {
                max-width: 800px;
                margin: 0 auto;
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 20px;
                box-sizing: border-box;
            }
            
            #input-container
            {
                position: sticky;
                bottom: 0;
                width: 100%;
                max-width: 800px;
                margin: 0 auto;
                padding: 20px;
                box-sizing: border-box;
                background: #1a1a1a;
                z-index: 100;
            }
        }
        
        @media (max-width: 768px)
        {
            #main-content { height: calc(var(--vh, 1vh) * 100); }
            
            #chat-container
            {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 20px;
                box-sizing: border-box;
            }
            
            #input-container
            {
                flex: 0 0 auto;
                padding: 20px 15px calc(20px + env(safe-area-inset-bottom)) 15px;
                background: #1a1a1a;
                border-top: 1px solid #333;
                z-index: 100;
            }
            
            #menu-toggle { top: calc(20px + env(safe-area-inset-top)); }
        }
        
        #menu-toggle
        {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 10px;
        }
        
        .message
        {
            position: relative;
            max-width: 700px;
            width: calc(100% - 40px);
            padding: 15px 20px;
            margin: 10px 0;
            border-radius: 20px;
            line-height: 1.5;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        
        .message-avatar
        {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            margin-top: 5px;
        }
        
        .user-message .message-avatar { margin-left: 10px; }
        .assistant-message .message-avatar { margin-right: 10px; }
        
        .user-message
        {
            background: #2a2a2a;
            flex-direction: row-reverse;
            text-align: right;
            margin-left: auto;
            margin-right: 10px;
        }
        
        .assistant-message
        {
            background: #333;
            text-align: left;
            margin-right: auto;
            margin-left: 10px;
        }
        
        .input-wrapper
        {
            position: relative;
            display: flex;
            align-items: stretch;
        }
        
        #messageInput
        {
            width: 100%;
            min-height: 50px;
            box-sizing: border-box;
            resize: none;
            overflow-y: hidden;
            border: 2px solid #444;
            border-right: none;
            border-radius: 25px 0 0 25px;
            padding: 15px 60px 15px 20px;
            background: #222;
            color: white;
        }
        
        #sendButton
        {
            height: 50px;
            width: 50px;
            border: 2px solid #444 !important;
            border-left: none !important;
            border-radius: 0 25px 25px 0;
            background: #222;
            color: #888;
        }
        
        #links-bar 
        {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 0;
            margin-top: 12px;
            flex-wrap: wrap;
            width: 100%;
        }
        
        .social-link
        {
            color: #888;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            text-decoration: none;
        }
        
        .social-link:hover { color: #fff; }
        
        .loading
        {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: calc(100% - 40px);
        }
        
        .loading-dots
        {
            display: flex;
            gap: 4px;
        }
        
        .loading-dots span
        {
            width: 8px;
            height: 8px;
            background: #888;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes pulse
        {
            0%, 100%
            {
                transform: scale(1);
                opacity: 1;
            }
            50%
            {
                transform: scale(0.7);
                opacity: 0.5;
            }
        }
        
        #overlay
        {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
        
        #sidebarbtn
        {
            margin-left: 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <button id="menu-toggle">
        <i class="fa fa-bars fa-2x"></i>
    </button>

    <div id="overlay"></div>

    <div id="chat-interface">
        <div id="sidebar">
            <div style="padding: 0; margin: 0; width: 100%; height: 2rem;"></div>
            <button style="margin-top: 20px;" id="sidebarbtn" onclick="startNewChat()">New Chat</button>
        </div>
        
        <div id="main-content">
            <div id="chat-container"></div>
            <div id="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Send a message..." rows="1"></textarea>
                    <button id="sendButton"><i class="fa fa-paper-plane"></i></button>
                </div>
                <div id="links-bar">
                    <a href="https://github.com/XeTute" target="_blank" class="social-link">
                        <i class="fa fa-github"></i> GitHub
                    </a>
                    <a href="https://huggingface.co/XeTute" target="_blank" class="social-link">
                        &#129303; HuggingFace
                    </a>
                    <a href="https://ko-fi.com/XeTute" target="_blank" class="social-link">
                        &#128147; Support Us
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('messageInput');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        
        const messages =
        [{
            role: 'system',
            content: `You're a Chatbot with no name by the Pakistani startup XeTute Technologies at https://xetute.com/.
Always respond as engaging as possible while remaining helpful.
Before answering scientific/STEM-related questions, always reason BEFORE you answer.
Basic Markdown is supported.`
        }];
        
        let processing = false;
        
        function toggleSidebar()
        {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
        
        menuToggle.addEventListener('click', function(e)
        {
            e.stopPropagation();
            toggleSidebar();
        });
        
        overlay.addEventListener('click', toggleSidebar);
        
        function parseMarkdown(text)
        {
            text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            text = text.replace(/^\* (.+)$/gm, '<li>$1</li>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }
        
        function createLoadingIndicator()
        {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = `
                Generating response
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>`;
            return loadingDiv;
        }
        
        function addMessage(content, sender)
        {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', `${sender}-message`);
            
            const avatar = document.createElement('img');
            avatar.className = 'message-avatar';
            avatar.src = sender === 'user' ? 'user.jpg' : 'logo.jpg';
            avatar.alt = `${sender} avatar`;
            
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = parseMarkdown(content);
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        async function sendMessage()
        {
            if (processing) return;
            const message = messageInput.value.trim();
            if (!message) return;
            
            processing = true;
            messageInput.value = '';
            addMessage(message, 'user');
            
            messages.push({ role: 'user', content: message });
            
            const loadingDiv = createLoadingIndicator();
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            try
            {
                const response = await fetch
                (
                    'https://ai.xetute.com/v1/chat/completions',
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: messages, stream: true, temperature: 0.5 })
                    }
                );
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantContent = '';
                
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message', 'assistant-message');
                const avatar = document.createElement('img');
                avatar.className = 'message-avatar';
                avatar.src = 'logo.jpg';
                avatar.alt = 'assistant avatar';
                const contentDiv = document.createElement('div');
                messageDiv.append(avatar, contentDiv);
                
                loadingDiv.replaceWith(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                
                while (true)
                {
                    const { done, value } = await reader.read();
                    if (done) { break; }
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(l => l.trim());
                    
                    for (const line of lines)
                    {
                        if (line === 'data: [DONE]') { break; }
                        if (!line.startsWith('data: ')) { continue; }
                        
                        try
                        {
                            const data = JSON.parse(line.slice(6));
                            const token = data.choices[0].delta.content;
                            if (token)
                            {
                                assistantContent += token;
                                contentDiv.innerHTML = parseMarkdown(assistantContent);
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }
                        } catch (e) { console.error('Error parsing stream chunk:', e); }
                    }
                }
                
                messages.push({ role: 'assistant', content: assistantContent });
            }
            catch (error)
            {
                console.error('Error:', error);
                loadingDiv.remove();
                addMessage("Sorry, I'm having trouble connecting to the server.", 'assistant');
            }
            
            processing = false;
        }
        
        function startNewChat()
        {
            chatContainer.innerHTML = '';
            messages.length = 0;
            messages.push
            ({
                role: 'system',
                content: "You're a Chatbot by XeTute Technologies. Keep responses concise and helpful."
            });
            if (window.innerWidth <= 768) toggleSidebar();
        }
        
        messageInput.addEventListener('keypress', function(e)
        {
            if (e.key === 'Enter' && !e.shiftKey)
            {
                e.preventDefault();
                sendMessage();
            }
        });
        
        messageInput.addEventListener('input', function()
        {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        });
        
        document.getElementById('sendButton').addEventListener('click', sendMessage);
    </script>
</body>
</html>
