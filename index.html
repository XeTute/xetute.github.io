<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <meta name="keywords" content="XeTute, XeTute Technologies, Technologies, FlareAI, AI, Hello Friend"/>
        <meta name="description" content="Follow your Curiosity — Lead Humanity Forward"/>

        <title>Hello, Friend \\ XeTute Technologies</title>

        <link rel="stylesheet" href="basic.css"/>
        <link rel="icon" href="logo.jpg"/>
        <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

        <script src="https://kit.fontawesome.com/cc84e7136d.js" crossorigin="anonymous"></script>
    </head>
    <style>
        .section
        {
            width: 100%;
            min-height: 100vh;

            justify-content: center;
            align-items: center;
        }
        .margin { margin: 20px; }

        .scrollDown
        {
            border-radius: 25px;
            font-size: 40px;

            width: 50px;
            height: 50px;

            position: absolute;
            bottom: 10px;

            padding: 20px;

            transition: 0.2s ease-in-out;
        }
        .scrollDown:hover { background: rgba(127, 127, 127, 0.75); }

        @media (max-width: 412px)
        {
            #links { flex-direction: column; }
            #linksline { width: 60%; height: 3px; }
        }
        @media (min-width: 413px)
        {
            #links { flex-direction: row; }
            #linksline { width: 3px; height: 60%; }
        }
    </style>
    <body>
        <!-- HEADING -->
        <div class="section" style="margin-top: 30px;">
            <h1 style="font-size: 5rem;">Hello, Friend.</h1>
            <p style="font-size: 1.25rem;">
                Follow your Curiosity<br>
                Lead Humanity Forward
            </p>
            <a class="sb scrollDown" onclick="document.getElementById('links').scrollIntoView({ behavior: 'smooth' });"><i class="fa fa-arrow-down" aria-hidden="true"></i></a>
        </div>

        <!--LINKS-->
        <div class="section" style="height: 65vh;" id="links">
            <div class="margin" style="width: 100%; overflow: hidden;">
                <h1>Our Apps</h1>
                <em>Currently designing FlareAI.</em>
            </div>
            <div class="line" id="linksline"></div>
            <div class="margin" style="width: 100%; overflow: hidden;">
                <h1 style="margin-bottom: 10px;">Our Socials</h1>
                <a class="sb" href="https://www.youtube.com/@XeTuteTechnologies"><span>YouTube</span></a>
                <a class="sb" href="https://bsky.app/profile/xetute.bsky.social"><span>Bluesky</span></a>
                <a class="sb" href="https://github.com/XeTute"><span>GitHub</span></a>
                <a class="sb" href="https://huggingface.co/XeTute"><span>HuggingFace</span></a>
            </div>
        </div>
    </body>

</html>
