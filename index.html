<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Long live the Islamic Republic of Pakistan.">
    <title>Chat \\ Xetute Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- My links -->
    <link rel="icon"       href="logo.jpg"    >
    <link rel="stylesheet" href="css/vars.css">
    <link rel="stylesheet" href="css/html.css">
    
    <!-- Add Marked.js & MatHJAX library -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
      // Configure Marked.js
      marked.setOptions
      ({
        breaks: true,
        highlight: function(code) { return code; },
        renderer: new marked.Renderer({})
      });
    </script>

    <script type="text/javascript">
    window.MathJax =
    {
      tex:
      {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]']]
      },
      options:
      {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
    </script>

    <script>
      function updateVh()
      {
        document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
      }
      window.addEventListener('resize', updateVh);
    </script>

    <style>
        #chat-interface
        {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
        }
        
        #sidebar
        {
            background: var(--secondary-bg);
            width: var(--sidebar-width);
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: fixed;
            left: calc(-1 * var(--sidebar-width));
            transition: left var(--transition-speed) ease-in-out;
            z-index: 1000;
            box-shadow: 2px 0 10px var(--shadow-color);
            overflow-y: auto;
            padding-top: 20px;
        }
        
        #sidebar.active { left: 0; }
        
        #main-content
        {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
            height: 100vh;
        }

        @media (orientation: landscape)
        {
            #sidebar
            {
                position: relative;
                left: 0;
                height: 100%;
            }
            
            #menu-toggle { display: none; }
            
            #main-content
            {
                margin-left: var(--sidebar-width);
                height: 100vh;
            }
            
            #chat-container
            {
                width: 95%;
                max-width: 900px;
                margin: 0 auto;
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                scrollbar-width: thin;
                scrollbar-color: var(--accent-color) transparent;
            }
            
            #input-container
            {
                width: 95%;
                max-width: 900px;
                position: sticky;
                bottom: 0;
                margin: 0 auto;
                padding: 20px;
                z-index: 100;
            }
        }
        
        @media (orientation: portrait)
        {
            #main-content { height: calc(var(--vh, 1vh) * 100); }
            
            #chat-container
            {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                padding: 20px;
            }
            
            #input-container
            {
                flex: 0 0 auto;
                padding: 20px 15px calc(20px + env(safe-area-inset-bottom)) 15px;
                border-top: 1px solid var(--border-color);
                z-index: 100;
            }
            
            #menu-toggle { top: calc(20px + env(safe-area-inset-top)); }
        }

        #menu-toggle
        {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: var(--card-bg);
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: background-color 0.2s ease;
        }

        #menu-toggle:hover { background: var(--accent-color); }
        
        @keyframes fadeIn
        {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message
        {
            display: flex;
            align-items: center;
            position: relative;
            max-width: 90%;
            margin: 12px 0;
            border-radius: var(--message-radius);
            line-height: 1.6;
            overflow-wrap: break-word;
            word-break: break-word;
            animation: fadeIn 0.4s ease-in-out;
        }

        .message div
        {
            padding: 0;
            margin: 0;
        }

        .message p { margin-bottom: 0.8em; }
        .message p:last-child { margin-bottom: 0; }

        .message p code
        {
            background: var(--secondary-bg);
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 0.9em;
            display: inline;
            white-space: normal;
        }

        .message a
        {
            margin: 0;
            padding: 0;
            border: 0;
            border-radius: 0;
            color: rgba(136, 136, 252, 1);

            text-decoration: underline;
            text-decoration-color: rgba(105, 105, 255, 1);
            text-decoration-thickness: 1px;

            transition: 0.125s ease-in-out;
        }
        .message a:hover, .message a:focus
        {
            margin: 0;
            padding: 0;
            border: 0;
            border-radius: 0;

            text-decoration: underline;
            text-decoration-color: rgba(105, 105, 255, 0.8);
            text-decoration-thickness: 2px;
        }

        .message img
        {
            max-width: 100%;
            border-radius: 8px;
            margin: 8px 0;
        }

        .message table
        {
            border-collapse: collapse;
            margin: 15px 0;
            width: 100%;
        }

        .message th, .message td
        {
            padding: 12px;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        .message th
        {
            background-color: var(--card-bg);
            font-weight: 500;
        }

        .message ul, .message ol
        {
            padding-left: 20px;
            margin: 10px 0;
        }
        
        .message-avatar
        {
            width: 36px;
            height: 36px;
            border-radius: 50% !important;
            object-fit: cover;
            flex-shrink: 0;
            margin: 10px !important;
            border: 2px solid var(--accent-color);
        }
        
        .user-message
        {
            background-color: var(--accent-color);
            color: white;
            margin-left: auto;
            margin-right: 2px;
            border-top-right-radius: 4px;
            text-align: right;
            justify-content: flex-end;
        }
        .user-message div, .user-message img { text-align: right; align-items: right; }

        .assistant-message
        {
            background-color: var(--card-bg);
            margin-right: auto;
            margin-left: 2px;
            border-top-left-radius: 4px;
            padding: 16px 18px;
        }

        .user-message { padding: 16px 18px; }
        .user-message pre, .user-message code { text-align: left; }
        .user-message .message-avatar
        {
            order: 2;
            border-color: white;
        }
        
        #input-container
        {
            background-color: var(--primary-bg);
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        
        .input-wrapper
        {
            position: relative;
            display: flex;
            align-items: stretch;
            border-radius: 24px;
            overflow: hidden;
            background: var(--input-bg);
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: box-shadow 0.3s ease;
        }
        
        .input-wrapper:focus-within { box-shadow: 0 1px 12px #333; }
        
        #messageInput
        {
            flex-grow: 1;
            min-height: 50px;
            box-sizing: border-box;
            resize: none;
            overflow-y: hidden;
            border: none;
            border-radius: 24px 0 0 24px;
            padding: 15px 20px;
            background: transparent;
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            outline: none;
        }

        #sendButton
        {
            height: auto;
            width: 50px;
            border: none;
            background: var(--accent-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        #sendButton:hover { background: var(--accent-light); }
        
        .loading
        {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            padding: 15px;
            max-width: 800px;
            margin: 10px auto;
            background: var(--card-bg);
            border-radius: var(--message-radius);
            animation: fadeIn 0.3s ease-in-out;
        }
        
        .loading-dots
        {
            display: flex;
            gap: 4px;
        }
        
        .loading-dots span
        {
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: pulse .5s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.1s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.2s; }
        
        @keyframes pulse
        {
            0%, 100%
            {
                transform: scale(1);
                opacity: 1;
            }
            50%
            {
                transform: scale(0.6);
                opacity: 0.5;
            }
        }
        
        #overlay
        {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            backdrop-filter: blur(2px);
            animation: fadeIn 0.3s ease-in-out;
        }
        
        #overlay.active { display: block; }

        .sidebartxt
        {
            margin: 20px 0 10px 20px;
            font-size: 1.1em;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebarbtn
        {
            margin: 5px 15px;
            padding: 10px 15px;
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-color);
            display: flex;
            align-items: center;
            text-align: left;
            gap: 10px;
            font-size: 14px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
        }

        .sidebarbtn:hover
        {
            background: var(--accent-color);
            color: white;
            text-decoration: none;
        }

        .chathistorybtn
        {
            display: flex;
            align-items: center;
            margin: 5px 15px;
        }

        .chathistorybtn .sidebarbtn
        {
            margin: 0;
            flex: 1;
        }

        .chathistorybtn button:last-child
        {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border: none;
            border-radius: 8px;
            margin-left: 5px;
            color: #ffa8a8;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .chathistorybtn button:last-child:hover
        {
            background: #ff7a7a;
            color: white;
        }

        .quickactions
        {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 5px -5px 5px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s ease;
            font-weight: 500;
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
        }
        .quickactions i { margin-right: 6px; }

        .quickactions:hover
        {
            color: var(--accent-light);
            background: var(--card-bg);
            text-decoration: none;
        }

        .thoughts-container
        {
            border-left: 3px solid var(--accent-color);
            height: fit-content;
            margin: 5px;
            display: none;
            font-size: 0.9em;
            color: #ccc;
            white-space: pre-wrap;
        }

        .thoughts-toggle
        {
            background: var(--card-bg);
            color: var(--accent-light);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 5px;
            margin-left: -8px;
            font-size: 0.8em;
            transition: all 0.2s ease;
        }

        .thoughts-toggle:hover
        {
            background: var(--accent-color);
            color: white;
            scale: 0.95;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb
        {
            background: var(--accent-color);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-light); }
    </style>
  </head>
  <body>
    <button id="menu-toggle">
        <i class="fas fa-bars"></i>
    </button>

    <div id="overlay"></div>

    <div id="chat-interface">
        <div id="sidebar">
            <div style="padding: 0; margin-top: 50px; width: 100%;"></div>

            <h1 class="sidebartxt">Other</h1>
            <a class="sidebarbtn" onclick="window.location.href = `./about/?${window.location.href}`;">
                <i class="fas fa-info-circle"></i> About Us
            </a>
        </div>
        
        <div id="main-content">
            <div id="chat-container"></div>
            <div id="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Whereas disregard and contempt for human rights have resulted" rows="2"></textarea>
                    <button id="sendButton"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div style="display: flex; justify-content: center; gap: 15px; margin-top: 12px;">
                    <a href="https://xetute.com/" class="quickactions"><i class="fas fa-plus-circle"></i> New Chat</a>
                    <a id="authprofile" class="quickactions"><i class="fas fa-user"></i> Loading...</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateVh()
        {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('load', updateVh);
        window.addEventListener('resize', updateVh);
    </script>
    <script src="pocketbase.umd.js"></script>
    <script defer>
        // UI Elements
        const sidebar = document.getElementById('sidebar');
        const chatContainer = document.getElementById('chat-container');
        const menuToggle = document.getElementById('menu-toggle');
        const overlay = document.getElementById('overlay');
    
        // Toggle sidebar for mobile
        menuToggle.addEventListener('click', () => 
        {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        });
    
        overlay.addEventListener('click', () => 
        {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        });

        document.getElementById('messageInput').addEventListener('input', function()
        {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.scrollHeight > 150)
            { this.style.height = '150px'; }
        });
    
        // Backend constants
        const date = new Date();
        const pb = new PocketBase("https://db.xetute.com/");
        let authenticated = false;
        const completionendpoint = [ "https://ai.xetute.com/v1/chat/completions", "https://api.groq.com/openai/v1/chat/completions"];
        const modelnameendpoint  = [ { url: "https://ai.xetute.com/api/v1/model", fromresponse: "result", key: '0', temp: 0.65 }, { preset: "deepseek-r1-distill-qwen-32b", key: "gs" + "k_wLONdT9NuUPVjgORByKtWGdyb3FYtuzJAO05AoEW9hIAzPtJVQ9K", temp: 1 }];
    
        // Backend vars
        let config = { endpoint: "", modelname: "", key: "", temp: 0 };
        let message = [];
        let chatid = -1;
        let newchat = -1;
    
        function generateFirstSystemPrompt(username)
        {
            let buffer = "You are a helpful AI assistant from Pakistan-Based XeTute Technologies.";
    
            buffer += "\nXeTute Technologies on Platforms:";
            buffer += "\n- Webpage: https://xetute.com/";
            buffer += "\n- HuggingFace: https://huggingface.co/XeTute";
            buffer += "\n- BlueSky: https://bsky.app/profile/xetute.bsky.social";
            buffer += "\n- YouTube: https://www.youtube.com/@XeTuteTechnologies";
            buffer += "\nKo-Fi: https://ko-fi.com/XeTute";
            buffer += "\nMarkdown is supported.";
    
            buffer += `\nThe user's name is ${username}.`;
            buffer += `\nChat started: ${date.getDate()}.${date.getMonth() + 1}.${date.getFullYear()} ${date.getHours()}:${date.getMinutes()}.`; // Fuck you JS devs 💀💀
            buffer += `\nCurrent time: ${date.getDate()}.${date.getMonth() + 1}.${date.getFullYear()} ${date.getHours()}:${date.getMinutes()} (this line is updated dynamically).\n`;
    
            return buffer;
        }
    
        function updateSystemPrompt(prompt)
        {
            const updatedline = `Current time: ${date.getDate()}.${date.getMonth() + 1}.${date.getFullYear()} ${date.getHours()}:${date.getMinutes()} (this line is updated dynamically).\n`;
            return prompt.substring(0, prompt.lastIndexOf('\n') + 1) + updatedline;
        }
    
        async function testEndpoints()
        {
            let response;
            let name = "";
            let failed = false;
    
            for (let x = 0; x < modelnameendpoint.length; ++x)
            {
                if (modelnameendpoint[x].preset)
                {
                    config.endpoint = completionendpoint[x];
                    config.modelname = modelnameendpoint[x].preset;
                    config.key = modelnameendpoint[x].key;
                    config.temp = modelnameendpoint[x].temp;
                    failed = true;
                    break;
                }
                
                try
                {
                    response = await fetch(modelnameendpoint[x].url);
                    name = (await response.json())[modelnameendpoint[x].fromresponse];
                    if (name.includes("koboldcpp/"))
                        { name = name.split("koboldcpp/")[1]; }
                }
                catch (e)
                {
                    failed = true;
                    console.error("Endpoint error:", e);
                }
    
                if (!failed)
                {
                    config.endpoint = completionendpoint[x];
                    config.modelname = name;
                    config.key = modelnameendpoint[x].key;
                    config.temp = modelnameendpoint[x].temp;
                    break;
                }
            }
        }
    
        async function authAndDisplay()
        {
            const authprofile = document.getElementById('authprofile');
            try
            {
                await pb.collection('accounts').authRefresh();
                authenticated = true;
    
                let auth = pb.authStore.record;
                let updated = false;
                if (!auth.data || (auth.data === null) || (auth.data === "") || (auth.data === undefined)) { auth.data = {}; updated = true; }
                if (!auth.data.username) { auth.data.username = "Friend"; updated = true; }
                if (!auth.data?.chat) { auth.data.chat = []; updated = true; }
                if (updated) { try { await pb.collection('accounts').update(auth.id, { data: auth.data }); } catch (e) { console.log("Error updating record: ", e); } }

                authprofile.innerHTML = `<i class="fas fa-user"></i> ${auth.data.username}`;
                authprofile.href = `./account/?${window.location.href}`;
            }
            catch (e)
            { console.log("Error while authRefresh:", e);
                authenticated = false;
                authprofile.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                authprofile.href = `./auth/?${window.location.href}`;
            }
        }
    
        function displayAllMessages()
        {
            chatContainer.innerHTML = '';
            for (let x = 1; x < message.length; ++x)
                { addMessage(message[x].role, message[x].content); }
        }
    
        async function getChatID()
        {
            const urlParams = new URLSearchParams(window.location.search);
            chatid = urlParams.has('chat') ? parseInt(urlParams.get('chat')) : -1;
            let data = pb.authStore?.record?.data;
    
            try
            {
                if ((data.chat === '') || (data.chat === undefined) || (data.chat === null))
                {
                    data.chat = [];
                    try { await pb.collection('accounts').update(pb.authStore.record.id, { data: data }); }
                    catch (e) { console.log(e); }
                }
            }
            catch (e) { console.log(e); }

            try
            {
                if (authenticated && data.chat[chatid])
                {
                    message = data.chat[chatid];
                    message[0].content = updateSystemPrompt(message[0].content);
                    displayAllMessages();
                    newchat = false;
                }
                else { throw new Error('Invalid chat ID'); }
            }
            catch (e)
            {
                message = [ { role: "system", content: generateFirstSystemPrompt(authenticated ? data.username : "Friend") } ];
                newchat = authenticated;
                chatid = authenticated ? data.chat.length : -1;
            }
            return { chatid, newchat };
        }
    
        function ensureMaxChars(str, maxchars)
        {
            return str.length > maxchars ? str.substring(0, maxchars - 3) + '...' : str;
        }
    
        function ensureMaxDigits(x, maxdigits)
        {
            const xstr = String(x);
            return ((xstr.length > maxdigits) ? ((xstr.substring(0, maxdigits)[maxdigits - 1] === '.') ? xstr.substring(0, maxdigits + 1) : xstr.substring(0, maxdigits)) : xstr);
        }

        function toggleThoughts(button)
        {
            const container = button.nextElementSibling;
            const isVisible = container.style.display === 'block';

            container.style.display = isVisible ? 'none' : 'block';
            button.textContent = isVisible ? 'Show Thoughts' : 'Hide Thoughts';

            if (!isVisible)
            {
                setTimeout(() =>
                { container.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
            }
        }

        function formatMessage(text)
        {
            let jaxedtext = document.createElement('div');
            jaxedtext.innerHTML = text;

            if (window.MathJax)
            {
                try { MathJax.typeset([jaxedtext]); }
                catch (e) { console.error("MathJAX error:", e); }
            }
            text = jaxedtext.innerHTML;

            const originalText = text;
            const thoughtsRegex = /<think>([\s\S]*?)<\/think>/g;
            let html = marked.parse(text.replace(/<think>[\s\S]*?<\/think>/g, ''));

            if (thoughtsRegex.test(originalText))
            {
                thoughtsRegex.lastIndex = 0;

                let thoughtsContent = '';
                let match;

                while ((match = thoughtsRegex.exec(originalText)) !== null)
                    { thoughtsContent += match[1] + '\n\n'; }

                // Add toggle button and thoughts container at the beginning
                const thoughtsHTML =
                `<div>
                    <button class="thoughts-toggle" onclick="toggleThoughts(this)">Show Thoughts</button>
                    <div class="thoughts-container" style="display: none;"><p style="margin: 15px;">${thoughtsContent.trim()}</p></div>
                </div>`;

                // Insert at the beginning of the HTML
                html = thoughtsHTML + html;
            }

            return html;
        }
    
        function addMessage(role, content)
        {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
    
            const avatar = document.createElement('img');
            avatar.className = 'message-avatar';
            avatar.src = role === 'user' ? 'user.jpg' : 'logo.jpg';
    
            const contentDiv = document.createElement('div');
            if (window.MathJax) 
            { 
                try { MathJax.typeset([contentDiv]); } 
                catch (e) { console.error("MathJAX error:", e); } 
            }
            contentDiv.innerHTML = formatMessage(content);
    
            messageDiv.append(avatar, contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    
        function createLoadingIndicator()
        {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant-message';
    
            const avatar = document.createElement('img');
            avatar.className = 'message-avatar';
            avatar.src = 'logo.jpg';
    
            const text = document.createElement('p');
            text.textContent = "Thanks for your patience";
            text.style.margin = '10px';
            text.style.alignSelf = 'center';
            text.style.color = '#ddd';

            const dots = document.createElement('div');
            dots.className = 'loading-dots';
            dots.innerHTML = '<span></span><span></span><span></span>';
    
            loadingDiv.append(avatar, text, dots);
            return loadingDiv;
        }
    
        let processing = false;
        let generationtime = 0.0;

        function countWords(text) // Naive, only counts spaces
        {
            let count = 1;
            for (let x = 0; x < text.length; ++x)
                { if (text[x] === ' ') { ++count; } }
            return count;
        }

        function wordsPerSecond(countwords)
        {
            const x = countwords / (generationtime / 1000);
            return x;
        }

        async function sendMessage()
        {
            if (processing) return;
            processing = true;
    
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
    
            input.value = '';
            message.push({ role: 'user', content: text });
            addMessage('user', text);
    
            const loading = createLoadingIndicator();
            chatContainer.appendChild(loading);
            chatContainer.scrollTop = chatContainer.scrollHeight;
    
            try
            {
                const response = await fetch(config.endpoint, 
                {
                    method: 'POST',
                    headers: 
                    {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${config.key}`
                    },
                    body: JSON.stringify
                    ({
                        model: config.modelname,
                        messages: message,
                        stream: true,
                        temperature: config.temp,
                        max_tokens: 2048
                    })
                });
    
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                const startTime = Date.now();
    
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message assistant-message';
                const avatar = document.createElement('img');
                avatar.className = 'message-avatar';
                avatar.src = 'logo.jpg';
                const contentDiv = document.createElement('div');
                messageDiv.append(avatar, contentDiv);
    
                loading.replaceWith(messageDiv);
    
                const startedat = Date.now();
                while (true)
                {
                    const { done, value } = await reader.read();
                    if (done) break;
    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(l => l.trim());
                    
                    for (const line of lines)
                    {
                        if (!line.startsWith('data: ')) continue;
                        try
                        {
                            const data = JSON.parse(line.slice(6));
                            if (data.choices[0].delta?.content)
                            {
                                buffer += data.choices[0].delta.content;
                                generationtime = Date.now() - startedat;
                                contentDiv.innerHTML = formatMessage(buffer) + `<em style="font-size: 0.7rem; color: #ccc;">Took ${ensureMaxDigits(generationtime / 1000, 3)}s | Generated ${ensureMaxDigits(wordsPerSecond(countWords(buffer)), 3)} Words per Second.</em>`;
                            }
                        }
                        catch (e) { console.error("Stream parse error:", e); }
                    }
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
    
                message.push({ role: 'assistant', content: buffer });
                if (authenticated)
                {
                    let data = pb.authStore.record.data;
                    data.chat[chatid] = message;
                    try { await pb.collection('accounts').update(pb.authStore.record.id, { data: data }); }
                    catch { alert("Failed to sync chat with XeTute Technologies Cloud. We're sorry."); }

                    if (message.length === 3)
                    {
                        // If new & first chat in list, add header
                        const historyHeader = document.createElement('h1');
                        historyHeader.className = 'sidebartxt';
                        historyHeader.textContent = 'Chat History';
                        sidebar.appendChild(historyHeader);

                        // If new chat, add to the sidebar (reloading is annoying for the user)
                        const chatItem = document.createElement('div');
                        chatItem.className = 'chathistorybtn';
                        
                        const link = document.createElement('a');
                        link.className = 'sidebarbtn';
                        link.href = `?chat=${chatid}`;
                        link.textContent = ensureMaxChars(message[1].content || 'New Chat', 15);
                        
                        const deleteBtn = document.createElement('button');
                        deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
                        deleteBtn.onclick = () => { deleteChat(chatid); };
                        
                        chatItem.append(link, deleteBtn);
                        sidebar.appendChild(chatItem);
                    }
                }
                else if (((message.length - 1) % 6) === 0) { alert("Your chat isn't being saved. To save future chats, log in."); }
            }
            catch (e)
            {
                console.error("API Error:", e);
                addMessage('assistant', `Error: ${e.message}`);
            }
            finally
            {
                processing = false;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }
    
        // Event listeners
        document.getElementById('sendButton').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keydown', (e) => 
        {
            if (e.key === 'Enter' && !e.shiftKey)
            {
                e.preventDefault();
                sendMessage();
            }
        });
    
        async function deleteChat(index)
        {
            if (confirm('Delete this chat?'))
            {
                let data = pb.authStore.record.data;
                data.chat.splice(index, 1);

                try
                {
                    await pb.collection('accounts').update(pb.authStore.record.id, { data: data });
                    alert("Deleted successfully.");
                    window.location.reload();
                }
                catch { alert("Failed to delte. We're sorry."); }
            }
        }

        // Initialization
        async function initialize()
        {
            await testEndpoints();
            await authAndDisplay();
            await getChatID();
            
            // Add model info to sidebar
            const builtwith = document.createElement('button');
                builtwith.className = 'sidebarbtn';
                builtwith.innerHTML = '<i class="fas fa-microchip"></i>';
                builtwith.textContent = `Built with ${ensureMaxChars(config.modelname, 12)}`;
                builtwith.setAttribute('onclick', `alert("The AI you're chatting with is powered by ${config.modelname}.");`);
            sidebar.insertBefore(builtwith, document.querySelector('.sidebartxt').nextElementSibling);
    
            // Load chat history
            if (authenticated && pb.authStore.record.data.chat?.length)
            {
                const historyHeader = document.createElement('h1');
                historyHeader.className = 'sidebartxt';
                historyHeader.textContent = 'Chat History';
                sidebar.appendChild(historyHeader);
    
                pb.authStore.record.data.chat.forEach((chat, index) => 
                {
                    const chatItem = document.createElement('div');
                    chatItem.className = 'chathistorybtn';
                    
                    const link = document.createElement('a');
                    link.className = 'sidebarbtn';
                    link.href = `?chat=${index}`;
                    link.textContent = ensureMaxChars(chat[1]?.content || 'New Chat', 15);
    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
                    deleteBtn.onclick = () => { deleteChat(index); };
    
                    chatItem.append(link, deleteBtn);
                    sidebar.appendChild(chatItem);
                });
            }
        }
    
        initialize();
    </script>
  </body>
</html>
