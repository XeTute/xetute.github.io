        <script defer>
            function textAnim(elemid, newText, delay = 2000, speed = 50)
            {
                return new Promise((resolve) =>
                {
                    const semislogan = document.getElementById(elemid);
                    if (!semislogan) return resolve();
                
                    setTimeout(() =>
                    {
                        const currentText = semislogan.textContent;
                        const totalFrames = Math.max(currentText.length, newText.length);
                        let frame = 0;
                    
                        function updateText()
                        {
                            if (frame >= totalFrames) return resolve();
                            semislogan.innerHTML = newText.substring(0, frame + 1) + currentText.substring(frame + 1);
                            ++frame;
                            setTimeout(updateText, speed);
                        }
                    
                        updateText();
                    }, delay);
                });
            }

            async function changeText(texts, elemid, delay = 2000, speed = 50)
            {
                while (true)
                {
                    for (const text of texts)
                        await textAnim(elemid, text, delay, speed);
                }
            }

            const userLang = navigator.language.slice(0, 2); // en, zh, ur

            document.documentElement.lang = lang;

            {
                try { document.getElementById(key).innerHTML = trns[key]; }
                catch {}
            }

            changeText([trns.herosub0, trns.herosub1], 'herosub');
            changeText([trns.paisub0, trns.paisub1], 'paisub');
            changeText([trns.authsub0, trns.authsub1], 'authsub');
            changeText([trns.socialssub0, trns.socialssub1], 'socialssub');
            changeText([trns.intellectsub0, trns.intellectsub1], 'intellectsub');
            changeText([translations['en'].longlive, translations['ur'].longlive, translations['zh'].longlive], 'longlivetxt', 1500, 35);
