<!DOCTYPE html>
<html lang="en">
    <head>
        <title>XeTute: Coming Soon</title>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <meta charset="UTF-8"/>

        <link rel="icon" type="image/x-icon" href="./favicon.ico"/>
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"/>

        <style>
            html, body
            {
                width: 100%;
                height: 100%;

                background: #FFF;
                color: #FFF;

                margin: 0;
                padding: 0;
                overflow: hidden;

                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;

                font-family: "Roboto Condensed", sans-serif;
                font-weight: 200;
            }

            div
            {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;

                margin: 5px;
                padding: 0;
            }

            h1, p, a
            {
                color: #FFF;
                background: #000;

                padding: 5px;
                margin: 5px;

                font-family: "Roboto Condensed", sans-serif;
                font-weight: 200;

                width: fit-content;
                height: fit-content;
                transition: 0.2s ease-in-out;
            }

            a:hover
            {
                color: #000;
                background: #E8E8E8;
                padding-bottom: 10px;
                border: 1px solid #000;
            }

            img
            {
                padding: 0;
                margin: 5px;
                border: 2px solid #000;
                filter: grayscale(75%);
                transition: 0.2s ease-in-out;
            }
            img:hover { filter: grayscale(0%); }
        </style>
    </head>
    <body>
        <h1>Welcome.</h1>
        <p id="countdown" style="margin-bottom: 0px;">Please have patience.</p>
        <p style="margin-top: 0px;">This page will be functional NOV 14, 2024.</p>

        <div>
            <a href="https://huggingface.co/XeTute">HuggingFace</a>
            <a href="https://github.com/XeTute">GitHub</a>
            <a href="https://x.com/Hamzah4sadullah">X (formerly Twitter)</a>
        </div>

        <p>[View Counter]</p>
        <img src="https://count.getloli.com/@XeTute-Webpage?theme=booru-lewd" />
    </body>
    <script defer>
        const countdown = document.getElementById("countdown");
        const ETA = new Date("Nov 14, 2025 00:00:00").getTime();

        const countdownfunction = setInterval(function()
        {
            let distance = ETA - (new Date().getTime());
            let days = Math.floor(distance / (1000 * 60 * 60 * 24));
            let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML =
            days + "d " + hours + "h " +
            minutes + "m " + seconds + "s remaining.";

            if (distance < 0)
            {
                clearInterval(countdownfunction);
                document.getElementById("demo").innerHTML = "Will be updated shortly...";
            }
        }, 1000);
    </script>
</html>
