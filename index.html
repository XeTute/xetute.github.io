<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Pinstripe:ital@0;1&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="basic.css">
    <style>
        html, body
        {
            overflow: hidden;
            background: #1a1a1a;
        }

        #chat-interface
        {
            width: 100%;
            height: 100vh;
            display: flex;
            position: relative;
        }

        #sidebar
        {
            background: #202020;
            width: 260px;
            height: 100vh;

            display: flex;
            flex-direction: column;

            gap: 20px;

            position: absolute;
            left: -260px;
            transition: left 0.3s ease-in-out;
            z-index: 1000;
        }

        #sidebar.active { left: 0; }

        #main-content
        {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }

        @media (min-width: 769px)
        {
            #sidebar
            {
                position: relative;
                left: 0;
            }
            
            #menu-toggle { display: none; }
        }

        #menu-toggle
        {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 10px;
        }

        #chat-container
        {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message
        {
            max-width: 800px;
            width: calc(100% - 40px);
            margin: 0 auto;
            padding: 10px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .user-message
        {
            background: #2a2a2a;
            text-align: right;
        }
        .assistant-message { background: #333; text-align: left; }

        #input-container
        {
            padding: 20px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        #messageInput
        {
            width: 100%;
            min-height: 50px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        #links-bar
        {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 10px;
            flex-wrap: wrap;
        }

        .social-link
        {
            color: #888;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            text-decoration: none;
        }
        .social-link:hover { color: #fff; }

        .loading
        {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: calc(100% - 40px);
        }

        .loading-dots
        {
            display: flex;
            gap: 4px;
        }

        .loading-dots span
        {
            width: 8px;
            height: 8px;
            background: #888;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { -delay: 0.4s; }

        @keyframes pulse
        {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.7); opacity: 0.5; }
        }

        #overlay
        {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        @media (max-width: 768px)
        {
            #main-content { padding-top: 60px; }
            .message { width: calc(100% - 20px); }
            #overlay.active { display: block; }
        }
    </style>
</head>
<body>
    <button id="menu-toggle">
        <i class="fa fa-bars fa-2x"></i>
    </button>

    <div id="overlay"></div>

    <div id="chat-interface">
        <div id="sidebar">
            <div style="padding: 0; margin: 0; width: 100%; height: 2rem;"></div>
            <button style="margin-left: 20px; margin-top: 20px;" onclick="startNewChat()">New Chat</button>
        </div>
        
        <div id="main-content">
            <div id="chat-container"></div>
            
            <div id="input-container">
                <textarea id="messageInput" placeholder="Send a message..." rows="1"></textarea>
                <div id="links-bar">
                    <a href="https://github.com/XeTute" target="_blank" class="social-link">
                        <i class="fa fa-github"></i> GitHub
                    </a>
                    <a href="https://huggingface.co/XeTute" target="_blank" class="social-link">
                        <i class="fa fa-rocket"></i> HuggingFace
                    </a>
                    <a href="https://ko-fi.com/XeTute" target="_blank" class="social-link">
                        <i class="fa fa-heart"></i> Support Us
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('messageInput');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        
        const messages =
        [{
            role: 'system',
            content: "You're a Chatbot with no name by the Pakistani startup XeTute Technologies at https://xetute.com/. Always respond as engaging as possible while remaining helpful. Before answering STEM questions, go through a reasoning process, which you put in *reasoning, can be quite long*. Markdown is supported."
        }];

        let processing = false;

        function toggleSidebar()
        {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        menuToggle.addEventListener('click', (e) =>
        {
            e.stopPropagation();
            toggleSidebar();
        });

        overlay.addEventListener('click', toggleSidebar);

        function parseMarkdown(text)
        {
            text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            text = text.replace(/^\* (.+)$/gm, '<li>$1</li>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function createLoadingIndicator()
        {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = `
                Generating response
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            return loadingDiv;
        }

        function addMessage(content, sender)
        {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', `${sender}-message`);
            messageDiv.innerHTML = parseMarkdown(content);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage()
        {
            if (processing) return;
            
            const message = messageInput.value.trim();
            if (!message) return;

            processing = true;
            messageInput.value = '';
            addMessage(message, 'user');
            
            messages.push({ role: 'user', content: message });

            const loadingDiv = createLoadingIndicator();
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try
            {
                const response = await fetch
                (
                    'https://ai.xetute.com/v1/chat/completions',
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: messages,
                            stream: false
                        })
                    }
                );

                const data = await response.json();
                const reply = data.choices[0].message.content;

                messages.push({ role: 'assistant', content: reply });
                
                loadingDiv.remove();
                addMessage(reply, 'assistant');
            }
            catch (error)
            {
                console.error('Error:', error);
                loadingDiv.remove();
                addMessage("Sorry, I'm having trouble connecting to the server.", 'assistant');
            }

            processing = false;
        }

        function startNewChat()
        {
            chatContainer.innerHTML = '';
            messages.length = 0;
            messages.push
            (
                {
                role: 'system',
                content: "You're a Chatbot with no name by the Pakistani startup XeTute Technologies at https://xetute.com/. Always respond as short as possible while remaining helpful."
                }
            );
            if (window.innerWidth <= 768) { toggleSidebar(); }
        }

        messageInput.addEventListener('keypress', (e) =>
        {
            if (e.key === 'Enter' && !e.shiftKey)
            {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', () =>
        {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        });
    </script>
</body>
</html>
