<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <meta name="keywords" content="XeTute, XeTute Technologies, Technologies, PhantasiaAI, AI, Hello Friend"/>
        <meta name="description" content="Follow your Curiosity — Lead Humanity Forward"/>

        <title>Hello, Friend \\ XeTute Technologies</title>

        <link rel="stylesheet" href="basic.css"/>
        <link rel="icon" href="logo.jpg"/>
        <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <script src="https://kit.fontawesome.com/cc84e7136d.js" crossorigin="anonymous"></script>
        <style>
            html[lang="ur"]
            {
                direction: rtl;
                text-align: right;
            }

            .section
            {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                width: 100%;
                position: relative;
                padding: 2rem 0;
            }

            .allcenter
            {
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .fullsize
            {
                width: 100%;
                height: 100%;
            }

            .hero-title
            {
                font-size: 4.5rem;
                margin-bottom: 1rem;
            }

            .hero-subtitle
            {
                font-size: 1.2rem;
                line-height: 1.6;
                margin-bottom: 2rem;
                max-width: 85%;
            }

            .feature-container
            {
                background: rgba(255, 255, 255, 0.03);
                padding: 3rem;
                border-radius: 25px;
                max-width: 90%;
            }

            .scroll-indicator
            {
                width: 50px;
                height: 50px;
                display: flex;
                justify-content: center;
                align-items: center;
                border-radius: 25px;
                transition: .4s;
                margin-top: 2rem;
            }
            .scroll-indicator:hover
            { 
                transform: scale(1.1);
                cursor: pointer;
            }
            .section-title { margin-bottom: 3rem; }

            .paiintro
            {
                display: flex;
                flex-direction: row;
                width: 100%;
            }

            @media (max-width: 768px)
            {
                .hero-title { font-size: 3.5rem; }
                .paiintro { flex-direction: column; }
            }
        </style>
    </head>
    <body id="main" style="display: none;">
        <!-- Hero Section -->
        <div class="section">
            <h1 class="hero-title" id="herotitle"></h1>
            <p class="hero-subtitle" id="herosub">—</p>
            <a class="sb scroll-indicator" onclick="document.getElementById('pai').scrollIntoView({ behavior: 'smooth' })">
                <i class="fa fa-arrow-down" aria-hidden="true"></i>
            </a>
        </div>

        <!-- Apps -->
        <div class="section" id="pai">
            <div class="paiintro fullsize allcenter" style="margin-bottom: 0; padding-bottom: 0;">
                <div class="allcenter fullsize" style="margin: 20px; padding: 15px;">
                    <h1 class="hero-title" style="scale: 0.75;">Introducing PhantasiaAI</h1>
                    <p class="hero-subtitle" id="paisub">—</p>
                </div>
                <div class="allcenter fullsize" style="margin: 20px; padding: 15px;">
                    <video src="pai-deco.mp4" class="box-shadow" alt="decorative video" style="border-radius: 25px; max-width: 80%; margin: 20px;" muted loop autoplay></video>
                    <a href="PhantasiaAI/" class="sb"><span id="paiinvitation">Envision Now</span></a>
                </div>
            </div>
            <a class="sb scroll-indicator" onclick="document.getElementById('future').scrollIntoView({ behavior: 'smooth' })">
                <i class="fa fa-arrow-down" aria-hidden="true"></i>
            </a>
        </div>

        <div class="section fullsize allcenter">
            <h1 class="hero-title" style="scale: 0.75;" id="future"></h1>
        </div>

        <script defer>
            function textAnim(elemid, newText, delay = 2000, speed = 50)
            {
                return new Promise((resolve) =>
                {
                    const semislogan = document.getElementById(elemid);
                    if (!semislogan) return resolve();
                
                    setTimeout(() =>
                    {
                        const currentText = semislogan.textContent;
                        const totalFrames = Math.max(currentText.length, newText.length);
                        let frame = 0;
                    
                        function updateText()
                        {
                            if (frame >= totalFrames) return resolve();
                            semislogan.innerHTML = newText.substring(0, frame + 1) + currentText.substring(frame + 1);
                            ++frame;
                            setTimeout(updateText, speed);
                        }
                    
                        updateText();
                    }, delay);
                });
            }

            async function changeText(texts, elemid)
            {
                while (true)
                {
                    for (const text of texts)
                        await textAnim(elemid, text);
                }
            }

            // Browser translations for en, zh and ur
            const translations =
            {
                en:
                {
                    herotitle: "HELLO, FRIEND.",
                    herosub0: "Follow your Curiosity<br>Lead Humanity Forward",
                    herosub1: "Reach the end of the Story in your own way.",
                    
                    paisub0: "Immerse in your very own digital realm.",
                    paisub1: "Socialize with artificial beings, safely and privately.",
                    paiinvitation: "Envision Now",

                    future: "More coming soon."
                },
                zh:
                {
                    herotitle: "你好，朋友。",
                    herosub0: "追随你的好奇心<br>引领人类向前",
                    herosub1: "以你自己的方式到达故事的尽头。",
                    
                    paisub0: "沉浸在你自己的数字领域中。",
                    paisub1: "与人工智能安全、私密地社交。",
                    paiinvitation: "现在想象",

                    future: "更多内容即将推出。"
                },
                ur:
                {
                    herotitle: "ہیلو، دوست۔",
                    herosub0: "اپنی تجسس کی پیروی کریں<br>انسانیت کو آگے بڑھائیں",
                    herosub1: "کہانی کے آخر تک اپنے طریقے سے پہنچیں۔",
                    
                    paisub0: "اپنی ذاتی ڈیجیٹل دنیا میں غوطہ زن ہوں۔",
                    paisub1: "مصنوعی مخلوق کے ساتھ محفوظ اور نجی طور پر ملیں۔",
                    paiinvitation: "اب تصور کریں",

                    future: "زیادہ جلد آ رہا ہے۔"
                }
            };

            const userLang = navigator.language.slice(0, 2); // en, zh, ur
            const lang = translations[userLang] ? userLang : 'en';
            const trns = translations[lang];
            document.documentElement.lang = lang;

            for (let key in trns)
            {
                try { document.getElementById(key).innerHTML = trns[key]; }
                catch {}
            }

            changeText([trns.herosub0, trns.herosub1], 'herosub');
            changeText([trns.paisub0, trns.paisub1], 'paisub');

            document.getElementById('main').style.display = 'flex';
        </script>
    </body>
</html>
