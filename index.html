<!DOCTYPE html>
<html lang="en">
    <head>
        <title>XeTute: Coming Soon</title>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <meta charset="UTF-8"/>

        <link rel="icon" type="image/x-icon" href="./favicon.ico"/>
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"/>

        <style>
            html, body
            {
                width: 100%;
                height: 100%;

                background: #FFF;
                color: #FFF;

                margin: 0;
                padding: 0;
                overflow: hidden;

                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;

                font-family: "Roboto Condensed", sans-serif;
                font-weight: 200;
            }

            div
            {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;

                margin: 5px;
                padding: 0;
            }

            .linkcontainer
            {
                flex-direction: column;
                border: 2px solid #000;
                transition: 0.2s ease-in-out;
            }
            .linkcontainer:hover { padding: 5px; border: 4px solid #000; }

            h1, p, a, button
            {
                color: #FFF;
                background: #000;

                padding: 5px;
                margin: 5px;

                font-family: "Roboto Condensed", sans-serif;
                font-weight: 200;

                width: fit-content;
                height: fit-content;
                transition: 0.2s ease-in-out;
            }

            a:hover, button:hover
            {
                color: #000;
                background: #E8E8E8;
                padding-bottom: 10px;
                border: 1px solid #000;
            }

            img
            {
                padding: 0;
                margin: 5px;
                filter: grayscale(75%);
                transition: 0.2s ease-in-out;
            }
            img:hover { filter: grayscale(0%); }

            .nobottom { margin-bottom: 0; }
            .notop { margin-top: 0; }
        </style>
    </head>
    <body>
        <div style="display: flex; flex-direction: column; width: 100%; height: 100%;" id="mainpage">
            <h1>Welcome.</h1>
            <p id="countdown" class="nobottom">Please have patience.</p>
            <p class="notop">This page will be functional NOV 14, 2024.</p>

            <div class="linkcontainer">
                <p>[Social Accounts]</p>
                <div class="notop">
                    <a href="https://huggingface.co/XeTute">HuggingFace</a>
                    <a href="https://github.com/XeTute">GitHub</a>
                    <a href="https://x.com/Hamzah4sadullah">X (formerly Twitter)</a>
                </div>
            </div>

            <div class="linkcontainer">
                <p>[About]</p>
                <div class="notop">
                    <button onclick="showHamzah();">About Hamzah</button>
                    <button onclick="alert('That information will soon be online.');">About XeTute [Technologies]</a>
                </div>
            </div>

            <div class="linkcontainer">
                <p>[View Counter]</p>
                <img src="https://count.getloli.com/@XeTute-Webpage?theme=booru-lewd"/>
            </div>
        </div>

        <div style="display: none; flex-direction: column; width: 100%; height: 100%;" id="hamzahlink">
            <img src="https://gravatar.com/hamzahasadullah.qr" style="max-width: 512px; max-height: 512px;"/>
            <a href="https://gravatar.com/hamzahasadullah">Can't scan QR — direct link</a>
            <button onclick="showHamzah()">Close</button>
        </div>
    </body>
    <script defer>
        const countdown = document.getElementById("countdown");
        const ETA = new Date("Nov 14, 2025 00:00:00").getTime();

        const countdownfunction = setInterval(function()
        {
            let distance = ETA - (new Date().getTime());
            let days = Math.floor(distance / (1000 * 60 * 60 * 24));
            let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML =
            days + "d " + hours + "h " +
            minutes + "m " + seconds + "s remaining.";

            if (distance < 0)
            {
                clearInterval(countdownfunction);
                document.getElementById("demo").innerHTML = "Will be updated shortly...";
            }
        }, 1000);

        function showHamzah()
        {
            const mainpage = document.getElementById("mainpage");
            const hamzahlink = document.getElementById("hamzahlink");

            if (mainpage.style.display === "none")
            {
                mainpage.style.display = "flex";
                hamzahlink.style.display = "none";
            }
            else
            {
                mainpage.style.display = "none";
                hamzahlink.style.display = "flex";
            }
        }
    </script>
</html>
