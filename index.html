<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="The official webpage of XeTute Technologies">
        <meta name="keywords" content="XeTute Technologies, XeTute">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        
        <title>Hello, Friend \ XeTute Technologies</title>
        <link rel="icon" href="logo.jpg"/>
        <link rel="stylesheet" href="basic.css"/>

        <style>
            
            .hero-section
            {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: calc(100vh - 80px);
                text-align: center;
                padding: 0 20px;
                gap: 10px;
            }

            .hero-title
            {
                font-size: 3.75rem;
                margin: 0;
                line-height: 1.2;
                animation: fadeIn 1.5s ease-out;
            }

            .divider
            {
                width: 10rem;
                height: 2px;
                background: #fff;
                margin: 15px 0;
                animation: stretch 1.5s ease-out;
            }

            .hero-subtitle
            {
                font-size: 1.25rem;
                margin: 0;
                font-style: italic;
                animation: fadeIn 1.5s ease-out 0.5s backwards;
            }

            @keyframes fadeIn
            {
                from
                {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to
                {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes stretch
            {
                from { width: 0; }
                to { width: 10rem; }
            }
        </style>
    </head>
    <body>
        <div class="navbar">
            <div class="logo-container" onclick="window.location.href=''">
                <img src="logo.jpg" alt="XeTute Technologies Logo"/>
                <p>XeTute Technologies</p>
            </div>

            <div class="nav-links">
                <a href="https://github.com/XeTute">GitHub</a>
                <a href="https://huggingface.co/XeTute">HuggingFace</a>
                <a href="https://ko-fi.com/XeTute">Donate</a>
            </div>
        </div>

        <div class="hero-section">
            <h1 class="hero-title">Hello, Friend.</h1>
            <div class="divider"></div>
            <p class="hero-subtitle">
                <em>Let's dream together</em>
                <p>—because dreams matter.</p>
            </p>
            
            <div style="margin: 35px;"></div>

            <a href="./flare-demo/index.html">Flare—AI Chat</a>
            <a href="https://github.com/XeTute/ANNA/wiki">Build your AI—ANNA</a>
            <a href="https://www.youtube.com/@XeTuteTechnologies">Other—YT</a>
        </div>
    </body>
</html>
