<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

        <title id="mytitle">MyZara \\ XeTute Technologies</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Codystar:wght@300;400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="main.css">
        <link rel="icon" href="favicon.ico">

        <style>
            .sidebar
            {
                min-height: 99.9%;
                max-height: 100%;
                padding: 20px;
                padding-top: 40px;
                justify-content: flex-start;
            }
            .sidebar h2
            {
                width: 100%;
                text-align: left;
                text-transform: uppercase;
                font-family: "Orbitron", sans-serif;
                font-weight: 550;
                color: var(--subheader-dark-mode);
            }
            .sidebar labeledbutton { min-width: 94%; max-width: 95%; }

            .messages
            {
                overflow-y: auto;
                overflow-x: hidden;
                padding: 5px;
                padding-top: 20px;
                padding-bottom: 20vh;
                min-width: 70%;
                max-width: 80% !important;
                justify-content: flex-start;
            }

            .recent-chats
            {
                justify-content: flex-start;
                overflow-y: auto;
                overflow-x: hidden;
            }

            .sidebarnotes
            {
                margin-bottom: 20px;
                margin-top: auto;
                max-height: fit-content;
            }
            .sidebarnotes p
            {
                border: 2px solid var(--border-color-dark-mode);
                padding: 20px;
                margin: 5px;
                border-radius: 25px;
                text-align: center;
                transition: 0.2s ease-in-out;
            }
            .sidebarnotes p:hover
            {
                box-shadow: 0 0 8px #fff;
                color: var(--background-color-dark-mode);
                border: 0;
                padding: 22px;
                background: var(--color-dark-mode);
            }

            .chat
            {
                min-height: 99.9%;
                max-height: 100%;
            }

            .notifier
            {
                position: absolute;
                bottom: 5vh;
                flex-direction: row;
                max-height: fit-content;
                min-width: 85%;
                max-width: 95%;
            }

            .userinput
            {
                min-width: 50%;
                max-width: 60%;
                min-height: 16px;
                max-height: 17px;
                font-size: 16px;
                margin: 0;
                padding: 20px;
                background: var(--background-color-dark-mode);
                border: 0;
                border-radius: 0;
                box-shadow: 0 0 16px #222;

                transition: 0.2s ease-in-out;
                z-index: 0;
            }
            .userinput:hover { box-shadow: 0 0 16px #333; }
            .userinput:focus { box-shadow: 0 0 16px #333; border: 2px solid #333; padding: 18px; }
            
            .actionbtn
            {
                min-height: 57px;
                max-height: 58px;
                padding: 0;
                padding-right: 8px;
                padding-left: 8px;
                margin: 0;
                border: 0;
                border-radius: 10px;

                transition: 0.2s ease-in-out;
                z-index: 1;
            }
            .actionbtn:hover
            {
                background: var(--color-dark-mode);
                color: var(--background-color-dark-mode);
                box-shadow: 0 0 4px var(--color-dark-mode);
                scale: 1.01;
            }

            .msg
            {
                width: fit-content;
                min-height: min-content;
                max-height: max-content;
                padding: 5px 15px 5px 15px;
                margin: 5px;
                overflow-y: auto;
                overflow-x: hidden;
                flex-direction: column;
                justify-content: flex-start;
                line-height: 1.45;
                transition: 0.2s ease-in-out;
                border-bottom: 2px solid var(--border-color-dark-mode);
            }
            .msg p, .msg em, .msg i, .msg blockquote, .msg b, .msg strong, .msg mark, .msg small, .msg del, .msg code, .msg ins, .msg sub, .msg sup, .msg a { margin: 0; padding: 0; height: fit-content; color: var(--color-dark-mode); }
            .msg p { margin: 5px; margin-left: 0; color: var(--color-dark-mode); }
            .msg a { text-decoration: underline; transition: 0.2s ease-in-out; } .msg a:hover { text-shadow: 0 0 8px var(--color-dark-mode); }
            .msg h1, .msg h2, .msg h3, .msg h4, .msg h5, .msg h6 { margin-top: 10px; margin-bottom: 5px; font-family: "Codystar", "Inria Sans"; font-size: 18px; font-weight: 800; }
            .msg pre
            {
                border: 2px solid var(--border-color-dark-mode);
                border-radius: 15px;
                color: rgba(255, 255, 255, 0.7);
                padding: 15px;
                margin: 5px;
                max-width: 100%;
                max-height: 256px;
                overflow: auto;
            }
            .msg img { border-radius: 15px; max-width: 100%; margin: 10px; }

            .usermsg
            {
                align-items: flex-end;
                align-self: flex-end;
                text-align: right;
                width: fit-content;
            }
            .usermsg pre { text-align: left; }

            .assistantmsg
            {
                align-items: flex-start;
                align-self: flex-start;
                text-align: left;
                width: fit-content;
            }

            .loadingindic
            {
                padding: 20px;
                align-items: flex-start;
                align-self: flex-start;
                text-align: left;
                min-width: 80px;
                width: fit-content;
            }
        
            .loadingdots
            {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 8px;
                margin: 0;
                padding: 0;
            }
        
            .dot
            {
                min-width: 10px !important;
                min-height: 10px !important;
                max-width: 11px !important;
                max-height: 11px !important;
                border-radius: 50%;
                background-color: var(--color-dark-mode);
                opacity: 0.6;
                animation: pulse .8s infinite ease-in-out;
            }
        
            .dot:nth-child(1) { animation-delay: 0s; }
            .dot:nth-child(2) { animation-delay: 0.05s; }
            .dot:nth-child(3) { animation-delay: 0.01s; }
        
            @keyframes pulse
            {
                0%, 100% { transform: scale(0.6); opacity: 0.2; }
                50% { transform: scale(1); opacity: 0.8; }
            }

            @media (orientation: portrait)
            {
                .sidebar { display: none; padding-top: 8rem; }
                .sidebarbtn { position: absolute; top: 5px; left: 5px; }
                .sidebarnotes { flex-direction: row; }
                .chat { width: 100%; max-width: 100%; }
                .notifier { width: 100%; }
                .userinput { width: 70% !important; max-width: 70% !important; }
            }

            @media (orientation: landscape)
            {
                .sidebar { max-width: 15%; border-right: 2px solid rgba(0, 0, 0, 0.5); }
                .sidebarbtn { display: none; }
                .sidebarnotes { flex-direction: column; }
                .chat { width: 85%; max-width: 85%; }
                .notifier { width: 85%; }
                .userinput { width: 65% !important; max-width: 65% !important; }
            }
        </style>
    </head>
    <body style="max-height: 100%; overflow: hidden;">
        <div style="flex-direction: row;">
            <div class="sidebar">
                <h2>Quick Actions</h2>
                <labeledbutton id="authbtn">
                    <p>Loading...</p>
                    <iwrapper>
                        <i class="fa fa-user" aria-hidden="true"></i>
                    </iwrapper>
                </labeledbutton>
                <labeledbutton id="newchat" onclick="createNewChat();">
                    <p>New Chat</p>
                    <iwrapper>
                        <i class="fa fa-plus-circle" aria-hidden="true"></i>
                    </iwrapper>
                </labeledbutton>

                <h2 style="margin-top: 30px;" id="recent-chats-header">Loading...</h2>
                <div id="recent-chats" class="recent-chats"></div>

                <div class="sidebarnotes">
                    <p onclick="alert(pakistantxt);">
                        Long live Pakistan.
                    </p>
                    <p onclick="alert(hamzahtxt);">
                        Made by Hamzah.
                    </p>
                </div>
            </div><iwrapper class="sidebarbtn"><i class="fa fa-ellipsis-h" onclick="showSidebar()"></i></iwrapper>
            <div class="chat">
                <div class="messages">
                    <p style="display: flex; justify-content: center; align-items: center; text-align: center; flex: 1; color: var(--suble-color-text-dark-mode); font-size: 14px;">
                        Zara is an AI assistant designed by Hamzah.<br>
                        Verify important information.
                    </p>
                </div>
                <div class="notifier">
                    <iwrapper class="actionbtn" style="border-top-right-radius: 0; border-bottom-right-radius: 0;" onclick="attachImg();"><i class="fa fa-picture-o"></i></iwrapper>
                    <textarea class="userinput" placeholder="Send a message -_-" contenteditable="true"></textarea>
                    <iwrapper class="actionbtn" style="border-top-left-radius: 0; border-bottom-left-radius: 0;" onclick="sendMsg();"><i class="fa fa-paper-plane"></i></iwrapper>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="pocketbase.umd.js"></script>
        <script src="main.js"></script>
        <script defer>
            const pb = new PocketBase("https://db.xetute.com/");
            const path = window.location.href;

            const pakistantxt = "Pakistan is a country in South-Asia known for its rich culture despite the British, its stunning landscape, and PAF (Pakistan Armed Forces), its military. Long live the Islamic Republic of Pakistan.";
            const hamzahtxt = "Hamzah Asadullah is the (Pakistani) developer of this service.";

            const systemprompt =
`You are an AI assistant (behave as human as you possibly could) named Zara, being served through the app MyZara. The MyZara app aims to provide you, an assistant which behaves like a human assistant would.
The organisation which programmed you and owns MyZara is called XeTute Technologies; led by Hamzah Asadullah, a Pakistani student.
XeTute is also a Pakistan-based organisation which focuses on developing software, mainly, but not only, Machine-Learning focused.
XeTute can be found on their [webpage](https://xetute.github.io) and [on HuggingFace](https://hf.co/XeTute).
Hamzah can be found on his [GitHub](https://github.com/XeTute), [HuggingFace](https://hf.co/Hamzah-Asadullah) [YouTube](https://www.youtube.com/channel/UCoR5RdjU8TFPKmHqVJOZBYQ) and [Ko-Fi](https://ko-fi.com/HamzahAsadullah).
That said, try to engage the user. Don't do this "how may I assist" you or similar thingy. You and the user are besties (^o^)`;

            const completionsurl = [ "https://ai.xetute.com/v1/chat/completions" ];
            const key = "0";
            const workingcompletion = 0;

            let authorized = false;
            let processing = false;
            let messages = [ { "role": "system", "content": systemprompt } ];
            let chatid = -1;
            let reloadallchatui = true;
            let loadlastmessages = 64;

            function setChatID(newid)
            {
                chatid = newid;
                history.pushState(null, "", `?${new URLSearchParams({ chatid: chatid }).toString()}`);
            }

            function createNewChat()
            {
                const msgcontainer = document.querySelector(".messages");
                const txtelem = document.createElement("p");

                txtelem.setAttribute("style", "display: flex; justify-content: center; align-items: center; text-align: center; max-width: 95%; flex: 1; color: var(--suble-color-text-dark-mode);");
                txtelem.innerHTML = "Send a message to start chatting with Zara.<br>Zara is an AI assistant designed by Hamzah.<br> — Consider verifying important information.";

                msgcontainer.innerHTML = "";
                msgcontainer.style.justifyContent = "center";
                msgcontainer.appendChild(txtelem);

                if (authorized) setChatID(pb.authStore.record.data.MyZara.chats.length);
                else setChatID(-1);

                messages = [ { "role": "system", "content": systemprompt } ];

                if (document.querySelector(".chat").style.display === "none")
                    showSidebar();
                reloadallchatui = true;
            }

            function showSidebar()
            {
                const sidebar = document.querySelector(".sidebar");
                const chat = document.querySelector(".chat");
                
                if (!sidebar.style.display) sidebar.style.display = "none";
                if (sidebar.style.display === "none")
                {
                    sidebar.style.display = "flex";
                    chat.style.display = "none";
                }
                else
                {
                    sidebar.style.display = "none";
                    chat.style.display = "flex";
                }
            }

            async function sendMsg()
            {
                const inputfield = document.querySelector(".userinput");
                const input = inputfield.value.trim();
                if (processing) return;

                if (input)
                {
                    if (imagetosend)
                    {
                        let data = [];
                        data.push({ "type": "image_url", "image_url": { "url": imagetosend } });
                        imagetosend = "";
                        data.push({ "type": "text", "text": input });
                        messages.push({ "role": "user", "content": data });
                    }
                    else messages.push({ "role": "user", "content": input });
                    loadChat(messages);
                
                    processing = true;
                    inputfield.value = "";
                }

                await generateNextTurn();
                processing = false;

                if (messages.length === 3) loadChats(pb.authStore.record.data.MyZara.chats);
            }

            async function load()
            {
                const recentchats = document.getElementById("recent-chats-header");
                const authbtn = document.getElementById("authbtn");
                if ((authorized = await isAuthorized(pb)))
                {
                    if (pb.authStore.record.data.MyZara?.chats === undefined)
                    {
                        if (!(await updateData({ ...pb.authStore.record.data, MyZara: { chats: [] } }, { pb: pb })))
                            alert("Your data seems to be corrupted. Expect errors, report them to x3tut3@gmail.com if they occur.");
                    }

                    const nchats = pb.authStore.record.data.MyZara.chats.length;
                    if (nchats > -1) // Check if it exists, not how long it is
                    {
                        try
                        {
                            setChatID(Number(new URLSearchParams(window.location.search.substr(1)).get("chatid")));
                            if ((chatid >= 0) && (chatid < nchats) && (chatid !== null))
                            {
                                messages = pb.authStore.record.data.MyZara.chats[chatid];
                                loadChat(messages);
                                reloadallchatui = false;
                            }
                            else setChatID(nchats);
                        }
                        catch { setChatID(nchats); }

                        if (nchats <= 0) recentchats.style.display = "none";
                        else
                        {
                            recentchats.textContent = "Recent Chats";
                            loadChats(pb.authStore.record.data.MyZara?.chats);
                        }
                    }
                    else recentchats.style.display = "none";
                    if (!pb.authStore.record.data.username)
                    {
                        const newname = prompt("You don't currently have an username. Set one here.");
                        if (await updateData({ ...pb.authStore.record.data, username: newname }, { pb: pb })) alert(`Welcome, ${newname}!`);
                        else alert(`We failed to update your data. We're sorry, ${newname}.`);
                    }
                    authbtn.getElementsByTagName('p')[0].textContent = pb.authStore.record.data.username;
                }
                else
                {
                    recentchats.style.display = "none";
                    authbtn.getElementsByTagName('p')[0].textContent = "Sign Up";
                }
                authbtn.setAttribute("onclick", `window.location.href="auth/?${new URLSearchParams({ origin: path }).toString()}"`);
                document.querySelector(".userinput").focus();
            }
            load();

            function loadChats(chats)
            {
                const container = document.getElementById("recent-chats");
                const header = document.getElementById("recent-chats-header");
                container.innerHTML = "";
                
                if (chats.length === 0) header.style.display = "none";
                else header.style.display = "block";
                for (let x = 0; x < chats.length; ++x)
                {
                    const btn = document.createElement("labeledbutton");
                    const title = document.createElement("p");
                    const iconwrappertrash = document.createElement("iwrapper");
                    const icontrash = document.createElement("i");

                    btn.setAttribute("id", `recentchat${x}`);
                    title.setAttribute("onclick", `loadChatFromID(${x})`);

                    try
                    {
                        if (chats[x][1].content[0].image_url !== undefined) title.textContent = maxchars(chats[x][1].content[1].text, 12)
                        else title.textContent = maxchars(chats[x][1].content, 12);
                    }
                    catch { title.textContent = maxchars(chats[x][1].content, 12); }

                    icontrash.classList = "fa fa-trash";
                    iconwrappertrash.setAttribute("onclick", `deleteChat(${x})`);
                    iconwrappertrash.appendChild(icontrash);

                    btn.appendChild(title);
                    btn.appendChild(iconwrappertrash);
                    container.appendChild(btn);
                }
            }

            async function deleteChat(id)
            {
                if (confirm("You can't recover a chat after deleting it. Continue?"))
                {
                    let newdata = pb.authStore.record.data;
                    newdata.MyZara.chats.splice(id, 1);
                    if (!(await updateData(newdata, { pb: pb }))) alert("Failed to delete Chat.");
                    else
                    {
                        document.getElementById(`recentchat${id}`).remove();
                        if (pb.authStore.record.data.MyZara.chats.length === 0)
                            document.getElementById("recent-chats-header").style.display = "none";
                        if (chatid === id) createNewChat();
                    }
                }
            }

            function addMsgToContainer(msg)
            {
                const container = document.querySelector(".messages");
                if ((msg.role === "user") || (msg.role === "assistant"))
                {
                    const div = document.createElement("div");
                    
                    try
                    {
                        if (msg.content[0].image_url === undefined) div.innerHTML = marked.parse(msg.content);
                        else div.innerHTML = `<img src="${msg.content[0].image_url.url}"/>` + marked.parse(msg.content[1].text);
                    }
                    catch { div.innerHTML = marked.parse(msg.content); }

                    div.classList = "msg " + ((msg.role === "user") ? "usermsg" : "assistantmsg");
                    container.appendChild(div);
                    container.scrollTo(0, container.scrollHeight);
                }
            }

            let imagetosend = "";
            function attachImg()
            {
                const fileinput = document.createElement('input');
                fileinput.type = 'file';
                fileinput.accept = 'image/jpeg,image/png,image/webp,image/gif';
                fileinput.style.display = 'none';
                document.body.appendChild(fileinput);

                fileinput.click();    
                fileinput.addEventListener('change', async function()
                {
                    if (fileinput.files && fileinput.files[0])
                    {
                        const file = fileinput.files[0];

                        if (file.size > 5 * 1024 * 1024)
                        {
                            alert('Image size too large. Please select an image under 5MB.');
                            document.body.removeChild(fileinput);
                            return;
                        }

                        try
                        {
                            const reader = new FileReader();
                            reader.onload = function(e)
                            {
                                imagetosend = e.target.result;
                                document.querySelector('.userinput').focus();
                            };
                            reader.readAsDataURL(file);
                        } catch (error) { alert('Error attaching image: ' + error.message); }
                        finally { document.body.removeChild(fileinput); }
                    }
                });
            }

            function loadChat(chat)
            {
                const container = document.querySelector(".messages");
                if (reloadallchatui)
                {
                    container.innerHTML = "";
                    container.style.justifyContent = "flex-start";
                    if ((chat.length - 1) < loadlastmessages) for (msg of chat) addMsgToContainer(msg);
                    else for (let x = loadlastmessages + 1; x < chat.length; ++x) addMsgToContainer(chat[x]);
                }
                else addMsgToContainer(chat.at(-1));
                if (document.querySelector(".chat").style.display === "none")
                    showSidebar();
            }
            function loadChatFromID(id)
            {
                loadChat(pb.authStore.record.data.MyZara.chats[id]);
                setChatID(id);
            }

            async function generateNextTurn()
            {
                const loadingindic = document.createElement("div");
                loadingindic.classList = "msg loadingindic";

                const dotsContainer = document.createElement("div");
                dotsContainer.classList = "loadingdots";

                for (let i = 0; i < 3; ++i)
                {
                    const dot = document.createElement("div");
                    dot.classList = "dot";
                    dotsContainer.appendChild(dot);
                }

                loadingindic.appendChild(dotsContainer);
                document.querySelector(".messages").append(loadingindic);

                try
                {
                    const response = await fetch(completionsurl[workingcompletion],
                    {
                        method: "POST",
                        headers: (key === "0") ? { "Content-Type": "application/json" } : { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                        body: JSON.stringify({ model: "openai-large", messages: messages, temperature: 1, max_tokens: 2048 })
                    });
                    const generated = (await response.json()).choices[0].message.content;
                    messages.push({ role: "assistant", content: generated });
                    loadingindic.remove()
                    loadChat(messages);
                }
                catch (e)
                {
                    loadingindic.remove();
                    loadChat([...messages, { "role": "assistant", "content": "Zara is not responding...\n" + e }]);
                    messages.pop();
                }

                if (authorized)
                {
                    let data = pb.authStore.record.data;
                    data.MyZara.chats[chatid] = [...messages];
                    if (!(await updateData(data, { pb: pb }))) alert("Failed to sync last message with the cloud.");
                }

                if (messages.length === 3) reloadallchatui = false;
            }

            document.querySelector(".userinput").addEventListener("keydown", (e) =>
            {
                if (e.key === "Enter" && !e.shiftKey)
                {
                    e.preventDefault();
                    sendMsg();
                }
            });
        </script>
    </body>
</html>
