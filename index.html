<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, inital-scale=1.0">

    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
    body, html
    {
      width: 100%;
      height: 100%;
      margin: 0;
      color: #fff;

      background: url(./rose.png) no-repeat center center fixed; 
      -webkit-background-size: cover;
      -moz-background-size: cover;
      -o-background-size: cover;
      background-size: cover;
    
      display: flex;
      flex-direction: column;

      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .content-container
    {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: fit-content;
      height: fit-content;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px;
      border-radius: 25px;
    }

    h1, p
    {
      text-align: center;
      padding: 10px;
      margin: 0;
      width: 100%;
    }

    a, button
    {
      font-size: 16px;
      color: #fff;
      background: 0;
      border: 0;
      padding: 10px;
      margin: 0;
      text-decoration: underline;
      transition: .1s ease-in-out;
    }
    a:hover, button:hover { border: 1px solid #fff; padding: 9px; }
    </style>
  </head>
<body>
  <div class="content-container">
    <h1>COMING SOON</h1>
    <p id="demo">- Calculating -</p><br>
    <p>This page will be functional 14 NOV 2025.</p>

    <div style="display: flex; flex-direction: row;">
      <a href="https://github.com/XeTute">GitHub</a>
      <a href="https://hf.co/XeTute">HuggingFace</a>
      <a href="https://ko-fi.com/XeTute">Ko-Fi</a>
    </div>
  </div>

  <script defer>
    let countDownDate = new Date("Nov 14, 2025 00:00:00").getTime();
    
    let countdownfunction = setInterval(function()
    {
      let distance = countDownDate - (new Date().getTime());
      let days = Math.floor(distance / (1000 * 60 * 60 * 24));
      let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      let seconds = Math.floor((distance % (1000 * 60)) / 1000);
    
      document.getElementById("demo").innerHTML =
      days + "d " + hours + "h " +
      minutes + "m " + seconds + "s ";

      if (distance < 0)
      {
        clearInterval(countdownfunction);
        document.getElementById("demo").innerHTML = "Will be updated shortly...";
      }
    }, 1000);
  </script>

</body>
</html>
