<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Long live the Islamic Republic of Pakistan.">
    <title>Chat \\ Xetute Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Pinstripe:ital@0;1&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="basic.css">
    <link rel="icon" href="logo.jpg">

    <script type="text/javascript">
    window.MathJax =
    {
      tex:
      {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]']]
      },
      options:
      {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script>
      function updateVh()
      {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }
      updateVh();
      window.addEventListener('resize', updateVh);
    </script>

    <style>
        html, body
        {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
        }

        pre, code
        {
            display: block;
            flex-wrap: wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            overflow-x: auto;
            white-space: pre-wrap;
            max-width: 100%;
        }
        
        pre
        {
            max-width: 95%;
            padding: 10px;
            margin: 0;
            background: #222;

            border: 2px solid #000;
            border-radius: 10px;
        }

        #chat-interface
        {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
        }
        
        #sidebar
        {
            background: #151515;
            width: 260px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: fixed;
            left: -260px;
            transition: left 0.5s ease-in-out;
            z-index: 1000;
        }
        #sidebar.active { left: 0; }
        
        #main-content
        {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }
        
        ::-webkit-scrollbar { width: 1px; }
        ::-webkit-scrollbar-track       { background: rgba(255, 255, 255, 0); }
        ::-webkit-scrollbar-thumb       { background: rgba(255, 255, 255, 0); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0); }

        #input-container
        {
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;

            background: #151515;
        }

        @media (min-width: 769px)
        {
            #sidebar
            {
                position: relative;
                left: 0;
                height: 100%;
            }
            
            #menu-toggle { display: none; }
            
            #main-content
            {
                margin-left: 260px;
                height: 100vh;
            }
            
            #chat-container
            {
                width: 95%;
                max-width: 850px;

                margin: 0 auto;
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 20px;
                box-sizing: border-box;
            }
            
            #input-container
            {
                width: 100%;
                max-width: 900px;

                position: sticky;
                bottom: 0;
                margin: 0 auto;
                padding: 20px;
                box-sizing: border-box;
                z-index: 100;
            }
        }
        
        @media (max-width: 768px)
        {
            #main-content { height: calc(var(--vh, 1vh) * 100); }
            
            #chat-container
            {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 20px;
                box-sizing: border-box;
            }
            
            #input-container
            {
                flex: 0 0 auto;
                padding: 20px 15px calc(20px + env(safe-area-inset-bottom)) 15px;
                border-top: 1px solid #333;
                z-index: 100;
            }
            
            #menu-toggle { top: calc(20px + env(safe-area-inset-top)); }
        }
        
        #menu-toggle
        {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 10px;
        }
        
        .message
        {
            position: relative;
            display: block;

            max-width: 95%;
            width: calc(100% - 40px);

            padding: 15px;
            margin: 5px;

            border: 2px solid #222;
            border-radius: 13px;

            line-height: 1.5;
            gap: 15px;

            display: flex;
            align-items: flex-start;
        }
        
        .message-avatar
        {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            margin: 5px;
        }
        
        .user-message
        {
            flex-direction: row-reverse;
            text-align: right;

            margin-right: 2px;
            margin-left: auto;
        }

        .assistant-message
        {
            text-align: left;

            margin-right: auto;
            margin-left: 2px;
        }
        
        .input-wrapper
        {
            position: relative;
            display: flex;
            align-items: stretch;
        }
        
        #messageInput
        {
            flex-grow: 1;
            min-height: 50px;
            box-sizing: border-box;
            resize: none;
            overflow-y: hidden;
            border: 2px solid #444;
            border-right: none;
            border-radius: 25px 0 0 25px;
            padding: 15px;
            background: #222;
            color: #fff;
        }

        #sendButton
        {
            height: auto;
            width: 50px;
            border: 2px solid #444 !important;
            border-left: none !important;
            border-radius: 0 25px 25px 0;
            background: #222;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .social-link
        {
            color: #777;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            text-decoration: none;
        }
        
        .social-link:hover { color: #fff; }
        
        .loading
        {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: calc(100% - 40px);
        }
        
        .loading-dots
        {
            display: flex;
            gap: 4px;
        }
        
        .loading-dots span
        {
            width: 8px;
            height: 8px;
            background: #888;
            border-radius: 50%;
            animation: pulse .25s infinite;
        }
        
        .loading-dots span:nth-child(2) { animation-delay: 0.04s; }
        .loading-dots span:nth-child(3) { animation-delay: 0s; }
        
        @keyframes pulse
        {
            0%, 100%
            {
                transform: scale(1);
                opacity: 1;
            }
            50%
            {
                transform: scale(0);
                opacity: 0;
            }
        }
        
        #overlay
        {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
        
        .sidebarbtn
        {
            margin-left: 20px;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: left;
            gap: 10px;
            padding: 10px;
        }

        .sidebartxt
        {
            text-align: left;
            margin-left: 20px;
            margin-top: 5px;
            margin-bottom: -5px;
        }

        .quickactions
        {
            display: flex;
            justify-content: center;
            margin: 5px;
            color: #999;
        }

        .avatar-modified
        {
            align-self: center;
            justify-self: center;
            margin: 0;
        }

        .chathistorybtn
        {
            display: flex;
            flex-direction: row;
            width: fit-content;
            height: fit-content;
            align-items: left;
            gap: 10px;
        }

        .markdownlink
        {
            margin: 0;
            padding: 0;
            border: 0;
            border-radius: 0;

            text-decoration: underline;
            text-decoration-color: rgba(105, 105, 255, 1);
            text-decoration-thickness: 1px;

            transition: 0.125s ease-in-out;
        }
        .markdownlink:hover, .markdownlink:focus
        {
            margin: 0;
            padding: 0;
            border: 0;
            border-radius: 0;

            text-decoration: underline;
            text-decoration-color: rgba(105, 105, 255, 0.8);
            text-decoration-thickness: 2px;
        }
    </style>
  </head>
  <body>
    <button id="menu-toggle">
        <i class="fa fa-bars fa-2x"></i>
    </button>

    <div id="overlay"></div>

    <div id="chat-interface">
        <div id="sidebar">
            <div style="padding: 0; margin-top: 20px; width: 100%; min-height: 2rem; max-height: 2.05rem;"></div>

            <h1 class="sidebartxt">Other</h1>
            <button class="sidebarbtn" id="builtWithLLaMA" onclick="alert('The AI responses you get are powered by a custom version of Meta\'s LLaMA 3.1 8B.');">Built with LLaMA</button>
            <a class="sidebarbtn" href="#" style="margin-top: -10px; margin-bottom: 0;" onclick="alert('Coming soon!');">About Us</a>
        </div>
        
        <div id="main-content">
            <div id="chat-container"></div>
            <div id="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Whereas disregard and contempt for human rights have resulted" rows="2"></textarea>
                    <button id="sendButton"><i class="fa fa-paper-plane"></i></button>
                </div>
                <row style="padding: 0; margin: 0; margin-bottom: -5px; margin-top: 8px; height: min-content; justify-content: center;">
                    <a href="https://xetute.com/" class="quickactions">New Chat</a>
                    <a id="authprofile" href="./account/" class="quickactions">Loading...</a>
                </row>
            </div>
        </div>
    </div>

    <script src="pocketbase.umd.js"></script>
    <script defer>
        const aiendpoint = 'https://ai.xetute.com/v1/chat/completions';
        const pb = new PocketBase("https://db.xetute.com");
        const systemprompt =
`You are an unnamed AI assistant from Pakistan-based XeTute Technologies. You mimic human assistant behavior.`;

        let messages =
        [{
            role: 'system',
            content: systemprompt
        }];

        let chatid = window.location.search.substr(1);
        let loggedin = false;
        let auth = undefined;

        function goToApex()
        {
            const mystr = window.location.href;
            const questionMarkIndex = mystr.indexOf('?');
            window.location.href = questionMarkIndex !== -1 ? mystr.substring(0, questionMarkIndex) : mystr;
        }

        function getApex()
        {
            const mystr = window.location.href;
            const questionMarkIndex = mystr.indexOf('?');
            const returnval = questionMarkIndex !== -1 ? mystr.substring(0, questionMarkIndex) : mystr;
            return returnval;
        }

        async function authRefresh()
        {
            const authprofile = document.getElementById('authprofile');
            try
            {
                // Check if logged in, if not, will throw an error => go to catch, if is logged in, will set let loggedin = true
                auth = await pb.collection('accounts').authRefresh();
                loggedin = true;

                // Get username from databank, if none exists or formatting is wrong, will re-format and set to let name.
                const sidebar = document.getElementById('sidebar');
                let name = "Noname";

                try { if (auth.record.data.username === undefined) { throw("Data was an undefined string."); } name = auth.record.data.username; }
                catch (error)
                {
                    console.log(error);
                    if (auth.record.data === null || auth.record.data === "")
                    {
                        try { auth.record = await pb.collection('accounts').update(pb.authStore.record.id, { "data": { "username": name } }); }
                        catch (anothererror) { console.log(anothererror); }
                    }
                }
                authprofile.innerHTML = `Logged in as ${name}`;
                authprofile.style.color = '#ddd';
                
                try
                {
                    if (chatid)
                    {
                        if (auth.record.data.chat === undefined) { goToApex(); }
                        if (chatid >= auth.record.data.chat.length) { goToApex(); }
                        messages = auth.record.data.chat[chatid];

                        if (messages[0]["content"] !== systemprompt)
                        {
                            messages[0]["content"] = systemprompt;
                            try { auth.record = await pb.collection('accounts').update(auth.record.id, { "data": auth.record.data }); }
                            catch { alert("Failed to update AI instructions. AI functionality may decline for this chat."); }
                        }

                        for (let i = 1; i < messages.length; ++i)
                        { addMessage(messages[i].content, ((i % 2) === 0) ? 'assistant' : 'user'); }
                    }

                    if (auth.record.data.chat === undefined)
                    {
                        auth.record.data.chat = [];
                        chatid = '0';
                    }
                    else
                    {
                        const chats = auth.record.data.chat.length;

                        sidebar.innerHTML += "<h1 class=\"sidebartxt\">Recent Chats</h1>";
                        let buffer = '<div style="display: flex; flex-direction: column; justify-content: flex-start; overflow-x: hidden; overflow-y: auto; max-height: 100%; gap: 10px; padding-bottom: 10px;">';
                        
                        for (let i = 0; i < chats; ++i)
                        {
                            const fulltitle = auth.record.data.chat[i][1]["content"];
                            const title = (fulltitle.length > 11) ? (fulltitle.substring(0, 8) + '...') : (fulltitle);

                            const buttonstart = `<div class="chathistorybtn"><button class="sidebarbtn" onclick="window.location.href=(getApex() + '?${i}');">`;
                            const buttonend = `</button><button onclick="deleteChat('${i}');"><i class="fa fa-trash" aria-hidden="true"></i></button></div>`;
                            buffer += `${buttonstart}— ${title}${buttonend}`;
                        }
                        buffer += "</div>";
                        sidebar.innerHTML += buffer;

                        if (chatid.length === 0) { chatid = String(chats); }
                    }
                }
                catch (error) { alert("An unexpected error happened. We're sorry."); console.log(error); }
            }
            catch (error)
            {
                console.log(error);
                authprofile.innerHTML = "Click me to log in";
            }
        }
        authRefresh();

        async function seeIfAIonline()
        {
            // See if the AI endpoint is online or not
            if (aiendpoint === "https://ai.xetute.com/v1/chat/completions")
            {
                try
                {
                    const bwd = document.getElementById('builtWithLLaMA');
                    const raw = await fetch("https://ai.xetute.com/api/v1/model");
                    const modelname = (await raw.json()).result;
                    
                    if (modelname.search("LLaMA") === -1) { bwd.remove(); }
                }
                catch (error) { console.log("AI not online: ", error); alert("AI isn't online. Sending a message may result in an error. We're sorry.\n(Error: " + error + ")"); }
            }
        }
        seeIfAIonline();

        async function deleteChat(__id__)
        {
            const fulltitle = auth.record.data.chat[__id__][1]["content"];
            const title = (fulltitle.length > 8) ? (fulltitle.substring(0, 8) + '...') : (fulltitle);
            if (confirm(`Do you really want to delete CHATID-${__id__}(${title})? This can NOT be undone.`))
            {
                try
                {
                    auth.record.data.chat.splice(__id__, 1);
                    if (auth.record.data.chat.length === 0) { delete auth.record.data.chat; }

                    await pb.collection('accounts').update(auth.record.id, { "data": auth.record.data });
                    alert(`Deleted CHATID-${__id__} successfully.`);
                    goToApex();
                }
                catch { alert(`Failed to delete CHATID${__id__}. We're sorry.`); }
            }
            else { alert(`Didn't delete CHATID-${__id__} =)`); }
        }

        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('messageInput');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        
        function toggleSidebar()
        {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
        
        menuToggle.addEventListener('click', function(e)
        {
            e.stopPropagation();
            toggleSidebar();
        });
        
        overlay.addEventListener('click', toggleSidebar);
        
        function parseMarkdown(text)
        {
            text = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            text = text.replace(/\n/g, '<br>');
            text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" class="markdownlink">$1</a>');
            text = text.replace(/!$$([^$$]*)\]$([^)]+)$/g, '<img src="$2" alt="$1" style="max-width: 95%;">');
            return text;
        }
        
        function createLoadingIndicator(currentlydoing)
        {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = `
                ${currentlydoing}
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>`;
            return loadingDiv;
        }
        
        function addMessage(content, sender)
        {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', `${sender}-message`);
            
            const avatar = document.createElement('img');
            avatar.className = 'message-avatar';
            avatar.src = sender === 'user' ? 'user.jpg' : 'logo.jpg';
            
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = parseMarkdown(content);
            
            if (window.MathJax) { try { MathJax.typeset([contentDiv]); } catch {} }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        async function getTopWebsearchResults(query)
        {
            const raw = await fetch
            (
                "https://ai.xetute.com/api/extra/websearch",
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 'q': query })
                }
            );
            const normalized = await raw.json();
            return normalized;

            // Format: 
            // [ { "title", "url", "desc", "content" }, {...}, {...} ];
        }

        let processing = false;
        async function sendMessage()
        {
            if (processing) return;
            processing = true;

            const message = messageInput.value.trim();
            if (!message) return;
            
            messageInput.value = '';
            messageInput.setAttribute('rows', '1');

            addMessage(message, 'user');
            messages.push({ role: 'user', content: message });
            
            let loadingDiv = createLoadingIndicator('Filtering a huge corpus of information');
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Ask the LLM if websearch is required, if yes, perform it
            let searched = false;
            let sources = [];
            try
            {
                messages.push
                ({
                    "role": "system", "content":
                    "Respond with a short, relevant search query (max 36 tokens) if you need additional information from the internet to answer the user's input. Otherwise (if no web search is needed), reply with EXACTLY 'No browsing needed.' and end your response there, don't generate any further tokens."
                });

                const raw = await fetch
                (
                    aiendpoint,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: messages, stream: false, temperature: 0, max_completion_tokens: 48 })
                    }
                );
                const normalized = await raw.json();
                const response = normalized.choices[0].message.content; console.log(response);
                messages.pop();

                // If not required, skip websearch, else append searchresults
                if (response.substring(0, 18) === 'No browsing needed') { throw('LLM said that no Websearch is required'); }
                else
                {
                    loadingDiv.remove();
                    loadingDiv = createLoadingIndicator('Found immediate! Processing');
                    chatContainer.appendChild(loadingDiv);
                    chatContainer.scrollTop = chatContainer.scrollHeight;

                    searched = true;
                    const webresults = await getTopWebsearchResults(response);
                    messages.push
                    ({
                        "role": "system", "content":
`Use following information to answer the user's query if relevant.
First  Webresult[title: ${webresults[0].title}, URL: ${webresults[0].url}, Description: ${webresults[0].desc}]:\n--- CONTENT START ---\n${webresults[0].content}\n--- CONTENT END ---\n
Second Webresult[title: ${webresults[1].title}, URL: ${webresults[1].url}, Description: ${webresults[1].desc}]:\n--- CONTENT START ---\n${webresults[1].content}\n--- CONTENT END ---\n
Third  Webresult[title: ${webresults[2].title}, URL: ${webresults[2].url}, Description: ${webresults[2].desc}]:\n--- CONTENT START ---\n${webresults[2].content}\n--- CONTENT END ---`
                    });
                    sources.push(webresults[0].url, webresults[1].url, webresults[2].url);
                    console.log(messages[messages.length - 1].content);
                }
            }
            catch (error) { console.log("Won't browse the web. 'Error' message: ", error); }

            loadingDiv.remove();
            loadingDiv = createLoadingIndicator('Thinking');
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Get normal message, no tools or modifications used in here
            try
            {
                // Fetch raw response & tell the server to use streaming
                const response = await fetch
                (
                    aiendpoint,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: messages, stream: true, temperature: 0.3, max_completion_tokens: 2048 })
                    }
                );

                // Extract reader from raw response, create decoder and a tmp str to store the most completed message
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantContent = '';
                
                // Create message div which will be filled with `assistantContent`
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message', 'assistant-message');

                // Create an avatar for the message div above
                const avatar = document.createElement('img');
                avatar.className = 'message-avatar';
                avatar.src = 'logo.jpg';

                // Append avatar
                const contentDiv = document.createElement('div');
                messageDiv.append(avatar, contentDiv);
                
                // And play loading animation till the tokens flow in
                loadingDiv.replaceWith(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                
                // Check for tokens till server says it's over
                while (true)
                {
                    const { done, value } = await reader.read();
                    if (done) { break; }
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(l => l.trim());
                    
                    for (const line of lines)
                    {
                        if (line === 'data: [DONE]') { break; }
                        if (!line.startsWith('data: ')) { continue; }
                        
                        try
                        {
                            const data = JSON.parse(line.slice(6));
                            const token = data.choices[0].delta.content;
                            if (token)
                            {
                                assistantContent += token;
                                contentDiv.innerHTML = parseMarkdown(assistantContent);
                            }
                        } catch (e) { console.error('Error parsing stream chunk:', e); }
                    }
                    chatContainer.scrollTop = chatContainer.scrollHeight; // for scrolling while message is being generated
                }

                // After completing the message, re-render math if any
                try { if (window.MathJax) { MathJax.typeset([messageDiv]); } }
                catch (error) { console.log(error); }

                if (searched)
                {
                    let shortened = [];
                    for (let i = 0; i < sources.length; ++i)
                    {
                        const url = sources[i];
                        const protocolLength = url.startsWith("https://") ? 8 : (url.startsWith("http://") ? 7 : 0);
                        let domainPart = protocolLength > 0 ? url.substring(protocolLength) : url;

                        const pathIndex = domainPart.indexOf('/');
                        if (pathIndex !== -1)
                            { domainPart = domainPart.substring(0, pathIndex); }
                    
                        const domainParts = domainPart.split('.');
                        const mainDomain = domainParts.slice(-2).join('.');
                        shortened[i] = (mainDomain.length > 11) ? (mainDomain.substring(0, 8) + '...') : mainDomain;
                        shortened[i][0] = shortened[i][0].toUpperCase();
                    }

                    assistantContent += `\n\nSources: [1: ${shortened[0]}](${sources[0]}) | [2: ${shortened[1]}](${sources[1]}) | [3: ${shortened[2]}](${sources[2]})`;
                    contentDiv.innerHTML = parseMarkdown(assistantContent);
                    messages.pop();
                }
                messages.push({ role: 'assistant', content: assistantContent });

                // Save chat if logged in
                if (loggedin)
                {
                    if (auth.record.data.chat === undefined) { auth.record.data["chat"] = [messages]; }
                    else { auth.record.data.chat[chatid] = messages; }
                    
                    try { auth.record = await pb.collection('accounts').update(auth.record.id, { "data": auth.record.data }); }
                    catch { alert("Failed to sync chat history to XeTute Technologies Authentication. We're sorry."); }

                    if (messages.length === 3) { window.location.href += `?${chatid}`; }
                }
                else { if ((((messages.length - 1) / 2) % 3) === 0) { alert("Your chat history is not being saved. To save future chats, please log in."); } }
            }
            catch (error)
            {
                if (searched) { messages.pop(); }
                loadingDiv.remove();
                addMessage("Sorry, I'm having trouble connecting to the server: " + error, 'assistant');
            }
            
            processing = false;
        }
        
        messageInput.addEventListener('keydown', function(e)
        {
            if (e.key === 'Enter' && !e.shiftKey)
            {
                e.preventDefault();
                sendMessage();
            }
        });
        
        messageInput.addEventListener('input', function()
        {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        });
        
        document.getElementById('sendButton').addEventListener('click', sendMessage);
    </script>
  </body>
</html>
