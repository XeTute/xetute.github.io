<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

        <title id="mytitle">MyZara \\ XeTute Technologies</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Codystar:wght@300;400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="main.css">
        <link rel="icon" href="favicon.ico">

        <style>
            .sidebar
            {
                padding: 20px;
                padding-top: 40px;
                justify-content: flex-start;
            }
            .sidebar h2
            {
                width: 100%;
                text-align: left;
                text-transform: uppercase;
                font-family: "Orbitron", sans-serif;
                font-weight: 550;
                color: var(--subheader-dark-mode);
            }
            .sidebar labeledbutton { min-width: 94%; max-width: 95%; }

            .messages
            {
                min-height: 80%;
                max-height: 85%;
                overflow: auto;
                padding: 5px;
                padding-bottom: 10vh;
            }

            .recent-chats
            {
                justify-content: flex-start;
                overflow-y: auto;
                overflow-x: hidden;
            }

            .sidebarnotes
            {
                position: absolute;
                bottom: 20px;
                max-height: 10vh;
                flex-direction: row;
                gap: 10px;
                max-width: 9%;
            }
            .sidebarnotes p
            {
                border: 2px solid var(--border-color-dark-mode);
                padding: 20px;
                border-radius: 25px;
                text-align: center;
                transition: 0.2s ease-in-out;
            }
            .sidebarnotes p:hover
            {
                box-shadow: 0 0 8px #fff;
                color: var(--background-color-dark-mode);
                border: 0;
                padding: 22px;
                background: var(--color-dark-mode);
            }

            .notifier
            {
                position: absolute;
                bottom: 5vh;
                flex-direction: row;
                max-height: 5vh;
                width: 95% !important;
            }

            .userinput
            {
                font-size: 16px;
                margin: 0;
                padding: 20px;
                background: var(--background-color-dark-mode);
                height: 95% !important;
                border: 0;
                border-radius: 0;
                box-shadow: 0 0 16px #000;

                transition: 0.2s ease-in-out;
                z-index: 0;
            }
            .userinput:hover { box-shadow: 0 0 16px #444; }
            .userinput:focus { box-shadow: 0 0 16px #666; }
            
            .actionbtn
            {
                height: 95% !important;
                margin: 0;
                padding: 20px;
                padding-left: 10px;
                padding-right: 10px;
                border: 0;
                border-radius: 25px;
                box-shadow: 0 0 8px #000;

                transition: 0.2s ease-in-out;
                z-index: 1;
            }
            .actionbtn:hover
            {
                background: var(--color-dark-mode);
                color: var(--background-color-dark-mode);
                box-shadow: 0 0 4px var(--color-dark-mode);
                scale: 1.024;
            }

            .msg
            {
                width: fit-content;
                height: fit-content;
                max-width: 80%;

                border: 2px solid var(--border-color-dark-mode);
                border-radius: 16px;

                padding: 12px;
                box-shadow: 0 0 8px var(--border-color-dark-mode);
                color: var(--color-dark-mode);
                line-height: 1.4;
            }
            .msg h1, .msg h2, .msg h3, .msg h4, .msg h5, .msg h6 { text-decoration: underline; font-family: "Codystar", "Inria Sans" !important; font-weight: 700; width: 100%; }
            .msg a, .msg button { text-decoration: underline; color: inherit; }
            .msg img, .msg video
            {
                max-width: 95%;
                margin: 15px;
                border: 2px solid var(--border-color-dark-mode);
                border-radius: 16px;
            }
            .msg pre
            {
                margin: 16px !important;
                margin-left: 8 !important;
                margin-right: auto !important;
                padding: 8px !important;
                font-family: 'Codystar', "Inria Sans", sans-serif;
                text-align: left;
                border: 2px solid var(--border-color-dark-mode);
                border-radius: 16px;
            }

            .usermsg { text-align: right; margin: 0 20px 20px auto; }
            .usermsg p, .usermsg em, .usermsg strong, .usermsg b, .usermsg i, .usermsg mark, .usermsg small, .usermsg del, .usermsg ins,
            .usermsg sub, .usermsg sup, .usermsg h1, .usermsg h2, .usermsg h3, .usermsg h4, .usermsg h5, .usermsg h6, .usermsg blockquote,
            .usermsg ol, .usermsg ul, .usermsg pre { text-align: right !important; padding: 0; margin: 0; }
            .usermsg ol, .usermsg ul { padding-left: 15px; }

            .assistantmsg { text-align: left; margin: 0 auto 20px 20px; }
            .assistantmsg p, .assistantmsg em, .assistantmsg strong, .assistantmsg b, .assistantmsg i, .assistantmsg mark, .assistantmsg small,
            .assistantmsg del, .assistantmsg ins, .assistantmsg sub, .assistantmsg sup, .assistantmsg h1, .assistantmsg h2, .assistantmsg h3,
            .assistantmsg h4, .assistantmsg h5, .assistantmsg h6, .assistantmsg blockquote, .assistantmsg ul, .assistantmsg ol, .assistantmsg pre
            { text-align: left !important; margin: 5px auto 0 0; }
            .assistantmsg ol, .assistantmsg ul { padding-left: 15px; }

            .loadingindic
            {
                margin: 0 auto 20px 20px;
                display: flex;
                justify-content: flex-start;
                align-items: center;
                height: 40px;
                width: auto;
                min-width: 80px;
            }
        
            .loadingdots
            {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 8px;
                margin: 0;
                padding: 0;
            }
        
            .dot
            {
                min-width: 10px !important;
                min-height: 10px !important;
                max-width: 11px !important;
                max-height: 11px !important;
                border-radius: 50%;
                background-color: var(--color-dark-mode);
                opacity: 0.6;
                animation: pulse .8s infinite ease-in-out;
            }
        
            .dot:nth-child(1) { animation-delay: 0s; }
            .dot:nth-child(2) { animation-delay: 0.05s; }
            .dot:nth-child(3) { animation-delay: 0.1s; }
        
            @keyframes pulse
            {
                0%, 100% { transform: scale(0.6); opacity: 0.2; }
                50% { transform: scale(1); opacity: 0.8; }
            }

            @media (orientation: portrait)
            {
                .sidebar { display: none; padding-top: 8rem; }
                .sidebarbtn { position: absolute; top: 5px; left: 5px; }
                .notifier { width: 100%; }
                .userinput { width: 70% !important; max-width: 70% !important; }
            }

            @media (orientation: landscape)
            {
                .sidebar { max-width: 16%; border-right: 2px solid rgba(0, 0, 0, 0.5); }
                .sidebarbtn { display: none; }
                .notifier { width: 90%; }
                .userinput { width: 65% !important; max-width: 65% !important; }
            }
        </style>
    </head>
    <body>
        <div style="flex-direction: row;">
            <div class="sidebar">
                <h2>Quick Actions</h2>
                <labeledbutton id="authbtn">
                    <p>Loading...</p>
                    <iwrapper>
                        <i class="fa fa-user" aria-hidden="true"></i>
                    </iwrapper>
                </labeledbutton>
                <labeledbutton id="newchat" onclick="createNewChat();">
                    <p>New Chat</p>
                    <iwrapper>
                        <i class="fa fa-plus-circle" aria-hidden="true"></i>
                    </iwrapper>
                </labeledbutton>

                <h2 style="margin-top: 30px;" id="recent-chats-header">Loading...</h2>
                <div id="recent-chats" class="recent-chats"></div>

                <div class="sidebarnotes">
                    <p onclick="alert(pakistantxt);">
                        Long live Pakistan.
                    </p>
                    <p onclick="alert(hamzahtxt);">
                        Made by Hamzah.
                    </p>
                </div>
            </div><iwrapper class="sidebarbtn"><i class="fa fa-ellipsis-h" onclick="showSidebar()"></i></iwrapper>
            <div class="chat">
                <div class="messages">
                    <p style="text-align: center; max-width: 85%; color: var(--suble-color-text-dark-mode);">
                        Send a message to start chatting with Zara.<br>
                        Zara is an AI assistant designed by Hamzah.<br>
                        — Consider verifying important information.
                    </p>
                </div>
                <div class="notifier">
                    <iwrapper class="actionbtn" style="border-top-right-radius: 0; border-bottom-right-radius: 0;" onclick="showActions();"><i class="fa fa-ellipsis-v"></i></iwrapper>
                    <textarea class="userinput" rows="2" placeholder="Whereas disregard for human rights has resulted"></textarea>
                    <iwrapper class="actionbtn" style="border-top-left-radius: 0; border-bottom-left-radius: 0;" onclick="sendMsg();"><i class="fa fa-paper-plane"></i></iwrapper>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="pocketbase.umd.js"></script>
        <script src="main.js"></script>
        <script defer>
            const pb = new PocketBase("https://db.xetute.com/");
            const path = window.location.href;

            const pakistantxt = "Pakistan is a country in South-Asia known for its rich culture despite the British, its stunning landscape, and PAF (Pakistan Armed Forces), its military. Long live the Islamic Republic of Pakistan.";
            const hamzahtxt = "Hamzah Asadullah is the (Pakistani) developer of this service.";

            const systemprompt =
`You are an AI assistant (behave as human as you possibly could) named Zara, being served through the app MyZara. The MyZara app aims to provide you, an assistant which behaves like a human assistant would.
The organisation which programmed you and owns MyZara is called XeTute Technologies; led by Hamzah Asadullah, a Pakistani student.
XeTute is also a Pakistan-based organisation which focuses on developing software, mainly, but not only, Machine-Learning focused.
XeTute can be found on their [webpage](https://xetute.github.io) and [on HuggingFace](https://hf.co/XeTute).
Hamzah can be found on his [GitHub](https://github.com/XeTute), [HuggingFace](https://hf.co/Hamzah-Asadullah) [YouTube](https://www.youtube.com/channel/UCoR5RdjU8TFPKmHqVJOZBYQ) and [Ko-Fi](https://ko-fi.com/HamzahAsadullah).`;

            const completionsurl = [ "https://ai.xetute.com/v1/chat/completions", "https://text.pollinations.ai/openai" ];
            const key = "0";
            const workingcompletion = 1;

            let processing = false;
            let messages = [ { "role": "system", "content": systemprompt } ];
            let chatid = -1;
            let reloadallchatui = true;
            let loadlastmessages = 64;

            function createNewChat()
            {
                const msgcontainer = document.querySelector(".messages");
                const txtelem = document.createElement("p");

                txtelem.setAttribute("style", "text-align: center; max-width: 85%; color: var(--suble-color-text-dark-mode);");
                txtelem.innerHTML = "Send a message to start chatting with Zara.<br>Zara is an AI assistant designed by Hamzah.<br> — Consider verifying important information.";

                msgcontainer.innerHTML = "";
                msgcontainer.style.justifyContent = "center";
                msgcontainer.appendChild(txtelem);

                if (pb.authStore.record) chatid = pb.authStore.record.data.MyZara.chats.length;
                else chatid = -1;
                messages = [ { "role": "system", "content": systemprompt } ];

                if (document.querySelector(".chat").style.display === "none")
                    showSidebar();
            }

            function showSidebar()
            {
                const sidebar = document.querySelector(".sidebar");
                const chat = document.querySelector(".chat");
                
                if (!sidebar.style.display) sidebar.style.display = "none";
                if (sidebar.style.display === "none")
                {
                    sidebar.style.display = "flex";
                    chat.style.display = "none";
                }
                else
                {
                    sidebar.style.display = "none";
                    chat.style.display = "flex";
                }
            }

            async function sendMsg()
            {
                const inputfield = document.querySelector(".userinput");
                const input = inputfield.value.trim();
                if (!input || processing) return;

                messages.push({ "role": "user", "content": input });
                loadChat(messages);

                processing = true;
                inputfield.value = "";

                await generateNextTurn();
                processing = false;
            }

            async function load()
            {
                const recentchats = document.getElementById("recent-chats-header");
                const authbtn = document.getElementById("authbtn");
                if (await isAuthorized(pb))
                {
                    if (pb.authStore.record.data.MyZara?.chats === undefined)
                    {
                        if (!(await updateData({ ...pb.authStore.record.data, MyZara: { chats: [] } }, pb)))
                            alert("Your data seems to be corrupted. Expect errors, report them to x3tut3@gmail.com if they occur.");
                    }
                    if (pb.authStore.record.data.chats?.length)
                    {
                        recentchats.textContent = "Recent Chats";
                        loadChats(pb.authStore.record.data.chats);
                        chatid = new URLSearchParams(window.location.search.substr(1)).get("chatid");
                        if ((chatid >= 0) && (chatid < pb.authStore.record.data.chats))
                        {
                            messages = pb.authStore.record.data.chats[chatid];
                            loadChat(messages);
                            reloadallchatui = false;
                        }
                        else chatid = pb.authStore.record.data.chats.length;
                    }
                    else recentchats.style.display = "none";
                    if (!pb.authStore.record.data.username)
                    {
                        let newname = prompt("You don't currently have an username. Set one here.");
                        if (await updateData({ ...pb.authStore.record.data, username: newname }, pb)) alert(`Welcome, ${newdata.username}!`);
                        else alert(`We failed to update your data. We're sorry, ${newdata.username}.`);
                    }
                    authbtn.getElementsByTagName('p')[0].textContent = pb.authStore.record.data.username;
                }
                else
                {
                    recentchats.style.display = "none";
                    authbtn.getElementsByTagName('p')[0].textContent = "Sign Up";
                }
                authbtn.setAttribute("onclick", `window.location.href="auth/${new URLSearchParams({ origin: path }).toString()}"`);
            }
            load();

            function loadChats(chats)
            {
                const container = document.getElementById("recent-chats");
                for (let x = 0; x < chats.length; ++x)
                {
                    const btn = document.createElement("labeledbutton");
                    const title = document.createElement("p");
                    const iconwrapper = document.createElement("iwrapper");
                    const icon = document.createElement("i");

                    btn.setAttribute("onclick", `loadChat(${x})`);
                    title.textContent = maxchars(chats[x].title, 12);
                    iconwrapper.setAttribute("onclick", `renameChat(${x})`);
                    icon.className = "fa fa-pencil-square-o";
                    
                    btn.appendChild(title);
                    iconwrapper.appendChild(icon);
                    btn.appendChild(iconwrapper);
                    container.appendChild(btn);
                }
            }

            function addMsgToContainer(msg)
            {
                const container = document.querySelector(".messages");
                if ((msg.role === "user") || (msg.role === "assistant"))
                {
                    const div = document.createElement("div");
                    div.innerHTML = marked.parse(msg.content);
                    div.classList = "msg " + ((msg.role === "user") ? "usermsg" : "assistantmsg");
                    container.appendChild(div);
                }
            }

            function loadChat(chat)
            {
                const container = document.querySelector(".messages");
                if (reloadallchatui)
                {
                    container.innerHTML = "";
                    container.style.justifyContent = "flex-start";
                    for (msg of chat) addMsgToContainer(msg);
                }
                else addMsgToContainer(chat.at(-1));
            }

            async function generateNextTurn()
            {
                const loadingindic = document.createElement("div");
                loadingindic.classList = "msg loadingindic";

                const dotsContainer = document.createElement("div");
                dotsContainer.classList = "loadingdots";

                for (let i = 0; i < 3; ++i)
                {
                    const dot = document.createElement("div");
                    dot.classList = "dot";
                    dotsContainer.appendChild(dot);
                }

                loadingindic.appendChild(dotsContainer);
                document.querySelector(".messages").append(loadingindic);

                try
                {
                    const response = await fetch(completionsurl[workingcompletion],
                    {
                        method: "POST",
                        headers: (key === "0") ? { "Content-Type": "application/json" } : { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                        body: JSON.stringify({ model: "openai-large", messages: messages, temperature: 1, max_tokens: 8192 })
                    });
                    const generated = (await response.json()).choices[0].message.content;
                    messages.push({ role: "assistant", content: generated });
                    loadChat(messages);
                }
                catch (e)
                {
                    loadChat([...messages, { "role": "assistant", "content": "Zara is not responding...\n" + e }]);
                    messages.pop();
                }

                if (pb.authStore.record)
                {
                    let data = pb.authStore.record.data;
                    data.MyZara.chats[chatid] = messages;
                    if (!updateData(data)) console.error("Failed to update to latest messages.");
                }

                loadingindic.remove();
                if (messages.length === 3) reloadallchatui = false;
            }
        </script>
    </body>
</html>
