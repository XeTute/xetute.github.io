<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <meta name="keywords" content="XeTute, XeTute Technologies, Technologies, PhantasiaAI, AI, Hello Friend"/>
        <meta name="description" content="Follow your Curiosity — Lead Humanity Forward"/>

        <title>Hello, Friend \\ XeTute Technologies</title>

        <link rel="stylesheet" href="basic.css"/>
        <link rel="icon" href="logo.jpg"/>
        <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <script src="https://kit.fontawesome.com/cc84e7136d.js" crossorigin="anonymous"></script>
        <style>
            html[lang="ur"]
            {
                direction: rtl;
                text-align: right;
            }

            .section
            {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                width: 100%;
                position: relative;
                padding: 2rem 0;
            }

            .hero-title
            {
                font-size: 4.5rem;
                margin-bottom: 1rem;
            }

            .hero-subtitle
            {
                font-size: 1.2rem;
                line-height: 1.6;
                margin-bottom: 2rem;
                max-width: 85%;
            }

            .social-links
            {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 1rem;
                width: 90%;
                max-width: 1000px;
            }
            .social-links > .card
            {
                width: 10rem;
                height: 3rem;
                justify-content: center;
                align-items: center;
            }

            .quick-links
            {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 1.5rem;
                width: 90%;
                max-width: 1200px;
            }
            .quick-links > p { max-width: 5rem; }

            .card
            {
                min-width: unset;
                width: auto;
            }

            .feature-container
            {
                background: rgba(255, 255, 255, 0.03);
                padding: 3rem;
                border-radius: 25px;
                max-width: 90%;
            }

            .scroll-indicator
            {
                width: 50px;
                height: 50px;
                display: flex;
                justify-content: center;
                align-items: center;
                border-radius: 25px;
                transition: .4s;
                margin-top: 2rem;
            }
            .scroll-indicator:hover
            { 
                transform: scale(1.1);
                cursor: pointer;
            }

            .section-title { margin-bottom: 3rem; }

            @media (max-width: 768px)
            {
                .hero-title { font-size: 3.5rem; }
                .social-links { grid-template-columns: 1fr; }
            }
        </style>
    </head>
    <body id="main" style="display: none;">
        <!-- Hero Section -->
        <div class="section">
            <h1 class="hero-title" id="hero-title"></h1>
            <p class="hero-subtitle" id="hero-sub"></p>
            <a class="sb scroll-indicator" onclick="document.getElementById('links').scrollIntoView({ behavior: 'smooth' });">
                <i class="fa fa-arrow-down" aria-hidden="true"></i>
            </a>
        </div>

        <!-- Quick Links Section -->
        <div class="section" id="links">
            <h1 class="section-title" id="links-title"></h1>
            <div class="quick-links">
                <div class="card">
                    <a href="./PhantasiaAI/" class="sb"><span id="app1-name"></span></a>
                    <p id="app1-desc"></p>
                </div>
                <div class="card">
                    <a href="./auth/?../" class="sb" id="auth-href"><span id="auth-title"></span></a>
                    <p id="auth-desc"></p>
                </div>
            </div>
        </div>

        <script defer>
            // Browser translations for en, zh and ur
            const translations =
            {
                en:
                {
                    heroTitle: "HELLO, FRIEND.",
                    heroSubtitle0: "Follow your Curiosity<br>Lead Humanity Forward",
                    heroSubtitle1: "Reach the end of the Story in your own way.",
                    linksTitle: "Our Apps",
                    app1Name: "PhantasiaAI",
                    app1Desc: "PhantasiaAI is waiting to immerse you in your very own story! It's free, make sure to try it out—You might love it.",
                    authTitle: "Authentication",
                    authDesc: "Our Authentication services exclusive to us. Being authenticated allows you to access certain services."
                },
                zh:
                {
                    heroTitle: "你好，朋友。",
                    heroSubtitle0: "跟随你的好奇心<br>引领人类向前",
                    heroSubtitle1: "以你自己的方式到达故事的结尾。",
                    linksTitle: "我们的应用",
                    app1Name: "PhantasiaAI",
                    app1Desc: "PhantasiaAI 正在等待将您沉浸在您自己的故事中！免费尝试一下，你可能会喜欢。",
                    authTitle: "认证",
                    authDesc: "我们的认证服务是专属的。通过认证可以访问特定服务。"
                },
                ur:
                {
                    heroTitle: "ہیلو، دوست۔",
                    heroSubtitle0: "اپنے تجسس کی پیروی کریں<br>انسانیت کو آگے لے جائیں",
                    heroSubtitle1: "اپنی طریقے سے کہانی کے اختتام تک پہنچیں۔",
                    linksTitle: "ہماری ایپس",
                    app1Name: "PhantasiaAI",
                    app1Desc: "PhantasiaAI آپ کو اپنی کہانی میں غرق کرنے کے لیے تیار ہے! یہ مفت ہے، اسے آزمائیں—آپ کو یہ پسند آسکتا ہے۔",
                    authTitle: "تصدیق",
                    authDesc: "ہماری توثیقی خدمات منفرد ہیں۔ تصدیق شدہ ہونے سے آپ مخصوص خدمات تک رسائی حاصل کر سکتے ہیں۔"
                }
            };

            const userLang = navigator.language.slice(0, 2); // en, zh, ur
            const lang = translations[userLang] ? userLang : 'en';
            const trns = translations[lang];

            document.getElementById('hero-title').innerHTML  = trns.heroTitle;
            document.getElementById('links-title').innerHTML = trns.linksTitle;
            document.getElementById('app1-name').innerHTML   = trns.app1Name;
            document.getElementById('app1-desc').innerHTML   = trns.app1Desc;
            document.getElementById('auth-title').innerHTML  = trns.authTitle;
            document.getElementById('auth-desc').innerHTML   = trns.authDesc;

            document.documentElement.lang = lang;

            // Text Animations
            function textAnim(elemid, newText, delay = 2000, speed = 50)
            {
                return new Promise((resolve) =>
                {
                    const semislogan = document.getElementById(elemid);
                    if (!semislogan) return resolve();
                
                    setTimeout(() =>
                    {
                        const currentText = semislogan.textContent;
                        const totalFrames = Math.max(currentText.length, newText.length);
                        let frame = 0;
                    
                        function updateText()
                        {
                            if (frame >= totalFrames) return resolve();
                            semislogan.innerHTML = newText.substring(0, frame + 1) + currentText.substring(frame + 1);
                            ++frame;
                            setTimeout(updateText, speed);
                        }
                    
                        updateText();
                    }, delay);
                });
            }

            async function changeText(texts, elemid)
            {
                while (true)
                {
                    for (const text of texts)
                        await textAnim(elemid, text);
                }
            }
            changeText([trns.heroSubtitle0, trns.heroSubtitle1], 'hero-sub');

            document.getElementById('main').style.display = 'flex';
        </script>
    </body>
</html>
