<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Long live the Islamic Republic of Pakistan.">
    <title>Chat \\ Xetute Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon"       href="logo.jpg"    >
    <link rel="stylesheet" href="css/vars.css">
    <link rel="stylesheet" href="css/html.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
      // Configure Marked.js
      marked.setOptions
      ({
        breaks: true,
        highlight: function(code) { return code; },
        renderer: new marked.Renderer({})
      });
    </script>

    <script type="text/javascript">
    window.MathJax =
    {
      tex:
      {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]']]
      },
      options:
      {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
    </script>

    <script>
        function updateVh() { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); }
        window.addEventListener('resize', updateVh);
    </script>

    <style>
        #chat-interface
        {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
        }

        #sidebar
        {
            background: var(--primary-bg);
            display: flex;
            flex-direction: column;
            width: var(--sidebar-width);
            height: 100vh;
            gap: 10px;
            position: fixed;
            left: calc(-1 * var(--sidebar-width));
            transition: left var(--transition-speed) ease-in-out;
            z-index: 1000;
            overflow-y: auto;
            filter: brightness(90%);
            transition: 0.5s ease-in-out;
        }
        #sidebar:hover, #sidebar:focus { filter: brightness(100%); }
        #sidebar.active { left: 0; }

        .sidebarbtn
        {
            margin: 5px 15px;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.2s ease;
            border: 0;
        }
        .sidebarbtn:hover { color: #000; background: var(--accent-light); }

        #main-content
        {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            position: relative;
            min-height: 0;
        }

        #input-container
        {
            position: relative !important;
            bottom: auto !important;
        }

        @media (orientation: landscape)
        {
            #sidebar
            {
                position: relative;
                left: 0;
                height: 100%;
                padding: 0;
            }

            #menu-toggle { display: none; }
            #main-content { height: 100vh; }

            #chat-container
            {
                width: 95%;
                max-width: 900px;
                margin: 0 auto;
                flex: 1;
                overflow-y: auto;
                padding: 20px;
            }

            #input-container
            {
                width: 95%;
                max-width: 900px;
                position: sticky;
                bottom: 0;
                margin: 0 auto;
                padding: 20px;
                z-index: 100;
            }
        }

        @media (orientation: portrait)
        {
            #main-content { height: calc(var(--vh, 1vh) * 100); }
            #sidebar { padding-top: 70px; }

            #chat-container
            {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                padding: 20px;
            }

            #input-container
            {
                flex: 0 0 auto;
                padding: 20px 15px calc(20px + env(safe-area-inset-bottom)) 15px;
                border-top: 1px solid var(--border-color);
                z-index: 100;
            }

            #menu-toggle { top: calc(20px + env(safe-area-inset-top)); display: flex; }
        }

        #menu-toggle
        {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: var(--card-bg);
            border: 0;
            color: var(--text-color);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: background-color 0.2s ease;
        }
        #menu-toggle:hover { background: var(--accent-color); }

        @keyframes fadeIn
        {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message
        {
            display: flex;
            align-items: center;
            position: relative;
            padding: 15px;
            line-height: 1.6;
            overflow-wrap: break-word;
            word-break: break-word;
            animation: fadeIn 0.5s ease-in-out;
        }
        .message hr { display: block; height: 2px; border: 0; border-top: 2px solid #666; margin: 1rem 0; padding: 0; }

        .message div
        {
            padding: 0;
            margin: 0;
        }

        .message p code
        {
            background: var(--secondary-bg);
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 0.9em;
            display: inline;
            white-space: normal;
        }
        .message p { margin: 0; }
        .message p:last-child { margin-bottom: 0; }

        .message a
        {
            margin: 0;
            padding: 0;
            border: 0;
            border-radius: 0;
            color: rgba(136, 136, 252, 1);

            text-decoration: underline;
            text-decoration-color: rgba(105, 105, 255, 1);
            text-decoration-thickness: 1px;

            transition: 0.125s ease-in-out;
        }
        .message a:hover, .message a:focus
        {
            margin: 0;
            padding: 0;
            border: 0;
            border-radius: 0;

            text-decoration: underline;
            text-decoration-color: rgba(105, 105, 255, 0.8);
            text-decoration-thickness: 2px;
        }

        .message img
        {
            max-width: 80%;
            border-radius: 15px;
            margin: 5px;
            margin-left: 0;
            border: 1px solid var(--border-color);
        }

        .message table
        {
            border-collapse: collapse;
            margin: 15px 0;
            width: 100%;
        }

        .message th, .message td
        {
            padding: 12px;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        .message th
        {
            background-color: var(--card-bg);
            font-weight: 500;
        }

        .message ul, .message ol
        {
            padding-left: 20px;
            margin: 5px;
        }

        .assistant-message
        {
            max-width: 95%;
            margin-right: auto;
        }

        .user-message
        {
            background-color: var(--secondary-bg);
            margin-left: auto;
            border-radius: 20px;
            border-top-right-radius: 0;
            text-align: right;
            justify-content: flex-end;
            width: fit-content;
            max-width: 80%;
        }
        .user-message div, .user-message img { text-align: right; align-items: right; }
        .user-message pre, .user-message code { text-align: left; }

        #input-container
        {
            background-color: var(--primary-bg);
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .input-wrapper
        {
            position: relative;
            display: flex;
            align-items: stretch;
            border-radius: 24px;
            overflow: hidden;
            background: var(--input-bg);
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: box-shadow 0.3s ease;
        }
        .input-wrapper:focus-within { box-shadow: 0 1px 12px #333; }

        #messageInput
        {
            flex-grow: 1;
            min-height: 50px;
            box-sizing: border-box;
            resize: none;
            overflow-y: hidden;
            border: 0;
            border-radius: 24px 0 0 24px;
            padding: 15px 20px;
            background: transparent;
            color: var(--text-color);
            font-size: 14px;
            line-height: 1.5;
            outline: none;
        }

        #sendButton
        {
            height: auto;
            width: 50px;
            border: 0;
            background: var(--accent-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        #sendButton:hover { background: var(--accent-light); }

        .loading
        {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            padding: 15px;
            max-width: 800px;
            margin: 10px auto;
            background: var(--card-bg);
            border-radius: 10px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .loading-dots
        {
            display: flex;
            gap: 4px;
        }
        .loading-dots span
        {
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: pulse .5s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.1s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.2s; }

        @keyframes pulse
        {
            0%, 100%
            {
                transform: scale(1);
                opacity: 1;
            }
            50%
            {
                transform: scale(0.6);
                opacity: 0.5;
            }
        }

        #overlay
        {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            backdrop-filter: blur(2px);
            animation: fadeIn 0.3s ease-in-out;
        }
        #overlay.active { display: block; }

        #chatloading
        {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #ccc;
            padding: 30px;
        }

        .sidebartxt
        {
            margin: 20px 0 10px 20px;
            font-size: 1.1em;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chathistorybtn
        {
            display: flex;
            align-items: center;
            padding: 2px;
            margin: 5px 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
        }

        .chathistorybtn .sidebarbtn
        {
            margin: 0;
            flex: 1;
        }

        .chathistorybtn button
        {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            color: var(--text-color);
            border: 0;
            border-radius: 8px;
            margin-left: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .chathistorybtn button:hover { color: #000; background: var(--accent-light); }

        .info
        {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 5px -5px 5px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s ease;
            font-weight: 500;
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
        }
        .info i { margin-right: 6px; }

        .info:hover
        {
            color: var(--accent-light);
            background: var(--card-bg);
            text-decoration: none;
        }

        .thoughts-container
        {
            border-left: 3px solid var(--accent-color);
            height: fit-content;
            margin: 5px;
            display: none;
            font-size: 0.9em;
            color: #ccc;
            white-space: pre-wrap;
        }

        .thoughts-toggle
        {
            color: var(--accent-light);
            border: 2px solid var(--border-color);
            border-radius: 5px;
            padding: 5px;
            margin: 10px;
            margin-left: -5px;
            font-size: 0.8em;
            transition: all 0.2s ease;
        }

        .thoughts-toggle:hover
        {
            background: var(--accent-color);
            color: white;
            scale: 0.95;
        }

        .msgoptions
        {
            display: flex;
            flex-direction: row;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 2px;
            margin: 0;
            width: fit-content;
            height: fit-content;
        }

        .msgoptionsbtn
        {
            font-size: 10px;
            width: fit-content;
            height: fit-content;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            margin: 4px;
        }
    </style>
  </head>
  <body onload="updateVh();">
    <button id="menu-toggle">
        <i class="fas fa-bars"></i>
    </button>

    <div id="overlay"></div>

    <div id="chat-interface">
        <div id="sidebar">
            <h1 class="sidebartxt">Quick Actions</h1>

            <div class="chathistorybtn" onclick="window.location.href = '?chat=-1';">
                <a class="sidebarbtn">New Chat</a>
                <button><i class="fas fa-plus-circle"></i></button>
            </div>
            
            <div class="chathistorybtn">
                <a id="authprofile" class="sidebarbtn">Loading...</a>
                <button><i class="fas fa-user"></i></button>
            </div>
        </div>

        <div id="main-content">
            <div id="chat-container">
                <p id="chatloading">You're not chatting with a human. Consider verifying important information.</p>
            </div>
            <div id="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Whereas disregard and contempt for human rights have resulted" rows="2"></textarea>
                    <button id="sendButton"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div style="display: flex; justify-content: center; gap: 15px; margin-top: 12px;" id="info">
                    <a class="info" onclick="window.location.href = `./about/?${window.location.href}`;">
                        <i class="fas fa-info-circle"></i> About Us
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateVh()
        {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('load', updateVh);
        window.addEventListener('resize', updateVh);
    </script>
    <script src="pocketbase.umd.js"></script>
    <script src="common.js"></script>
    <script defer>
        // UI Elements
        const sidebar = document.getElementById('sidebar');
        const chatContainer = document.getElementById('chat-container');
        const menuToggle = document.getElementById('menu-toggle');
        const overlay = document.getElementById('overlay');

        // Toggle sidebar for mobile
        menuToggle.addEventListener('click', () => 
        {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        });

        overlay.addEventListener('click', () => 
        {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        });

        document.getElementById('messageInput').addEventListener('input', function()
        {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.scrollHeight > 150) { this.style.height = '150px'; }
        });

        // Backend constants
        const pb = new PocketBase("https://db.xetute.com/");
        let authenticated = false;
        let currentendpoint = 0;
        const completionendpoint = [ "https://ai.xetute.com/v1/chat/completions", "https://text.pollinations.ai/openai", "https://api.groq.com/openai/v1/chat/completions"];
        const modelnameendpoint  = [ { url: "https://ai.xetute.com/api/v1/model", fromresponse: "result", key: '0', temp: 0.65 }, { preset: "openai-large", key: '', temp: 0.65 }, { preset: "deepseek-r1-distill-llama-70b-specdec", key: "gs" + "k_wLONdT9NuUPVjgORByKtWGdyb3FYtuzJAO05AoEW9hIAzPtJVQ9K", temp: 1 }];
    
        // Backend vars
        let config = { endpoint: "", modelname: "", key: "", temp: 0 };
        let message = [];
        let chatid = -1;
        let newchat = -1;
    
        function addMLPowered()
        {
            try { document.getElementById('mlpowerednotice').remove(); }
            catch {}

            const mlpowered = document.createElement('button');
            mlpowered.className = 'info';
            mlpowered.id = 'mlpowerednotice';
            if (config.modelname.search("LLaMA") === -1)
            {
                mlpowered.innerHTML = `<i class="fa fa-microchip" aria-hidden="true"></i> ML-Powered`;
                mlpowered.setAttribute('onclick', `alert("The person you're chatting with is not a human; the responses are a direct result of the concept of Machine Learning. Verify important information.");`);
            }
            else
            {
                mlpowered.innerHTML = `<i class="fa fa-microchip" aria-hidden="true"></i> Built with ${ensureMaxChars(config.modelname, 12)}`;
                mlpowered.setAttribute('onclick', `alert("The AI you're chatting with is powered by ${config.modelname}.");`);
            }
            document.getElementById('info').appendChild(mlpowered);
        }

        function setNextPreset()
        {
            ++currentendpoint;
            if (modelnameendpoint.length <= currentendpoint) { return 0; }
            if (modelnameendpoint[currentendpoint].preset)
            {
                config.endpoint = completionendpoint[currentendpoint];
                config.modelname = modelnameendpoint[currentendpoint].preset;
                config.key = modelnameendpoint[currentendpoint].key;
                config.temp = modelnameendpoint[currentendpoint].temp;
            }
            addMLPowered();
            return 1;
        }

        async function testEndpoints()
        {
            let response;
            let name = "";

            for (let x = 0; x < modelnameendpoint.length; ++x)
            {
                currentendpoint = x;
                if (modelnameendpoint[x].preset)
                {
                    --currentendpoint;
                    setNextPreset();
                    break;
                }

                try
                {
                    response = await fetch(modelnameendpoint[x].url);
                    name = (await response.json())[modelnameendpoint[x].fromresponse];
                    if (name.includes("koboldcpp/")) { name = name.split("koboldcpp/")[1]; }

                    config.endpoint = completionendpoint[x];
                    config.modelname = name;
                    config.key = modelnameendpoint[x].key;
                    config.temp = modelnameendpoint[x].temp;
                    break;
                }
                catch (e) { console.log("Endpoint error:", e); }
            }
        }

        function generateSystemPrompt(username)
        {
            let buffer =
`You are a helpful assistant for ${username}.\nYou may think through the "<think>thoughts</think>answer" format.
Your thoughts, if, should include a structured plan on how you're going to approach the user's query. Nobody except yourself sees your thoughts.
You can generate images; example: ![description](https://image.pollinations.ai/p/encoded%20URI%20of%20an%20image%20description?model=turbo&width=XXXX&height=XXXX&seed=XX&nologo=true&enhance=true). These images may take some time to load; tell the user.
Markdown is fully supported.. If the user queries content which includes insults on religions, on God, on any eastern country (except Afghanistan), or is sexually-suggestive, you will not engage in that chat.`;
            return buffer;
        }

        async function syncData(newdata)
        {
            try { await pb.collection('accounts').update(pb.authStore.record.id, { data: newdata }); }
            catch { alert("Failed to sync data with XeTute Technologies Cloud. We're sorry."); }
        }

        async function authAndDisplay()
        {
            const authprofile = document.getElementById('authprofile');
            try
            {
                await pb.collection('accounts').authRefresh();
                authenticated = true;

                let auth = pb.authStore.record;
                let updated = false;
                if (!auth.data || (auth.data === null) || (auth.data === "") || (auth.data === undefined)) { auth.data = {}; updated = true; }
                if (!auth.data.username) { auth.data.username = "Friend"; updated = true; }
                if (!auth.data?.chat) { auth.data.chat = []; updated = true; }
                if (updated) { await syncData(auth.data); }

                authprofile.innerHTML = auth.data.username;
                authprofile.href = `./account/?${window.location.href}`;
            }
            catch (e)
            {   console.log("Error while authRefresh():", e);
                authenticated = false;
                authprofile.innerHTML = 'Login';
                authprofile.href = `./auth/?${window.location.href}`;
            }
        }

        function removeloading() { document.getElementById('chatloading').remove(); }
        function displayAllMessages()
        {
            removeloading();
            for (let x = 1; x < message.length; ++x)
                { addMessage(message[x].role, message[x].content); }
        }

        async function getChatID()
        {
            const urlParams = new URLSearchParams(window.location.search);
            chatid = urlParams.has('chat') ? parseInt(urlParams.get('chat')) : -1;
            let data = pb.authStore?.record?.data;

            try
            {
                if ((data.chat === '') || (data.chat === undefined) || (data.chat === null))
                {
                    data.chat = [];
                    await syncData(data);
                }
            }
            catch (e) { console.log(e); }

            try
            {
                if (authenticated && data.chat[chatid])
                {
                    message = data.chat[chatid];
                    message[0].content = generateSystemPrompt(message[0].content);
                    displayAllMessages();
                    newchat = false;
                }
                else { throw new Error('Invalid chat ID'); }
            }
            catch (e)
            {
                message = [ { role: "system", content: generateSystemPrompt(authenticated ? data.username : "Friend") } ];
                newchat = authenticated;
                chatid = authenticated ? data.chat.length : -1;
            }
            return { chatid, newchat };
        }

        function copyLast()
        {
            try { navigator.clipboard.writeText(message.at(-1).content); alert("Copied!"); }
            catch (e) { alert("Failed to copy. We're sorry."); console.log("Failed to copy to clipboard: ", e); }
        }

        let processing = false;
        let generationtime = 0.0;

        function formatMessage(text, lastmessage=false)
        {
            let fromassistant = false;
            for (let x = (message.length - 1); x >= 0; --x)
            {
                if ((message[x].content === text) && (message[x].role === "assistant"))
                {
                    fromassistant = true;
                    break;
                }
            }

            let jaxedtext = document.createElement('div');
            jaxedtext.innerHTML = text;
            if (window.MathJax)
            {
                try { MathJax.typeset([jaxedtext]); }
                catch (e) { console.error("MathJAX error:", e); }
            }
            html = marked.parse(jaxedtext.innerHTML.replace(/<think>[\s\S]*?<\/think>/g, ''));

            if (fromassistant)
            {
                if (processing)
                {
                    html +=
                    `<em style="font-size: 0.7rem; color: #ccc;">
                        Took ${ensureMaxDigits(generationtime / 1000, 3)}s | Generated ${ensureMaxDigits(wordsPerSecond(countWords(text)), 3)} Words per Second.
                    </em>`;
                }

                if (lastmessage)
                {
                    html +=
                    `<div class="msgoptions">
                        <button onclick="copyLast();" class="msgoptionsbtn">
                            <i class="fa-solid fa-copy"></i>
                        </button>
                        <button onclick="regenerateLast();" class="msgoptionsbtn">
                            <i class="fa fa-refresh" aria-hidden="true"></i>
                        </button>
                    </div>`;
                }

                const begin = text.search("<think>");
                if (begin !== -1)
                {
                    const end = text.search("</think>");
                    const thoughts = text.substring(begin + 7, end).trim();
                    if (thoughts.length > 0)
                    {
                        if (text.length === (end + 8)) { text = `<p style="color: #ccc;">${thoughts}</p>` + text; }
                        else
                        {
                            html =
                            `<div>
                                <button class="thoughts-toggle" onclick="toggleThoughts(this)">Show Thoughts</button>
                                <div class="thoughts-container" style="display: none;"><p style="margin: 15px;">${thoughts}</p></div>
                            </div>` + html;
                        }
                    }
                }
            }

            return html;
        }

        function addMessage(role, content)
        {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = formatMessage(content);
            messageDiv.append(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function createLoadingIndicator()
        {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant-message';
    
            const text = document.createElement('p');
            text.textContent = "Thanks for your patience";
            text.style.margin = '10px';
            text.style.alignSelf = 'center';
            text.style.color = '#ddd';

            const dots = document.createElement('div');
            dots.className = 'loading-dots';
            dots.innerHTML = '<span></span><span></span><span></span>';
    
            loadingDiv.append(text, dots);
            return loadingDiv;
        }

        function addChatsToSidebar()
        {
            const searchindex = sidebar.innerHTML.search("Chat History");
            if (searchindex !== -1) { sidebar.innerHTML = sidebar.innerHTML.substring(0, searchindex - "<h1 class=\"sidebartxt\">".length); }

            const historyHeader = document.createElement('h1');
            historyHeader.className = 'sidebartxt';
            historyHeader.textContent = 'Chat History';
            sidebar.appendChild(historyHeader);

            pb.authStore.record.data.chat.forEach((chat, index) => 
            {
                const chatItem = document.createElement('div');
                chatItem.className = 'chathistorybtn';
                
                const link = document.createElement('a');
                link.className = 'sidebarbtn';
                link.href = `?chat=${index}`;
                link.textContent = ensureMaxChars(chat[1]?.content || 'New Chat', 25);

                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
                deleteBtn.onclick = () => { deleteChat(index, `chatid-${index}`); };

                chatItem.append(link, deleteBtn);
                chatItem.id = `chatid-${index}`;
                sidebar.appendChild(chatItem);
            });
        }

        function wordsPerSecond(countwords)
        {
            const x = countwords / (generationtime / 1000);
            return x;
        }

        // Returns:
        // - 0: If fails
        // - 1: If success
        // - 2: If success, but finish reason is max_length
        // Note: If streaming, function expects a content div with if `lastgeneration`
        async function fetchResponse(stream)
        {
            const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` }
            const body = { model: config.modelname, messages: message, stream: stream, temperature: config.temp, max_tokens: 8192 };

            let response;
            try { response = await fetch(config.endpoint, { method: 'Post', headers: headers, body: JSON.stringify(body) }); }
            catch (e) { console.log("Failed at fetchResponse: ", e); if (setNextPreset()) { return await fetchResponse(stream); } else { return 0; } }

            if (stream)
            {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                const start = Date.now();
                const index = message.length;
                const div = document.getElementById('lastgeneration');

                message.push({ role: "assistant", content: "" });
                try
                {
                    while (true)
                    {
                        const { done, value } = await reader.read();
                        if (done) { break; }

                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n').filter(l => l.trim());

                        for (const line of lines)
                        {
                            if (!line.startsWith('data: ')) { continue; }
                            if (line.startsWith("data: [DONE]")) { break; }
                            try
                            {
                                const data = JSON.parse(line.slice(6));
                                if (data.choices[0]?.delta?.content)
                                {
                                    message[index].content += data.choices[0].delta.content;
                                    generationtime = Date.now() - start;
                                    div.innerHTML = formatMessage(message[index].content, lastmessage=true);
                                    chatContainer.scrollTop = chatContainer.scrollHeight;
                                }
                            }
                            catch (e) { console.log("Stream parse error: ", e, "\n\nWhile reading line: ", line); }
                        }
                    }
                    return 1;
                }
                catch (e)
                {
                    console.log("Error at fetchResponse while streaming in tokens: ", e);
                    return 0;
                }
            }
            else
            {
                response = await response.json();
                const text = response.choices[0].message.content;
                message.push({ "role": "assistant", "content": text });
                if (response.choices[0].finish_reason === "length") { return 2; }
                return 1;
            }
        }

        async function sendMessage()
        {
            if (processing) return;
            processing = true;

            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = 'auto';
            message.push({ role: 'user', content: text });
            addMessage('user', text);

            try { document.getElementById('lastgenerationdiv').id = ''; document.getElementById('lastgeneration').id = ''; } catch {}
            const loading = createLoadingIndicator();
            chatContainer.appendChild(loading);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try
            {
                const messageDiv = document.createElement('div');
                const contentDiv = document.createElement('div');

                messageDiv.className = 'message assistant-message';
                messageDiv.append(contentDiv);
                loading.replaceWith(messageDiv);

                contentDiv.id = 'lastgeneration';
                messageDiv.id = 'lastgenerationdiv';
                const status = await fetchResponse(true);

                if (status === 0) { throw("Failed to generate. We're sorry."); }
                if (status === 2) { /* "Continue Generation" Coming Soon */ }

                if (message.length === 3) { removeloading(); }
                if (authenticated)
                {
                    let data = pb.authStore.record.data;
                    data.chat[chatid] = message;
                    await syncData(data);
                    if (message.length === 3) { addChatsToSidebar(); }
                }
                else if (message.length === 5) { alert("Your chat isn't being saved. To save future chats, log in."); }
            }
            catch (e)
            {
                loading.remove();
                console.error("API Error:", e);
                addMessage('assistant', `Error: ${e}`);
            }
            finally
            {
                if (loading && loading.parentNode && !loading.parentNode.isSameNode(chatContainer))
                    { loading.parentNode.removeChild(loading); }
                processing = false;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        async function regenerateLast()
        {
            if (processing) { return; }
            processing = true;

            document.getElementById('lastgenerationdiv').remove();
            message.pop();

            const loading = createLoadingIndicator();
            chatContainer.appendChild(loading);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try
            {
                const messageDiv = document.createElement('div');
                const contentDiv = document.createElement('div');

                messageDiv.className = 'message assistant-message';
                messageDiv.append(contentDiv);
                loading.replaceWith(messageDiv);

                contentDiv.id = 'lastgeneration';
                messageDiv.id = 'lastgenerationdiv';
                const status = await fetchResponse(true);

                if (status === 0) { throw("Failed to regenerate. We're sorry."); }
                if (status === 2) { /* "Continue Generation" Coming Soon */ }

                if (authenticated)
                {
                    let data = pb.authStore.record.data;
                    data.chat[chatid] = message;
                    await syncData(data);
                    if (message.length === 3) { addChatsToSidebar(); }
                }
            }
            catch (e)
            {
                loading.remove();
                console.error("API Error:", e);
                addMessage('assistant', `Error: ${e}`);
            }
            finally
            {
                if (loading && loading.parentNode && !loading.parentNode.isSameNode(chatContainer))
                    { loading.parentNode.removeChild(loading); }
                processing = false;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }
    
        // Event listeners
        document.getElementById('sendButton').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keydown', (e) => 
        {
            if (e.key === 'Enter' && !e.shiftKey)
            {
                e.preventDefault();
                sendMessage();
            }
        });

        async function deleteChat(index, id)
        {
            if (confirm('Delete this chat?'))
            {
                let data = pb.authStore.record.data;
                data.chat.splice(index, 1);
                await syncData(data);
                document.getElementById(id).remove();
                if (chatid === Number(id.substring(id.search('-') + 1, id.length))) { window.location.reload(); }
            }
        }

        // Initialization
        async function initialize()
        {
            await testEndpoints();
            await authAndDisplay();
            await getChatID();
            
            addMLPowered();
            if (authenticated && pb.authStore.record.data.chat?.length) { addChatsToSidebar(); }
        }
        initialize();
    </script>
  </body>
