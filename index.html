<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <meta name="keywords" content="XeTute, XeTute Technologies, Technologies, Free AI Chatbot"/>
        <meta name="description" content="Long live the Islamic Republic of Pakistan."/>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Pinstripe:ital@0;1&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

        <link rel="icon"       src ="logo.jpg" >
        <link rel="stylesheet" href="basic.css">
    </head>
    <style>
        #chatContainer
        {
            scrollbar-width: thin;
            scrollbar-color: #444 #222;
        }

        #chatContainer::-webkit-scrollbar { width: 8px; }

        #chatContainer::-webkit-scrollbar-track
        {
            background: #222;
            border-radius: 10px;
        }

        #chatContainer::-webkit-scrollbar-thumb
        {
            background: #444;
            border-radius: 10px;
        }

        .message
        {
            max-width: 70%;
            padding: 10px;
            margin: 10px;
            border-radius: 25px;
            word-break: break-word;
        }
    
        .user-message
        {
            background: #050505;
            border: 2px solid #444;
            align-self: flex-end;
            text-align: right;
        }

        .assistant-message
        {
            background: #050505;
            align-self: flex-start;
            border: 2px solid #444;
            text-align: left;
        }

        .loading-message
        {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (min-width: 768px)
        {
            #chatContainer
            {
                max-width: 800px;
                margin: 20px auto;
                padding: 0 20px;
            }
        
            .message { max-width: 50%; }
            .user-message { margin-right: 20px; }
            .assistant-message { margin-left: 20px; }
        }
    </style>
    <body style="overflow: hidden;">
        <column id="chatContainer" style="height: 100%; overflow-y: auto; margin: 20px;">
            <em id="startingquestion">How may I help you today?</em>
        </column>
        <row style="gap: 10px; height: fit-content; align-items: center; justify-content: center;">
            <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off"/>
            <button onclick="sendMessage()" style="width: fit-content; height: 100%;">
                <i class="fa fa-paper-plane" aria-hidden="true"></i>
            </button>
        </row>
    </body>
    <script defer>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const messages = [ { role: 'system', content: "You're a Chatbot with no name by the Pakistani startup XeTute Technologies at https://xetute.com/. Always respond as short as possible while remaining helpful."} ];

        let processing = false;

        async function sendMessage()
        { 
            if (processing) return;
            processing = true;

            const message = messageInput.value.trim();
            if (!message) return;
        
            try { document.getElementById('startingquestion').outerHTML = ''; }
            catch {}

            addMessage(message, 'user');
            messageInput.value = '';

            const loadingDiv = document.createElement('div');
            const spinner = document.createElement('i');

            loadingDiv.classList.add('message', 'assistant-message', 'loading-message');
            spinner.classList.add('fa', 'fa-spinner', 'fa-spin');

            loadingDiv.appendChild(spinner);
            loadingDiv.appendChild(document.createTextNode(' Thinking...'));

            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        
            try
            {
                messages.push({ role: 'user', content: message });
                const response = await fetch('https://ai.xetute.com/v1/chat/completions',
                {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messages, stream: false })
                });
            
                const data = await response.json();
                const reply = data.choices[0].message.content;

                messages.push({ role: 'assistant', content: reply });
                loadingDiv.remove();
                addMessage(reply, 'assistant');
            }
            catch (error)
            {
                console.error('Error:', error);
                loadingDiv.remove();
                addMessage("Sorry, I'm having trouble connecting to the server.", 'assistant');
            }
            processing = false;
        }

        function addMessage(content, sender)
        {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', `${sender}-message`);
            messageDiv.textContent = content;
            chatContainer.appendChild(messageDiv);

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        messageInput.addEventListener('keypress', (e) =>
        {
            if (e.key === 'Enter' && !e.shiftKey)
            {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</html>
