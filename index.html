<!DOCTYPE html>
<html lang="en">
    <head>
        <title>XeTute: Coming Soon</title>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <meta charset="UTF-8"/>

        <link rel="icon" type="image/x-icon" href="./favicon.ico"/>
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"/>

        <style>
            :root
            {
                --bg-color: #FEFEFE;
                --text-color: #000;
                --accent-color: #333;
                --hover-bg: #F5F5F5;
                --border-color: #E0E0E0;
                --shadow-color: rgba(0, 0, 0, 0.1);
                --gradient-bg: linear-gradient(135deg, #FEFEFE 0%, #F8F8F8 100%);
            }

            [data-theme="dark"]
            {
                --bg-color: #0F0F0F;
                --text-color: #E8E8E8;
                --accent-color: #FFF;
                --hover-bg: #1A1A1A;
                --border-color: #333;
                --shadow-color: rgba(255, 255, 255, 0.1);
                --gradient-bg: linear-gradient(135deg, #0F0F0F 0%, #1A1A1A 100%);
            }

            *
            {
                box-sizing: border-box;
            }

            html, body
            {
                width: 100%;
                height: 100vh;
                background: var(--gradient-bg);
                color: var(--text-color);
                margin: 0;
                padding: 0;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                font-family: "Roboto Condensed", sans-serif;
                font-weight: 300;
                transition: all 0.3s ease;
                position: relative;
            }

            *
            {
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            *::-webkit-scrollbar
            {
                display: none;
            }

            body::before
            {
                content: '';
                position: absolute;
                top: -50%;
                left: -50%;
                width: 200%;
                height: 200%;
                background: 
                    radial-gradient(circle at 20% 30%, var(--shadow-color) 0%, transparent 50%),
                    radial-gradient(circle at 80% 70%, var(--shadow-color) 0%, transparent 50%),
                    radial-gradient(circle at 60% 20%, var(--shadow-color) 0%, transparent 40%);
                opacity: 0.3;
                z-index: -1;
                animation: float 20s ease-in-out infinite;
            }

            @keyframes float
            {
                0%, 100% { transform: translate(0, 0) rotate(0deg); }
                33% { transform: translate(-20px, -30px) rotate(1deg); }
                66% { transform: translate(20px, 30px) rotate(-1deg); }
            }

            .theme-toggle
            {
                position: fixed;
                top: 20px;
                right: 20px;
                max-width: min-content;
                max-height: min-content;
                background: var(--accent-color);
                color: var(--bg-color);
                border: none;
                padding: 12px 16px;
                border-radius: 25px;
                cursor: pointer;
                font-family: "Roboto Condensed", sans-serif;
                font-weight: 400;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 4px 12px var(--shadow-color);
                z-index: 1000;
            }

            .theme-toggle:hover
            {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px var(--shadow-color);
            }

            .main-container
            {
                display: flex;
                flex-direction: column;
                width: 90%;
                max-width: 600px;
                max-height: 90vh;
                align-items: center;
                gap: 25px;
                z-index: 1;
                overflow-y: auto;
                padding: 20px 0;
            }

            h1
            {
                color: var(--accent-color);
                background: transparent;
                padding: 20px 30px;
                margin: 0;
                font-family: "Roboto Condensed", sans-serif;
                font-weight: 200;
                font-size: 3.5rem;
                text-align: center;
                letter-spacing: 2px;
                position: relative;
                animation: fadeInUp 1s ease-out;
                text-shadow: 0 2px 4px var(--shadow-color);
                z-index: 10;
            }

            h1::after
            {
                content: '';
                position: absolute;
                bottom: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 60px;
                height: 2px;
                background: var(--accent-color);
                border-radius: 1px;
            }

            .countdown-section
            {
                text-align: center;
                margin-bottom: 20px;
                animation: fadeInUp 1s ease-out 0.2s both;
            }

            #countdown
            {
                color: var(--text-color);
                background: transparent;
                padding: 15px 25px;
                margin: 10px 0;
                font-size: 1.4rem;
                font-weight: 300;
                letter-spacing: 1px;
            }

            .subtitle
            {
                color: var(--text-color);
                background: transparent;
                padding: 0;
                margin: 5px 0 0 0;
                font-size: 1rem;
                opacity: 0.7;
                font-weight: 200;
            }

            .section-container
            {
                width: 100%;
                margin: 15px 0;
                animation: fadeInUp 1s ease-out calc(var(--delay, 0) * 0.1s + 0.4s) both;
            }

            .linkcontainer
            {
                display: flex;
                flex-direction: column;
                align-items: center;
                border: 1px solid var(--border-color);
                border-radius: 20px;
                padding: 25px;
                background: var(--bg-color);
                backdrop-filter: blur(10px);
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 8px 32px var(--shadow-color);
                position: relative;
                overflow: hidden;
            }

            .linkcontainer::before
            {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, var(--shadow-color), transparent);
                transition: left 0.6s;
            }

            .linkcontainer:hover::before
            {
                left: 100%;
            }

            .linkcontainer:hover
            {
                transform: translateY(-5px);
                box-shadow: 0 12px 40px var(--shadow-color);
                border-color: var(--accent-color);
            }

            .section-title
            {
                color: var(--accent-color);
                background: transparent;
                padding: 0;
                margin: 0 0 20px 0;
                font-size: 1.2rem;
                font-weight: 400;
                letter-spacing: 1px;
                white-space: pre-line;
                text-align: center;
            }

            .button-row
            {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
                gap: 15px;
                width: 100%;
            }

            a, button
            {
                color: var(--text-color);
                background: var(--bg-color);
                border: 1px solid var(--border-color);
                padding: 12px 20px;
                margin: 0;
                font-family: "Roboto Condensed", sans-serif;
                font-weight: 300;
                text-decoration: none;
                border-radius: 25px;
                cursor: pointer;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                position: relative;
                overflow: hidden;
                white-space: nowrap;
            }

            a:hover, button:hover
            {
                color: var(--bg-color);
                background: var(--accent-color);
                transform: translateY(-2px);
                box-shadow: 0 6px 20px var(--shadow-color);
            }

            .view-counter
            {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }

            img
            {
                padding: 0;
                margin: 0;
                filter: grayscale(60%) contrast(1.1);
                transition: all 0.4s ease;
                border-radius: 10px;
                max-width: 100%;
                height: auto;
            }

            img:hover
            {
                filter: grayscale(0%) contrast(1.2);
                transform: scale(1.02);
            }

            .qr-image
            {
                max-width: 300px;
                max-height: 300px;
                border-radius: 15px;
                box-shadow: 0 8px 32px var(--shadow-color);
            }

            .hidden-page
            {
                display: none;
                flex-direction: column;
                width: 90%;
                max-width: 400px;
                align-items: center;
                gap: 30px;
                text-align: center;
                animation: fadeInUp 0.6s ease-out;
            }

            .close-btn
            {
                background: var(--accent-color);
                color: var(--bg-color);
                border: none;
                padding: 15px 30px;
                border-radius: 30px;
                font-size: 1.1rem;
                font-weight: 400;
                margin-top: 20px;
            }

            @keyframes fadeInUp
            {
                from
                {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to
                {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @media (max-width: 768px)
            {
                h1
                {
                    font-size: 2.5rem;
                }
                
                .linkcontainer
                {
                    padding: 20px;
                    margin: 10px 0;
                }
                
                .button-row
                {
                    flex-direction: column;
                    gap: 10px;
                }
                
                a, button
                {
                    width: 100%;
                    text-align: center;
                }
            }
        </style>
    </head>
    <body>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

        <div class="main-container" id="mainpage">
            <h1>Welcome.</h1>
            
            <div class="countdown-section">
                <div id="countdown">Please have patience.</div>
                <div class="subtitle">This page will be functional NOV 14, 2024.</div>
            </div>

            <div class="section-container" style="--delay: 1;">
                <div class="linkcontainer">
                    <div class="section-title">[Social Accounts]</div>
                    <div class="button-row">
                        <a href="https://huggingface.co/XeTute">HuggingFace</a>
                        <a href="https://github.com/XeTute">GitHub</a>
                        <a href="https://x.com/Hamzah4sadullah">X (formerly Twitter)</a>
                    </div>
                </div>
            </div>

            <div class="section-container" style="--delay: 2;">
                <div class="linkcontainer">
                    <div class="section-title">[About]</div>
                    <div class="button-row">
                        <button onclick="showHamzah();">About Hamzah</button>
                        <button onclick="alert('That information will soon be online.');">About XeTute [Technologies]</button>
                    </div>
                </div>
            </div>

            <div class="section-container" style="--delay: 3;">
                <div class="linkcontainer">
                    <div class="section-title">[View Counter]</div>
                    <div class="view-counter">
                        <img src="https://count.getloli.com/@XeTute-Webpage?theme=booru-lewd" alt="View Counter"/>
                    </div>
                </div>
            </div>
        </div>

        <div class="hidden-page" id="hamzahlink">
            <img src="https://gravatar.com/hamzahasadullah.qr" class="qr-image" alt="Hamzah's QR Code"/>
            <a href="https://gravatar.com/hamzahasadullah">Can't scan QR — direct link</a>
            <button class="close-btn" onclick="showHamzah()">Close</button>
        </div>

        <script>
            const themeToggle = document.querySelector('.theme-toggle');
            const body = document.body;
            
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark')
            {
                body.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            }

            function toggleTheme()
            {
                const currentTheme = body.getAttribute('data-theme');
                if (currentTheme === 'dark')
                {
                    body.removeAttribute('data-theme');
                    themeToggle.textContent = '🌙';
                    localStorage.setItem('theme', 'light');
                
                }
                else
                {
                    body.setAttribute('data-theme', 'dark');
                    themeToggle.textContent = '☀️';
                    localStorage.setItem('theme', 'dark');
                }
            }

            const countdown = document.getElementById("countdown");
            const ETA = new Date("Nov 14, 2025 00:00:00").getTime();

            const countdownfunction = setInterval(function()
            {
                let distance = ETA - (new Date().getTime());
                let days = Math.floor(distance / (1000 * 60 * 60 * 24));
                let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                let seconds = Math.floor((distance % (1000 * 60)) / 1000);

                countdown.innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s remaining.";

                if (distance < 0)
                {
                    clearInterval(countdownfunction);
                    countdown.innerHTML = "Will be updated shortly...";
                }
            }, 1000);

            function showHamzah()
            {
                const mainpage = document.getElementById("mainpage");
                const hamzahlink = document.getElementById("hamzahlink");

                if (mainpage.style.display === "none")
                {
                    mainpage.style.display = "flex";
                    hamzahlink.style.display = "none";
                }
                else
                {
                    mainpage.style.display = "none";
                    hamzahlink.style.display = "flex";
                }
            }

            document.addEventListener('mousemove', (e) =>
            {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                
                document.querySelector('body::before')?.style?.setProperty('transform', `translate(${moveX}px, ${moveY}px)`);
            });
        </script>
    </body>
</html>
