<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Home | Flare</title>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="Keywords" content="XeTute, XeTute Technologies, AI, LLM, Flare, Chat, Chatbot">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../basic.css">
        <link rel="icon" type="image/png" href="logo.jpg"/>
    </head>
    <style>
        div { justify-content: flex-start; }
        .rccard
        {
            border: 2px solid #333;
            border-radius: 15px;
            padding: 8px;
            background: #050505;
        }
        .rccard img
        {
            width: 5rem;
            height: 5rem;
            border: 2px solid #222;
            border-radius: 15px;
        }
        .rccard h3, .rccard p, .rccard img { margin: 0px; }

        .nccard
        {
            width: 10rem;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 8px;
            background: #050505;
        }
        .nccard img
        {
            width: 5rem;
            height: 5rem;
            border: 2px solid #222;
            border-radius: 15px;
        }
        .nccard h3, .nccard p, .nccard img { margin: 0px; }

        .rc
        {
            justify-content: left;
            max-width: 80%;
            min-height: 30%;
            overflow-x: auto;
            flex-direction: row;
        }

        @media (min-width: 500px)
        {
            .chars
            {
                display: grid;
                grid-template-columns: auto auto;
            }
        }

        @media (min-width: 600px)
        {
            .chars
            {
                display: grid;
                grid-template-columns: auto auto auto;
            }
        }
    </style>
    <body onload="autoAuth()" style="max-width: 100%; max-height: 100%; overflow: hidden;">
        <div style="margin: 20px; margin-top: 3.5%;">
            <h1>Hello, Friend</h1>
            <p id="greeting-authas">You're authorized as </p>
        </div>

        <h2 style="margin: 10px; margin-bottom: 0;">Recent Chats</h2>
        <div id="recent-chats" class="rc" style="margin: 20px; margin-top: 10px; padding: 0;"></div>

        <h2>All Characters</h2>
        <input placeholder="Coming soon..."/>
        <div id="characters" class="chars" style="overflow-y: auto;"></div>
    </body>
    <script src="../pocketbase.umd.js"></script>
    <script>
        const pb = new PocketBase(link); // link in pocketbase.umd.js

        let email, password, authData = undefined;

        async function autoSignIn(referSuccess, referFail)
        {
            if ((localStorage.getItem('email') !== null) && (localStorage.getItem('password') !== null))
            {
                try { authData = await pb.collection('users').authRefresh(); }
                catch
                {
                    try
                    {
                        email = localStorage.getItem('email');
                        password = localStorage.getItem('password');

                        authData = await pb.collection('users').authWithPassword(email, password);
                        if (referSuccess !== undefined) window.location.href = referSuccess;
                    }
                    catch
                    {
                        if (referFail !== undefined) window.location.href = referFail; // For auth page
                        return false;
                    }
                }
                if (authData.record.verified && (referSuccess !== undefined)) window.location.href = referSuccess;
                else if (!authData.record.verified && (referFail !== undefined)) window.location.href = referFail;
                else if (!authData.record.verified) return false; 
                return true;
            } else if (referFail !== undefined) window.location.href = referFail
        }

        function getImageURL(collectionID, recID, filename) { return `${link}api/files/${collectionID}/${recID}/${filename}`; }
    </script>
    <script>
        async function autoAuth()
        {
            await autoSignIn(undefined, '../auth.html?./flare/home.html');
            document.getElementById('greeting-authas').textContent += authData.record.name + '.';
            await populateRecentChats();
            await populateCharacters();
        }

        async function populateRecentChats()
        {
            let tmpKeys = undefined;
            try { tmpKeys = Object.keys(authData.record.chats); } catch {}
            if (tmpKeys?.length === 0 || authData.record.chats === null) document.getElementById('recent-chats').innerHTML = '<p>No recent Chats.</p>';
            else
            {
                for (let i = 0; i < tmpKeys.length; ++i)
                {
                    let record = undefined;
                    try { record = await pb.collection('flare_characters').getOne(tmpKeys[i], {}); } catch { ++i; }
                    document.getElementById('recent-chats').innerHTML += 
                    `<button type="button" class="rccard" onclick="openChat('${tmpKeys[i]}')">
                        <img src="${getImageURL(record.collectionId, record.id, record.image)}"/>
                        <h3>${authData.record.chats[tmpKeys[i]].name}</h3>
                    </button>`;
                }
            }
        }
        
        let characterRecords = undefined;
        async function populateCharacters()
        {
            characterRecords = await pb.collection('flare_characters').getList(1, 50, {});
            for (let i = 0; i < characterRecords.items.length; ++i)
            {
                document.getElementById('characters').innerHTML +=
                `<button class="nccard" type="button" onclick="openChat('${characterRecords.items[i].id}')">
                    <img src="${getImageURL(characterRecords.items[i].collectionId, characterRecords.items[i].id, characterRecords.items[i].image)}"/>
                    <h3>${characterRecords.items[i].name}</h3>
                    <p>${(characterRecords.items[i].description.length > 23) ? characterRecords.items[i].description.substr(0, 20) + '...' : characterRecords.items[i].description}</p>
                </button>`;
            }
        }

        function openChat(chatid) { window.location.href = './chat.html?' + chatid; }
    </script>
</html>
