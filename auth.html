<!DOCTYPE html>
<html lang="en">
<head>
    <title>Authorisation | XeTute Technologies</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="Keywords" content="Login, Register, XeTute, XeTute Technologies, AI, LLM, Flare, Chat, Chatbot">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="basic.css">
    <link rel="icon" type="image/png" href="logo.jpg"/>
</head>
<style>
    body { justify-content: center; }
</style>
<body onload="_autoSignIn()">
    <h1>Hello, Friend.</h1>
    <div id="signin">
        <p style="margin-bottom: 20px;">Let's continue where we left off.</p>
        <input placeholder="Email" id="signin-inp-email" type="email" autocomplete="off" autofocus="on"/>
        <input placeholder="Password" id="signin-inp-password" type="password"/>
        <button onclick="_signIn('signin-inp-email', 'signin-inp-password')">Sign In</button>
    </div>
    <div id="signup" style="display: none;">
        <p style="margin-bottom: 20px;">Let's get you started.</p>
        <input placeholder="Email" id="signup-inp-email" type="email" autocomplete="off" autofocus="on"/>
        <input placeholder="Password" id="signup-inp-password0" type="password"/>
        <input placeholder="Confirm Password" id="signup-inp-password1" type="password"/>
        <div style="margin: 10px; flex-direction: row; padding: 0px;">
            <input type="checkbox" id="tos-checkbox" onchange="toggleSignUpButton()" style="margin: 5px; max-width: 20px;"/>
            <label for="tos-checkbox" style="margin: 0px;">I agree to the <a href="ToS.html" target="_blank" style="border:0; margin: 0;">Terms of Service</a>.</label>
        </div>
        <button id="signup-btn" onclick="_signUp('signup-inp-email', 'signup-inp-password0', 'signup-inp-password1')" disabled>Sign Up</button>
    </div>
    <p id="note"></p>
    <button onclick="_switchForm()" id="form-refer-btn" style="position: absolute; bottom: 3.5%; text-decoration: none;">Not part of the Community yet?</button>

    <script src="pocketbase.umd.js"></script>
    <script src="mylib.js"></script>
    <script defer>
        let refer = undefined;

        if (location.search) { refer = decodeURIComponent(location.search.substr(1), {}); }
        else window.location.href = './index.html';

        function _autoSignIn() { autoSignIn(refer); }

        async function _signIn(emailID, passID)
        {
            if (!(await signIn(emailID, passID, refer, undefined))) document.getElementById('note').innerHTML = '<p style="color:red">Failed to Sign In</p>';
        }

        function _switchForm()
        {
            switchForm('signin', 'signup');
            if (document.getElementById('signin').style.display === 'none') document.getElementById('form-refer-btn').textContent = 'Already part of the community?';
            else document.getElementById('form-refer-btn').textContent = 'Not part of the Community yet?';
        }

        async function _signUp(emailID, passID0, passID1)
        {
            if (!(await signUp(emailID, passID0, passID1, 'note'))) document.getElementById('note').innerHTML = '<p style="color:red">Failed to Sign Up</p>'; 
            else
            {
                _switchForm();
                document.getElementById('signin-inp-email').value = document.getElementById('signup-inp-email').value;
                document.getElementById('signin-inp-password').value = document.getElementById('signup-inp-password0').value;
            }
        }

        function toggleSignUpButton()
        {
            const checkbox = document.getElementById('tos-checkbox');
            const signUpButton = document.getElementById('signup-btn');
            signUpButton.disabled = !checkbox.checked;
        }
    </script>
</body>
</html>
