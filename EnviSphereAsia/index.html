<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <meta name="keywords" content="XeTute, XeTute Technologies, Technologies, EnviSphereAsia, ESA, Asia, Media, Social, Social Media, Platform"/>
        <meta name="description" content="EnviSphereAsia by XeTute Technologies"/>

        <title>AsiaHub \\ XeTute Technologies</title>

        <link rel="stylesheet" href="../basic.css"/>
        <link rel="icon" href="../logo.jpg"/>
        <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

        <script src="https://kit.fontawesome.com/cc84e7136d.js" crossorigin="anonymous"></script>
    </head>
    <style>
        .header
        {
            margin: 20px;
            padding: 10px;
            border-bottom: 2px solid #fff;
        }

        .nav
        {
            position: absolute;
            bottom: 0;

            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;

            border-top: 2px solid #fff;
            overflow-x: hidden;
            padding: 15px;

            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .navbtn
        {
            border-radius: 50%;
            min-width: 30px;
            min-height: 30px;

            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s ease-in-out;
        }
        .navbtn:hover, .navbtn:focus { scale: 1.1; }

        .posts
        {
            width: 100%;
            height: 100%;

            margin-top: 50px;
            margin-bottom: 50px;

            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;

            overflow-y: auto;
        }

        .post
        {
            text-align: left;
            margin-left: 20px;
        }

        .postdata
        {
            display: flex;
            flex-direction: row;

            width: 100%;
            padding: 15px;
            margin: 10px;

            justify-content: center;
            align-items: center;
            
            justify-self: center;
            align-self: center;
        }

        .postdata-framed
        {
            border: 2px solid #858585;
            border-radius: 25px;

            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;

            padding: 5px;
            margin-left: 5px;
            margin-right: 5px;

            transition: .35s ease-in-out;
        }

        .postdata-framed:hover
        {
            background: rgba(255, 255, 255, 0.85);
            color: #000;
        }
    </style>
    <body style="display: none; overflow: none;" id="main">
        <div class="header">
            <h1>Hello, Friend.</h1>
            <p>Let's envision Asia, great.</p>
        </div>

        <div class="posts" id="posts">

        </div>

        <div class="nav">
            <a href="./profile" class="sb navbtn"><i class="fas fa-user-alt" aria-hidden="true"></i></a>
            <a href="./friends" class="sb navbtn"><i class="fas fa-user-friends" aria-hidden="true"></i></a>
            <a href="./publish" class="sb navbtn"><i class="fas fa-edit" aria-hidden="true"></i></a>
            <a href="./envelop" class="sb navbtn"><i class="far fa-envelope-open" aria-hidden="true"></i></a>
        </div>
    </body>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script defer>
        const firebaseApp = firebase.initializeApp
        ({
            apiKey: "AIzaSyBDz4iOz98Us7RaNgOTAZ6PGsemBFW7k_A",
            authDomain: "xetuteauth.firebaseapp.com",
            projectId: "xetuteauth",
            storageBucket: "xetuteauth.firebasestorage.app",
            messagingSenderId: "500556520913",
            appId: "1:500556520913:web:381dc486949b1ae84694f0",
            measurementId: "G-VJFMP5F975"
        });
        const db = firebaseApp.firestore();
        const auth = firebaseApp.auth();

        auth.onAuthStateChanged((user) =>
        {
            if (user) { document.getElementById('main').style.display = 'flex'; }
            else { window.location.href = '../auth?../EnviSphereAsia/'; }
        });

        function formatNum(likes)
        {
            let formatted = `${likes}`;
            if (likes >= (10 ** 5)) formatted = `${likes / (10 ** 6)}`.substr(0, 3) + 'M';
            else if (likes >= 100) formatted = `${likes / (10 ** 3)}`.substr(0, 3) + 'k';
            
            return formatted;
        }

        function likePost(id)
        {
            const e = document.getElementById(`${id}-likes`);
            e.setAttribute('data-likes', Number(e.getAttribute('data-likes')) + 1);
            e.textContent = formatNum(Number(e.getAttribute('data-likes')));

            document.getElementById(`${id}-heart`).textContent = '❤';
            document.getElementById(`${id}-heart`).style.color = '#ff6969'; // Same as rgba(255, 105, 105, 1)
        }

        function postDiv(author, date, likes, comments, title, body, id)
        {
            let div =
            `
            <div class="card post" id="${id}">
                <strong>${title}</strong>
                <p>${body}</p>
                <div class="postdata">
                    <em>—${author}</em>
                    <div class="postdata-framed" id="${id}-postdata-framed0" onclick='likePost(${id})'>
                        <p id="${id}-heart" style="margin-right: 0;">🤍</p>
                        <p id="${id}-likes" data-likes='${likes}' style="margin-left: 0;">${formatNum(likes)}</p>
                    </div>
                    <div class="postdata-framed" id="${id}-postdata-framed1" onclick='alert("Not yet implemented")'>
                        <p class="fa fa-comments" aria-hidden="true" style="margin-right: 0;"></p>
                        <p style="margin-left: 0;">${formatNum(comments)}</p>
                    </div>
                </div>
            </div>
            `;
            return div;
        }

        for (let i = 0; i < 10; ++i)
        {
            document.getElementById('posts').innerHTML += postDiv('XeTute', '10.01.2025', '100', '10', 'Hello, Friend.', 'This is a dummy post. Let\'s envision Asia, great.', i);
        }
    </script>
</html>
